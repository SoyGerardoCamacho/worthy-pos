// ─── GASTOS ──────────────────────────────────────────────────
async function handleGastoSave() {
  if (state.gastoSaving) return;
  const monto = parseFloat(state.gastoMonto)||0;
  if (!state.gastoFecha || !state.gastoStand || !state.gastoCat || monto<=0) {
    showToast("Completa fecha, local, categoría y monto","err"); return;
  }
  state.gastoSaving = true; render();
  try {
    const gasto = {
      id: genId(),
      fecha: state.gastoFecha,
      timestamp: new Date().toISOString(),
      stand: state.gastoStand,
      cat: state.gastoCat,
      monto,
      nota: state.gastoNota.trim(),
      registradoPor: state.user.email,
    };
    await db.collection("gastos").doc(gasto.id).set(gasto);
    state.gastos = [gasto, ...(state.gastos||[])];
    state.gastoMonto=""; state.gastoNota="";
    state.gastoSaving=false;
    showToast("✅ Gasto registrado");
    render();
  } catch(e) {
    state.gastoSaving=false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleGastoEditSave(id) {
  const gastos = state.gastos||[];
  const original = gastos.find(g=>g.id===id);
  if(!original) { showToast("Gasto no encontrado","err"); return; }
  const monto = parseFloat(state.egEditMonto)||0;
  if (!state.egEditFecha || !state.egEditStand || !state.egEditCat || monto<=0) {
    showToast("Completa todos los campos","err"); return;
  }
  state.egEditSaving = true; render();
  try {
    const updated = {
      ...original,
      fecha: state.egEditFecha,
      stand: state.egEditStand,
      cat: state.egEditCat,
      monto,
      nota: state.egEditNota.trim(),
      editadoPor: state.user.email,
      editadoEn: new Date().toISOString(),
    };
    await db.collection("gastos").doc(id).set(updated);
    state.gastos = gastos.map(g=>g.id===id?updated:g);
    state.editingGasto = null;
    state.egEditSaving = false;
    showToast("✅ Gasto actualizado");
    render();
  } catch(e) {
    state.egEditSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleGastoEditDelete(id) {
  const gastos = state.gastos||[];
  state.egEditSaving = true; render();
  try {
    await db.collection("gastos").doc(id).delete();
    state.gastos = gastos.filter(g=>g.id!==id);
    state.editingGasto = null;
    state.egEditSaving = false;
    showToast("✅ Gasto eliminado");
    render();
  } catch(e) {
    state.egEditSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

// ─── CAJA ────────────────────────────────────────────────────
async function handleCajaCerrar() {
  if (state.cajaSaving) return;
  const efIni = parseFloat(state.cajaEfectivoInicial);
  const efFin = parseFloat(state.cajaEfectivoFinal);
  if (isNaN(efIni) || isNaN(efFin)) {
    showToast("Ingresa efectivo inicial y final","err"); return;
  }
  state.cajaSaving = true; render();
  try {
    const standId = state.cajaStand;
    const fecha = state.cajaFecha;
    const docId = cierreDocId(standId, fecha);
    const cierre = {
      id: docId,
      stand: standId,
      fecha,
      efectivoInicial: efIni,
      efectivoFinal: efFin,
      bendoBanco: state.cajaBendoBanco!==""? (parseFloat(state.cajaBendoBanco)||0) : null,
      transferBanco: state.cajaTransferBanco!==""? (parseFloat(state.cajaTransferBanco)||0) : null,
      nota: state.cajaNota.trim(),
      cerradoPor: state.user.email,
      cerradoEn: new Date().toISOString(),
    };
    await db.collection("cierres_caja").doc(docId).set(cierre);
    state.cierres = {...(state.cierres||{}), [docId]: cierre};
    state.cajaEfectivoInicial=""; state.cajaEfectivoFinal=""; state.cajaBendoBanco=""; state.cajaTransferBanco=""; state.cajaNota="";
    state.cajaSaving = false;
    showToast("✅ Caja cerrada");
    render();
  } catch(e) {
    state.cajaSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleCajaReabrir() {
  const standId = state.cajaStand;
  const fecha = state.cajaFecha;
  const docId = cierreDocId(standId, fecha);
  try {
    await db.collection("cierres_caja").doc(docId).delete();
    const updated = {...(state.cierres||{})};
    delete updated[docId];
    state.cierres = updated;
    showToast("🔓 Caja reabierta");
    render();
  } catch(e) {
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleAjusteInventario() {
  const { productId, standId } = state.ajusteModal || {};
  const delta = parseInt(state.ajusteDelta)||0;
  const nota = state.ajusteNota.trim();
  if (!productId || delta === 0) { showToast("Ingresa un ajuste (+/−)","err"); return; }
  if (!nota) { showToast("El motivo del ajuste es obligatorio","err"); return; }

  state.ajusteSaving = true; render();
  try {
    let inv = null;
    let mov = null;
    await db.runTransaction(async tx=>{
      const invRef = db.collection("inventarios").doc(standId);
      const invDoc = await tx.get(invRef);
      inv = {...(invDoc.exists ? (invDoc.data()||{}) : {})};
      const stockAnterior = Number(inv[productId]||0);
      const stockNuevo = stockAnterior + delta;
      if (stockNuevo < 0) throw new Error(`No puedes dejar stock negativo. Stock actual: ${stockAnterior}`);
      inv[productId] = stockNuevo;
      mov = {
        id: genId(),
        fecha: today(),
        timestamp: new Date().toISOString(),
        type: "ajuste",
        product: productId,
        qty: delta,
        stockAnterior,
        stockNuevo,
        standId,
        lote: "",
        obs: nota,
        registradoPor: state.user.email,
      };
      tx.set(invRef, inv);
      tx.set(db.collection("kardex").doc(mov.id), mov);
    });

    state.inventory[standId] = inv;
    state.kardexMovements = [mov, ...(state.kardexMovements||[])];
    state.ajusteModal = null;
    state.ajusteDelta = ""; state.ajusteNota = "";
    state.ajusteSaving = false;
    const p = CATALOG.find(c=>c.id===productId);
    showToast(`✅ Ajuste: ${p?.name} ${delta>0?"+"+delta:delta} uds`);
    render();
  } catch(e) {
    state.ajusteSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleDispatch() {
  const product = state.dispatchProduct;
  const target = state.dispatchTarget;
  const qty = parseInt(state.dispatchQty)||0;
  const mode = state.dispatchMode || "bodega_punto";
  const isPlantEntry = mode === "planta_bodega";
  if(!product||!qty||qty<=0) { showToast("Completa todos los campos","err"); return; }

  const bodegaInv = {...(state.inventory["bodega"]||{})};
  const available = bodegaInv[product]||0;
  if(!isPlantEntry && available<qty) { showToast(`Solo hay ${available} uds en Bodega`,"err"); return; }

  state.dispatching = true; render();
  try {
    const productInfo = CATALOG.find(p=>p.id===product);
    const movementId = genId();
    const despacho = {
      id: movementId,
      fecha: today(), timestamp: new Date().toISOString(),
      product, qty,
      from:isPlantEntry?"planta":"bodega",
      to:isPlantEntry?"bodega":target,
      mode,
      productName: productInfo ? `${productInfo.name} ${productInfo.sub}` : product,
      registradoPor: state.user.email,
    };
    const kardex = {
      id: movementId,
      fecha: today(), timestamp: new Date().toISOString(),
      type: isPlantEntry ? "entrada" : "salida",
      product, qty, lote:"",
      obs: isPlantEntry ? "Entrada desde planta de produccion" : "Despacho desde bodega central",
      standId: isPlantEntry ? "bodega" : "bodega",
      to: isPlantEntry ? "bodega" : target,
      registradoPor: state.user.email,
    };
    let updatedBodegaInv = null;
    let updatedStandInv = null;
    await db.runTransaction(async tx=>{
      const bodegaRef = db.collection("inventarios").doc("bodega");
      const bodegaDoc = await tx.get(bodegaRef);
      updatedBodegaInv = {...(bodegaDoc.exists ? (bodegaDoc.data()||{}) : {})};
      const currentBodega = Number(updatedBodegaInv[product]||0);
      if (isPlantEntry) {
        updatedBodegaInv[product] = currentBodega + qty;
        tx.set(bodegaRef, updatedBodegaInv);
      } else {
        if (currentBodega < qty) throw new Error(`Solo hay ${currentBodega} uds en Bodega`);
        updatedBodegaInv[product] = currentBodega - qty;
        const standRef = db.collection("inventarios").doc(target);
        const standDoc = await tx.get(standRef);
        updatedStandInv = {...(standDoc.exists ? (standDoc.data()||{}) : {})};
        updatedStandInv[product] = Number(updatedStandInv[product]||0) + qty;
        tx.set(bodegaRef, updatedBodegaInv);
        tx.set(standRef, updatedStandInv);
      }
      tx.set(db.collection("despachos").doc(movementId), despacho);
      tx.set(db.collection("kardex").doc(movementId), kardex);
    });
    state.inventory["bodega"] = updatedBodegaInv;
    if (updatedStandInv) state.inventory[target] = updatedStandInv;

    state.dispatchProduct=""; state.dispatchQty=""; state.dispatching=false;
    showToast(isPlantEntry ? "✅ Entrada registrada en Bodega" : `✅ Despachado a ${PUNTOS_VENTA.find(s=>s.id===target)?.name}`);
    render();
  } catch(e) {
    state.dispatching=false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}


async function handleKardexEntrada() {
  if (state.kardexSaving) return; // evita doble-registro por doble click
  const product = state.kardexProduct;
  const qty = parseInt(state.kardexQty)||0;
  const lote = state.kardexLote.trim();
  if(!product||qty<=0) { showToast("Selecciona producto y cantidad","err"); return; }

  state.kardexSaving = true; render();
  try {
    const mov = {
      id: genId(),
      fecha: today(),
      timestamp: new Date().toISOString(),
      type: "entrada",
      product, qty, lote,
      obs: state.kardexObs,
      registradoPor: state.user.email,
    };

    let bodegaInv = null;
    await db.runTransaction(async tx=>{
      const invRef = db.collection("inventarios").doc("bodega");
      const invDoc = await tx.get(invRef);
      bodegaInv = {...(invDoc.exists ? (invDoc.data()||{}) : {})};
      bodegaInv[product] = Number(bodegaInv[product]||0) + qty;
      tx.set(invRef, bodegaInv);
      tx.set(db.collection("kardex").doc(mov.id), mov);
    });

    state.inventory["bodega"] = bodegaInv;
    state.kardexMovements = [mov, ...(state.kardexMovements||[])];
    state.kardexProduct=""; state.kardexQty=""; state.kardexLote=""; state.kardexObs="";
    state.kardexSaving = false;
    showToast(`✅ Entrada registrada: ${qty} uds`);
    render();
  } catch(e) {
    state.kardexSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

function resetMaterialForm() {
  state.editingMaterial = null;
  state.materialNombre = "";
  state.materialCategoria = "materia_prima";
  state.materialUnidad = "unidad";
  state.materialStock = "";
  state.materialMinimo = "";
  state.materialCosto = "";
  state.materialNota = "";
}

async function handleMaterialSave() {
  if (state.materialSaving) return;
  const nombre = state.materialNombre.trim();
  if (!nombre) { showToast("Ingresa el nombre del material","err"); return; }

  const material = {
    id: state.editingMaterial || genId(),
    nombre,
    categoria: state.materialCategoria || "materia_prima",
    unidad: (state.materialUnidad || "unidad").trim(),
    stock: parseFloat(state.materialStock)||0,
    minimo: parseFloat(state.materialMinimo)||0,
    costoUnitario: parseFloat(state.materialCosto)||0,
    nota: state.materialNota.trim(),
    actualizadoPor: state.user?.email||"",
    actualizadoEn: new Date().toISOString(),
  };

  state.materialSaving = true; render();
  try {
    await db.collection("materias_primas").doc(material.id).set(material);
    state.materials = [
      material,
      ...(state.materials||[]).filter(m=>m.id!==material.id)
    ];
    resetMaterialForm();
    state.materialSaving = false;
    showToast("✅ Material guardado");
    render();
  } catch(e) {
    state.materialSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

function showToast(msg, type="ok") {
  state.toast={msg,type};
  render();
  setTimeout(()=>{ state.toast=null; render(); },3000);
}

// ─── FIREBASE LISTENERS ───────────────────────────────────────
function setupListeners(userInfo) {
  // Unsubscribe previous
  if(state.unsubInventory) state.unsubInventory();
  if(state.unsubSales) state.unsubSales();
  if(state.unsubKardex) state.unsubKardex();
  if(state.unsubGastos) state.unsubGastos();
  if(state.unsubCierres) state.unsubCierres();
  if(state.unsubMaterials) state.unsubMaterials();

  // Listen to all inventories
  state.unsubInventory = db.collection("inventarios").onSnapshot(snap=>{
    snap.forEach(doc=>{ state.inventory[doc.id]=doc.data(); });
    render();
  });

  // Listen to sales - stand only sees own, admin/bodega sees all
  let salesQuery = db.collection("ventas").orderBy("timestamp","desc");
  if(userInfo.role==="asesor" && state.selectedStand) {
    salesQuery = db.collection("ventas").where("stand","==",state.selectedStand).orderBy("timestamp","desc");
  }

  state.unsubSales = salesQuery.onSnapshot(snap=>{
    state.sales = snap.docs.map(d=>d.data());
    render();
  });

  // Kardex listener
  state.unsubKardex = db.collection("kardex").orderBy("timestamp","desc").onSnapshot(snap=>{
    state.kardexMovements = snap.docs.map(d=>d.data());
    render();
  });

  // Costos listener
  db.collection("config").doc("costos").onSnapshot(doc=>{
    state.costs = doc.exists ? (doc.data()||{}) : {};
    render();
  });

  // Precios listener
  db.collection("config").doc("precios").onSnapshot(doc=>{
    state.prices = doc.exists ? (doc.data()||{}) : {};
    render();
  });

  if (userInfo.role==="full" || userInfo.role==="bodega") {
    state.unsubMaterials = db.collection("materias_primas").onSnapshot(snap=>{
      state.materials = snap.docs.map(doc=>({ ...(doc.data()||{}), id:doc.id }));
      render();
    });
  }

  // Gastos operativos listener
  if (userInfo.canFinanzas) {
    state.unsubGastos = db.collection("gastos").orderBy("timestamp","desc").onSnapshot(snap=>{
      state.gastos = snap.docs.map(d=>d.data());
      render();
    });

    // Cierres de caja listener
    state.unsubCierres = db.collection("cierres_caja").onSnapshot(snap=>{
      const map = {};
      snap.forEach(doc=>{ map[doc.id] = doc.data(); });
      state.cierres = map;
      render();
    });
  }
}

// ─── AUTH LISTENER ────────────────────────────────────────────
auth.onAuthStateChanged(user=>{
  if(user) {
    const userInfo = USERS[user.email];
    if(!userInfo) { auth.signOut(); state.loading=false; render(); return; }
    state.user = user;
    state.userInfo = userInfo;
    state.tab = (userInfo.role==="asesor")?"pos":(userInfo.canFinanzas?"rentabilidad":"dashboard");
    state.loading = false;
    setupListeners(userInfo);
    render();
  } else {
    if(state.unsubInventory) state.unsubInventory();
    if(state.unsubSales) state.unsubSales();
    if(state.unsubKardex) state.unsubKardex();
    if(state.unsubGastos) state.unsubGastos();
    if(state.unsubCierres) state.unsubCierres();
    if(state.unsubMaterials) state.unsubMaterials();
    state.user=null; state.userInfo=null;
    state.inventory={}; state.sales=[]; state.materials=[];
    state.loading=false;
    render();
  }
});

// Initial render
render();
</script>
