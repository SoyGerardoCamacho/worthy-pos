<style>
:root {
  --purple: #2D1B69;
  --purple-mid: #3d2a85;
  --lime: #8DC63F;
  --lime-dark: #6fa030;
  --lavender: #C8B8E8;
  --lavender-light: #e8dff6;
  --off-white: #F9F7FF;
  --white: #FFFFFF;
  --gray: #6B7280;
  --red: #EF4444;
  --amber: #F59E0B;
  --green: #10B981;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--off-white); min-height: 100vh; }

/* LOGIN */
.login-screen { min-height:100vh; background: var(--purple); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.login-logo { font-size:40px; font-weight:900; color:var(--lime); letter-spacing:-1px; }
.login-sub { font-size:13px; color:var(--lavender); font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-top:4px; margin-bottom:40px; }
.login-card { background:white; border-radius:20px; padding:28px; width:100%; max-width:380px; }
.login-card h2 { font-size:18px; color:var(--purple); font-weight:800; margin-bottom:20px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:12px; font-weight:700; color:var(--gray); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:6px; }
.form-group input { width:100%; border:1.5px solid var(--lavender); border-radius:10px; padding:12px 14px; font-size:15px; color:var(--purple); font-family:inherit; outline:none; transition:border 0.15s; }
.form-group input:focus { border-color:var(--purple); }
.btn-primary { width:100%; background:var(--lime); color:white; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; transition:opacity 0.15s; }
.btn-primary:hover { opacity:0.9; }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
.login-error { font-size:13px; color:var(--red); font-weight:600; margin-top:10px; text-align:center; }

/* APP LAYOUT */
.app { max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:80px; }
.header { background:var(--purple); padding:14px 18px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; }
.header-brand .brand-name { font-size:20px; font-weight:900; color:var(--lime); letter-spacing:-0.5px; }
.header-brand .brand-stand { font-size:10px; color:var(--lavender); font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.header-right { text-align:right; }
.header-right .today-total { font-size:14px; font-weight:800; color:white; }
.header-right .today-date { font-size:10px; color:var(--lavender); }
.logout-btn { background:rgba(255,255,255,0.15); border:none; border-radius:8px; padding:4px 8px; color:white; font-size:11px; cursor:pointer; margin-left:8px; font-family:inherit; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:white; border-top:1px solid var(--lavender); display:flex; padding:6px 0 10px; box-shadow:0 -2px 12px rgba(45,27,105,0.1); z-index:100; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; cursor:pointer; font-family:inherit; padding:0; }
.nav-item .nav-icon { font-size:20px; }
.nav-item .nav-label { font-size:9px; font-weight:700; color:var(--gray); letter-spacing:0.3px; }
.nav-item.active .nav-label { color:var(--purple); }
.nav-item .nav-dot { width:18px; height:3px; border-radius:99px; background:var(--lime); }

/* CONTENT */
.content { padding:14px; }

/* CARDS */
.card { background:white; border-radius:16px; padding:14px; box-shadow:0 1px 4px rgba(45,27,105,0.08); margin-bottom:12px; }
.card-purple { background:var(--purple); }
.card-lavender { background:var(--lavender-light); }

/* BADGES */
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:700; }
.badge-green { background:#D1FAE5; color:#065F46; }
.badge-amber { background:#FEF3C7; color:#92400E; }
.badge-red { background:#FEE2E2; color:#991B1B; }
.badge-purple { background:var(--lavender-light); color:var(--purple); }
.badge-lime { background:#ECFCCB; color:#365314; }

/* SECTION TITLE */
.section-title { font-size:11px; font-weight:700; color:var(--gray); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:10px; }

/* PRODUCT GRID */
.product-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.product-card { border-radius:14px; padding:10px 8px; text-align:left; cursor:pointer; border:1.5px solid var(--lavender); background:white; font-family:inherit; transition:all 0.15s; }
.product-card.in-cart { background:var(--purple); border:2px solid var(--lime); }
.product-card.out-stock { opacity:0.4; cursor:not-allowed; }
.product-card .p-emoji { font-size:20px; }
.product-card .p-ref { font-size:10px; font-weight:800; color:var(--gray); margin-top:2px; }
.product-card.in-cart .p-ref { color:var(--lavender); }
.product-card .p-name { font-size:12px; font-weight:700; color:var(--purple); line-height:1.2; margin-top:2px; }
.product-card.in-cart .p-name { color:white; }
.product-card .p-sub { font-size:11px; color:var(--gray); }
.product-card.in-cart .p-sub { color:var(--lavender); }
.product-card .p-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
.product-card .p-price { font-size:14px; font-weight:900; color:var(--purple); }
.product-card.in-cart .p-price { color:var(--lime); }
.product-card .p-cart-qty { font-size:10px; color:var(--lime); font-weight:700; margin-top:3px; }

/* CART */
.cart-item { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.cart-item-info { flex:1; }
.cart-item-name { font-size:12px; font-weight:700; color:var(--purple); }
.cart-item-price { font-size:11px; color:var(--gray); }
.qty-controls { display:flex; align-items:center; gap:5px; }
.qty-btn { width:26px; height:26px; border-radius:8px; border:1px solid var(--lavender); background:white; font-weight:800; cursor:pointer; font-family:inherit; font-size:14px; display:flex; align-items:center; justify-content:center; }
.qty-remove { background:#FEE2E2; color:var(--red); border:none; }
.cart-qty { font-size:14px; font-weight:800; color:var(--purple); min-width:18px; text-align:center; }
.cart-subtotal { font-size:13px; font-weight:800; color:var(--purple); min-width:46px; text-align:right; }

/* PAYMENT */
.payment-methods { display:flex; gap:8px; }
.payment-btn { flex:1; padding:10px 4px; border-radius:12px; border:2px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:11px; cursor:pointer; font-family:inherit; text-align:center; transition:all 0.15s; }
.payment-btn.active { border-color:var(--purple); background:var(--purple); color:white; }
.payment-btn .pay-icon { font-size:18px; }

/* TOTAL */
.total-row { display:flex; justify-content:space-between; align-items:center; padding-top:6px; border-top:2px solid var(--purple); }
.total-label { font-size:16px; font-weight:800; color:var(--purple); }
.total-amount { font-size:22px; font-weight:900; color:var(--purple); }
.total-iva { font-size:10px; color:var(--gray); text-align:right; }

/* FILTERS */
.filter-bar { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-btn { flex-shrink:0; padding:6px 12px; border-radius:20px; border:1.5px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:12px; cursor:pointer; font-family:inherit; }
.filter-btn.active { border-color:var(--purple); background:var(--purple); color:white; }

/* PERIOD FILTER */
.period-filter { display:flex; gap:8px; margin-bottom:12px; }
.period-btn { flex:1; padding:8px; border-radius:10px; border:1.5px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; }
.period-btn.active { border-color:var(--purple); background:var(--purple); color:white; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.stat-card { border-radius:14px; padding:14px; text-align:center; }
.stat-label { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.stat-value { font-size:24px; font-weight:900; }

/* BAR CHART */
.bar-chart { display:flex; align-items:flex-end; gap:5px; height:72px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.bar-val { font-size:8px; color:var(--gray); font-weight:700; }
.bar { width:100%; border-radius:4px 4px 0 0; transition:height 0.3s; }
.bar-today { background:var(--lime); }
.bar-other { background:var(--lavender); }
.bar-day { font-size:9px; font-weight:600; }

/* SALE CARD */
.sale-card { border-left:4px solid var(--lime); }
.sale-header { display:flex; justify-content:space-between; align-items:flex-start; }
.sale-meta { font-size:11px; color:var(--gray); }
.sale-items { font-size:12px; color:var(--purple); margin-top:3px; font-weight:600; line-height:1.4; }
.sale-note { font-size:11px; color:var(--gray); margin-top:2px; }
.sale-amount { font-size:16px; font-weight:900; color:var(--purple); }

.inv-item { display:flex; align-items:center; gap:10px; }
.inv-emoji { font-size:22px; }
.inv-info { flex:1; min-width:0; }
.inv-name { font-size:13px; font-weight:700; color:var(--purple); }
.inv-sub { font-size:10px; color:var(--gray); }
.inv-edit-input { width:56px; border-radius:8px; border:2px solid var(--purple); padding:5px; font-size:15px; font-weight:800; color:var(--purple); text-align:center; font-family:inherit; }

/* BUTTONS */
.btn-lime { background:var(--lime); color:white; border:none; border-radius:12px; padding:12px 20px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-lime:disabled { opacity:0.5; cursor:not-allowed; }
.btn-lime-full { width:100%; font-size:16px; padding:14px; margin-top:4px; }
.btn-ghost { background:transparent; color:var(--purple); border:1.5px solid var(--lavender); border-radius:12px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-sm { padding:5px 10px; font-size:12px; border-radius:8px; }

/* SUCCESS */
.success-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:320px; gap:12px; }
.success-emoji { font-size:56px; }
.success-title { font-size:20px; font-weight:800; color:var(--purple); }
.success-amount { font-size:32px; font-weight:900; color:var(--lime); }

/* TOAST */
.toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); font-weight:800; font-size:13px; padding:10px 20px; border-radius:12px; z-index:999; box-shadow:0 4px 16px rgba(0,0,0,0.2); white-space:nowrap; transition:opacity 0.3s; }
.toast-ok { background:var(--lime); color:white; }
.toast-err { background:var(--red); color:white; }

/* LOADING */
.loading-screen { min-height:100vh; background:var(--purple); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
.loading-title { color:var(--lime); font-size:18px; font-weight:800; }
.loading-sub { color:var(--lavender); font-size:12px; }

/* ADMIN */
.store-selector { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; }
.store-btn { flex-shrink:0; padding:6px 14px; border-radius:20px; border:1.5px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:12px; cursor:pointer; font-family:inherit; }
.store-btn.active { border-color:var(--purple); background:var(--purple); color:white; }

/* DISPATCH */
.dispatch-form { display:flex; flex-direction:column; gap:12px; }
.dispatch-select { width:100%; border:1.5px solid var(--lavender); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--purple); font-family:inherit; background:white; }
.dispatch-input { width:100%; border:1.5px solid var(--lavender); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--purple); font-family:inherit; }

/* TEXTAREA */
textarea { width:100%; border-radius:12px; border:1.5px solid var(--lavender); padding:10px; font-size:13px; color:var(--purple); resize:none; font-family:inherit; min-height:52px; }

/* DISCOUNT */
.discount-bar { display:flex; align-items:center; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--lavender); }
.discount-label { font-size:12px; color:var(--gray); flex:1; }
.discount-btn { padding:3px 8px; border-radius:8px; border:1.5px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:11px; cursor:pointer; font-family:inherit; }
.discount-btn.active { border-color:var(--purple); background:var(--purple); color:white; }

/* ALERTS */
.alert-card { border-radius:14px; padding:14px; margin-bottom:12px; }
.alert-red { border-left:4px solid var(--red); background:white; box-shadow:0 1px 4px rgba(45,27,105,0.08); }
.alert-amber { border-left:4px solid var(--amber); background:white; box-shadow:0 1px 4px rgba(45,27,105,0.08); }
.alert-item { font-size:12px; font-weight:700; margin-bottom:4px; }
.alert-item-red { color:var(--red); }
.alert-item-amber { color:var(--amber); }

/* RESPONSIVE */
@media (max-width: 380px) {
  .product-grid { gap:6px; }
  .product-card { padding:8px 6px; }
}
</style>

// Determina si un color de fondo es oscuro (para decidir el color de texto)
function isDarkColor(hex) {
  const c = hex.replace("#","");
  const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  const luminance = (0.299*r + 0.587*g + 0.114*b)/255;
  return luminance < 0.55;
}

// ─── HELPERS ─────────────────────────────────────────────────
const fmt = n => `$${Number(n).toFixed(2)}`;
// Ecuador no usa horario de verano: UTC-5 fijo
const today = () => {
  const d = new Date(Date.now() - 5*60*60*1000); // ajusta a hora Ecuador
  return d.toISOString().slice(0,10);
};
const fmtDate = iso => new Date(iso+"T12:00:00").toLocaleDateString("es-EC",{day:"2-digit",month:"short",year:"numeric"});
const fmtTime = ts => new Date(ts).toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"});
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);

// Verifica si una variante puede armarse completa con el inventario actual del stand
function varianteDisponible(variante, inv) {
  return variante.items.every(it => (inv[it.id]||0) >= it.q);
}

// Una rutina esta disponible si AL MENOS UNA de sus variantes tiene stock completo
function rutinaDisponible(rutina, inv) {
  return rutina.variantes.some(v => varianteDisponible(v, inv));
}

// Determina el standId a usar en la vista de Stock/Inventario segun el rol
function getInvStandId() {
  const role = state.userInfo.role;
  if (role === "admin" || role === "full" || role === "bodega") {
    const view = state.stockView || "consolidado";
    return view === "consolidado" ? "quicentro" : view;
  }
  if (role === "asesor") return state.selectedStand;
  return state.userInfo.stand;
}

// Costo unitario de un producto (para valorizar inventario). Si no hay costo definido, retorna 0.
function getCost(productId) {
  const c = state.costs[productId];
  return (typeof c === "number") ? c : 0;
}

// ─── FINANZAS: HELPERS ────────────────────────────────────────
// Retorna {from, to} (ISO yyyy-mm-dd inclusive) segun el periodo seleccionado
function getFinDateRange() {
  const todayIso = today();
  const d = new Date(Date.now()-5*60*60*1000);
  if (state.finPeriod === "today") return { from: todayIso, to: todayIso };
  if (state.finPeriod === "week") {
    const d2 = new Date(d); d2.setDate(d2.getDate()-6);
    return { from: d2.toISOString().slice(0,10), to: todayIso };
  }
  if (state.finPeriod === "month") {
    const d2 = new Date(d.getFullYear(), d.getMonth(), 1);
    return { from: d2.toISOString().slice(0,10), to: todayIso };
  }
  // "all"
  return { from: "0000-01-01", to: "9999-12-31" };
}

function inFinRange(fecha) {
  const { from, to } = getFinDateRange();
  return fecha >= from && fecha <= to;
}

// COGS de una venta: suma de (cantidad * costo unitario) de cada item, expandiendo rutinas
function ventaCOGS(sale) {
  let cogs = 0;
  (sale.items||[]).forEach(item=>{
    if (item.isRutina && item.rutinaItems) {
      item.rutinaItems.forEach(ri=>{ cogs += (getCost(ri.id)||0) * (ri.q||0) * (item.qty||0); });
    } else {
      cogs += (getCost(item.id)||0) * (item.qty||0);
    }
  });
  return cogs;
}

// ─── FINANZAS: P&G ─────────────────────────────────────────────
function renderFinanzas() {
  const { from, to } = getFinDateRange();
  const periodLabels = { today:"Hoy", week:"Últimos 7 días", month:"Este mes", all:"Todo el histórico" };

  const filteredSales = state.sales.filter(s=>inFinRange(s.fecha) && (state.finStore==="all" || s.stand===state.finStore));
  const filteredGastos = (state.gastos||[]).filter(g=>inFinRange(g.fecha) && (state.finStore==="all" || g.stand===state.finStore));

  const ventas = filteredSales.reduce((s,v)=>s+Number(v.total),0);
  const cogs = filteredSales.reduce((s,v)=>s+ventaCOGS(v),0);
  const margenBruto = ventas - cogs;
  const margenPct = ventas>0 ? (margenBruto/ventas*100) : 0;

  const gastosByCat = GASTO_CATS.map(c=>({...c, total: filteredGastos.filter(g=>g.cat===c.id).reduce((s,g)=>s+Number(g.monto),0)}));
  const totalGastos = gastosByCat.reduce((s,c)=>s+c.total,0);
  const utilidadOperativa = margenBruto - totalGastos;
  const utilidadPct = ventas>0 ? (utilidadOperativa/ventas*100) : 0;

  return `
  <div class="card card-purple" style="padding:16px;margin-bottom:12px;">
    <div style="font-size:11px;color:var(--lavender);font-weight:700;text-transform:uppercase;letter-spacing:1px;">Finanzas · Estado de Resultados</div>
    <div style="font-size:12px;color:var(--lavender);margin-top:4px;">Información privada — Gerardo y Rosita</div>

    ${[["today","Hoy"],["week","7 días"],["month","Mes"],["all","Todo"]].map(([k,l])=>`<button class="period-btn ${state.finPeriod===k?"active":""}" data-fin-period="${k}">${l}</button>`).join("")}

  <div class="store-selector">
    ${[{id:"all",name:"Todos"},...PUNTOS_VENTA].map(s=>`<button class="store-btn ${state.finStore===s.id?"active":""}" data-fin-store="${s.id}">${s.name}</button>`).join("")}

    <button class="filter-btn ${state.finTab==="pyg"?"active":""}" data-fin-tab="pyg">📊 P&amp;G</button>
    <button class="filter-btn ${state.finTab==="sku"?"active":""}" data-fin-tab="sku">🏷️ Margen por SKU</button>
    <button class="filter-btn ${state.finTab==="gastos"?"active":""}" data-fin-tab="gastos">💸 Gastos</button>
  </div>

  ${state.finTab==="pyg" ? renderPYG({ventas,cogs,margenBruto,margenPct,gastosByCat,totalGastos,utilidadOperativa,utilidadPct,periodLabel:periodLabels[state.finPeriod]}) : ""}
  ${state.finTab==="sku" ? renderMargenSKU(filteredSales) : ""}

}

function renderMargenSKU(filteredSales) {
  // Acumular ventas/COGS por producto (expandiendo rutinas a sus componentes para COGS,
  // pero el margen de la rutina se reporta sobre la fila de la rutina misma)
  const bySku = {};
  filteredSales.forEach(sale=>{
    (sale.items||[]).forEach(item=>{
      const key = item.isRutina ? ("RUTINA:"+(item.ref||item.name)) : item.id;
      if(!bySku[key]) bySku[key] = { name:item.name, qty:0, ventas:0, cogs:0, isRutina:!!item.isRutina };
      bySku[key].qty += item.qty;
      bySku[key].ventas += item.subtotal;
      if (item.isRutina && item.rutinaItems) {
        item.rutinaItems.forEach(ri=>{ bySku[key].cogs += (getCost(ri.id)||0)*(ri.q||0)*(item.qty||0); });
      } else {
        bySku[key].cogs += (getCost(item.id)||0)*item.qty;
      }
    });
  });
  const rows = Object.values(bySku).map(r=>({...r, margen:r.ventas-r.cogs, margenPct: r.ventas>0?((r.ventas-r.cogs)/r.ventas*100):0}))
    .sort((a,b)=>b.ventas-a.ventas);

  const totalVentas = rows.reduce((s,r)=>s+r.ventas,0);
  const totalCogs = rows.reduce((s,r)=>s+r.cogs,0);
  const totalMargen = totalVentas-totalCogs;

  if(rows.length===0) return `<div style="text-align:center;padding:32px;color:var(--gray);font-size:14px;">Sin ventas en este período</div>`;

  return `
  <div class="card">
    <div class="section-title">Margen por SKU/Rutina</div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:480px;">
        <thead>
          <tr style="border-bottom:2px solid var(--lavender);">
            <th style="text-align:left;padding:6px 4px;color:var(--gray);font-weight:700;">Producto</th>
            <th style="text-align:center;padding:6px 4px;color:var(--gray);font-weight:700;">Uds</th>
            <th style="text-align:right;padding:6px 4px;color:var(--gray);font-weight:700;">Ventas</th>
            <th style="text-align:right;padding:6px 4px;color:var(--gray);font-weight:700;">Costo</th>
            <th style="text-align:right;padding:6px 4px;color:var(--purple);font-weight:800;">Margen</th>
            <th style="text-align:right;padding:6px 4px;color:var(--purple);font-weight:800;">%</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r=>`<tr style="border-bottom:1px solid var(--lavender-light);">
            <td style="padding:6px 4px;font-weight:700;color:var(--purple);">${r.isRutina?"⭐ ":""}${r.name}</td>
            <td style="text-align:center;padding:6px 4px;color:var(--gray);">${r.qty}</td>
            <td style="text-align:right;padding:6px 4px;font-weight:700;color:var(--purple);">${fmt(r.ventas)}</td>
            <td style="text-align:right;padding:6px 4px;color:var(--gray);">${fmt(r.cogs)}</td>
            <td style="text-align:right;padding:6px 4px;font-weight:900;color:${r.margen>=0?"var(--lime-dark)":"var(--red)"};">${fmt(r.margen)}</td>
            <td style="text-align:right;padding:6px 4px;font-weight:700;color:${r.margenPct>=0?"var(--gray)":"var(--red)"};">${r.margenPct.toFixed(0)}%</td>
          </tr>`).join("")}
        </tbody>
        <tfoot>
          <tr style="border-top:2px solid var(--purple);">
            <td style="padding:6px 4px;font-weight:800;color:var(--purple);">Total</td>
            <td></td>
            <td style="text-align:right;padding:6px 4px;font-weight:900;color:var(--purple);">${fmt(totalVentas)}</td>
            <td style="text-align:right;padding:6px 4px;font-weight:800;color:var(--gray);">${fmt(totalCogs)}</td>
            <td style="text-align:right;padding:6px 4px;font-weight:900;color:${totalMargen>=0?"var(--lime-dark)":"var(--red)"};">${fmt(totalMargen)}</td>
            <td style="text-align:right;padding:6px 4px;font-weight:900;color:var(--purple);">${totalVentas>0?(totalMargen/totalVentas*100).toFixed(0):0}%</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>`;
}

// ─── RENDER ───────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (state.loading) { app.innerHTML = renderLoading(); return; }
  if (!state.user) { app.innerHTML = renderLogin(); bindLogin(); return; }
  if (state.userInfo.role === "asesor" && !state.selectedStand) {
    app.innerHTML = renderStandSelector();
    bindStandSelector();
    return;
  }
  if (state.userInfo.role === "full" && state.tab === "pos" && !state.selectedStand) {
    app.innerHTML = renderStandSelector();
    bindStandSelector();
    return;
  }
  if (state.userInfo.role === "bodega" && state.tab === "pos" && !state.selectedStand) {
    app.innerHTML = renderStandSelector();
    bindStandSelector();
    return;
  }
  app.innerHTML = renderApp();
  bindApp();
}

function renderStandSelector() {
  const role = state.userInfo.role;
  const options = role==="bodega"
    ? PUNTOS_VENTA.filter(p=>p.id==="oficina")
    : PUNTOS_VENTA;
  return `<div class="login-screen">
    <div class="login-logo">WORTHY</div>
    <div class="login-sub">Hola ${state.userInfo.name} 👋</div>
    <div class="login-card">
      <h2>¿En qué punto estás hoy?</h2>
      ${options.map(s => `<button class="btn-primary" data-select-stand="${s.id}" style="margin-bottom:12px;background:var(--purple);">
        ${s.id==="oficina"?"🏢":"🏪"} ${s.name}
      </button>`).join("")}
      <button id="logout-btn-select" style="width:100%;background:transparent;border:none;color:var(--gray);font-size:13px;cursor:pointer;margin-top:8px;font-family:inherit;">Cerrar sesión</button>
      ${state.userInfo.role==="full"||state.userInfo.role==="bodega"?`<button id="back-dashboard-btn" style="width:100%;background:transparent;border:none;color:var(--purple);font-weight:700;font-size:13px;cursor:pointer;margin-top:6px;font-family:inherit;">← Volver al inicio</button>`:""}
    </div>
  </div>`;
}

function bindStandSelector() {
  document.querySelectorAll("[data-select-stand]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.selectedStand = btn.dataset.selectStand;
      state.tab = "pos";
      setupListeners(state.userInfo);
      render();
    });
  });
  document.getElementById("logout-btn-select")?.addEventListener("click", () => auth.signOut());
  document.getElementById("back-dashboard-btn")?.addEventListener("click", () => { state.tab="dashboard"; render(); });
}

function renderLoading() {
  return `<div class="loading-screen">
    <div style="font-size:40px">🌿</div>
    <div class="loading-title">WORTHY POS</div>
    <div class="loading-sub">Cargando sistema...</div>
  </div>`;
}

function renderLogin() {
  return `<div class="login-screen">
    <div class="login-logo">WORTHY</div>
    <div class="login-sub">Sistema de Gestión</div>
    <div class="login-card">
      <h2>Iniciar Sesión</h2>
      <div class="form-group">
        <label>Correo</label>
        <input type="email" id="login-email" placeholder="usuario@worthy.ec" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn">Ingresar</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>`;
}

function bindLogin() {
  const btn = document.getElementById("login-btn");
  const doLogin = async () => {
    const email = document.getElementById("login-email").value.trim();
    const pwd = document.getElementById("login-pwd").value;
    const err = document.getElementById("login-error");
    if (!email||!pwd) { err.textContent="Ingresa correo y contraseña"; return; }
    btn.disabled = true; btn.textContent = "Ingresando...";
    try {
      await auth.signInWithEmailAndPassword(email, pwd);
    } catch(e) {
      err.textContent = "Correo o contraseña incorrectos";
      btn.disabled = false; btn.textContent = "Ingresar";
    }
  };
  btn.addEventListener("click", doLogin);
  document.getElementById("login-pwd").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
}

function renderApp() {
  const u = state.userInfo;
  const todayTotal = state.sales.filter(s=>s.fecha===today()).reduce((s,v)=>s+Number(v.total),0);
  const tabs = getTabsForRole(u.role);

  return `
  ${state.toast ? `<div class="toast toast-${state.toast.type}">${state.toast.msg}</div>` : ""}
  <div class="app">
    <div class="header">
      <div class="header-brand">
        <div class="brand-name">WORTHY</div>
        <div class="brand-stand">${u.emoji} ${u.name}${(u.role==="full"||u.role==="asesor"||u.role==="bodega")&&state.selectedStand?" · "+PUNTOS_VENTA.find(s=>s.id===state.selectedStand)?.name:""}</div>
      </div>
      <div class="header-right" style="display:flex;align-items:center;gap:6px;">
        ${u.role==="stand"?`<div><div class="today-total">${fmt(todayTotal)} hoy</div><div class="today-date">${fmtDate(today())}</div></div>`:""}
        <button class="logout-btn" id="logout-btn">Salir</button>
      </div>
    </div>

    <div class="content">
      ${renderTab()}
    </div>

    <div class="bottom-nav">
      ${tabs.map(t => `
        <button class="nav-item ${state.tab===t.id?"active":""}" data-tab="${t.id}">
          <span class="nav-icon">${t.icon}</span>
          <span class="nav-label">${t.label}</span>
          ${state.tab===t.id?'<div class="nav-dot"></div>':""}
        </button>
      `).join("")}
    </div>
  </div>`;
}

function getTabsForRole(role) {
  const u = state.userInfo;

  // Admin - solo reportes
  if (role === "admin") return [
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"ventas",icon:"📋",label:"Ventas"},
    {id:"inventario",icon:"📦",label:"Inventario"},
    {id:"bodega",icon:"🏭",label:"Bodega"},
  ];

  // Bodega - solo bodega central
  if (role === "bodega") return [
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"pos",icon:"🛒",label:"Vender"},
    {id:"inventario",icon:"📦",label:"Bodega"},
    {id:"despachar",icon:"🚚",label:"Despachar"},
    {id:"kardex",icon:"📒",label:"Kardex"},
    {id:"cambiar",icon:"🔄",label:"Cambiar"},
  ];

  // Full (gerardo, rosita) - todo
  if (role === "full") return [
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"pos",icon:"🛒",label:"Vender"},
    {id:"ventas",icon:"📋",label:"Ventas"},
    {id:"inventario",icon:"📦",label:"Stock"},
    {id:"bodega",icon:"🏭",label:"Bodega"},
    {id:"kardex",icon:"📒",label:"Kardex"},
    ...(u.canFinanzas?[{id:"finanzas",icon:"💰",label:"Finanzas"}]:[]),
    {id:"cambiar",icon:"🔄",label:"Cambiar"},
  ];

  // Asesor - vender + inventario stand
  return [
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"pos",icon:"🛒",label:"Vender"},
    {id:"ventas",icon:"📋",label:"Ventas"},
    {id:"inventario",icon:"📦",label:"Stock"},
    {id:"cambiar",icon:"🔄",label:"Cambiar"},
  ];
}

function renderTab() {
  const role = state.userInfo.role;
  if (state.tab === "cambiar" && role === "asesor") {
    state.selectedStand = null;
    state.tab = "pos";
    render();
    return "";
  }
  if (state.tab === "cambiar" && role === "full") {
    state.selectedStand = null;
    state.tab = "dashboard";
    render();
    return "";
  }
  if (state.tab === "cambiar" && role === "bodega") {
    state.selectedStand = null;
    state.tab = "dashboard";
    render();
    return "";
  }
  switch(state.tab) {
    case "dashboard":  return (role==="admin"||role==="full") ? renderAdminDashboard() : role==="bodega" ? renderBodegaDashboard() : renderStandDashboard();
    case "pos":        return renderPOS();
    case "inventario": return renderInventario();
    case "ventas":     return renderVentas();
    case "despachar":  return renderDespachar();
    case "bodega":     return renderAdminBodega();
    case "kardex":     return renderKardex();
    case "finanzas":   return state.userInfo?.canFinanzas ? renderFinanzas() : "<p>No autorizado</p>";
    default:           return "<p>Tab no encontrado</p>";
  }
}

function renderTrendChart() {
  const ctx = document.getElementById('trendChart');
  if(!ctx) return;
  const wrapper = ctx.parentElement;
  const raw = wrapper?.dataset?.trendChart || "";
  const [labelsJson, dataJson] = raw.split("|||");
  if(!labelsJson || !dataJson) return;
  let labels, data;
  try { labels = JSON.parse(labelsJson); data = JSON.parse(dataJson); } catch(e) { return; }

  if(ctx._chartInstance) { ctx._chartInstance.destroy(); }
  ctx._chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Ventas',
        data: data,
        borderColor: '#8DC63F',
        backgroundColor: 'rgba(141,198,63,0.12)',
        fill: true,
        tension: 0.35,
        pointRadius: 2,
        pointBackgroundColor: '#2D1B69',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(c){ return '$' + c.parsed.y.toFixed(2); } } } },
      scales: {
        y: { ticks: { callback: function(v){ return '$'+v; }, font:{size:9}, color:'#6B7280' }, grid:{ color:'rgba(108,114,128,0.08)'} },
        x: { ticks: { font:{size:9}, color:'#6B7280', maxRotation:0 }, grid:{ display:false } }
      }
    }
  });
}

async function handleKardexEditSave(id) {
  const movs = state.kardexMovements || [];
  const original = movs.find(m=>m.id===id);
  if(!original) { showToast("Movimiento no encontrado","err"); return; }

  const newProduct = state.kxEditProduct;
  const newQty = parseInt(state.kxEditQty)||0;
  if(!newProduct||newQty<=0) { showToast("Completa producto y cantidad","err"); return; }

  state.kxEditSaving = true; render();
  try {
    const bodegaInv = {...(state.inventory["bodega"]||{})};

    // Revertir el efecto del movimiento original sobre el inventario de bodega
    bodegaInv[original.product] = (bodegaInv[original.product]||0) - (original.qty||0);

    // Aplicar el efecto del movimiento nuevo (corregido)
    bodegaInv[newProduct] = (bodegaInv[newProduct]||0) + newQty;

    await db.collection("inventarios").doc("bodega").set(bodegaInv);

    const updatedMov = {
      ...original,
      product: newProduct,
      qty: newQty,
      lote: state.kxEditLote.trim(),
      obs: state.kxEditObs,
      editadoPor: state.user.email,
      editadoEn: new Date().toISOString(),
    };
    await db.collection("kardex").doc(id).set(updatedMov);

    state.inventory["bodega"] = bodegaInv;
    state.kardexMovements = movs.map(m=>m.id===id?updatedMov:m);
    state.editingKardex = null;
    state.kxEditSaving = false;
    showToast("✅ Movimiento actualizado");
    render();
  } catch(e) {
    state.kxEditSaving = false;
    showToast("Error: "+e.message,"err");
    render();
  }
}

async function handleKardexEditDelete(id) {
  const movs = state.kardexMovements || [];
  const original = movs.find(m=>m.id===id);
  if(!original) { showToast("Movimiento no encontrado","err"); return; }

  state.kxEditSaving = true; render();
  try {
    const bodegaInv = {...(state.inventory["bodega"]||{})};
    // Revertir el efecto del movimiento sobre bodega
    bodegaInv[original.product] = (bodegaInv[original.product]||0) - (original.qty||0);
    await db.collection("inventarios").doc("bodega").set(bodegaInv);

    await db.collection("kardex").doc(id).delete();

    state.inventory["bodega"] = bodegaInv;
    state.kardexMovements = movs.filter(m=>m.id!==id);
    state.editingKardex = null;
    state.kxEditSaving = false;
    showToast("✅ Movimiento eliminado");
    render();
  } catch(e) {
    state.kxEditSaving = false;
    showToast("Error: "+e.message,"err");
    render();
  }
}

// ─── HELPERS ─────────────────────────────────────────────────
function getLast7(sales) {
  return getLastN(sales, 7);
}

function getLastN(sales, n) {
  return Array.from({length:n},(_,i)=>{
    const d=new Date(Date.now()-5*60*60*1000); d.setDate(d.getDate()-(n-1-i));
    const iso=d.toISOString().slice(0,10);
    return {
      iso,
      label: d.toLocaleDateString("es-EC",{weekday:"short"}),
      total: sales.filter(s=>s.fecha===iso).reduce((s,v)=>s+Number(v.total),0),
      isToday: iso===today()
    };
  });
}

function bindApp() {

    btn.addEventListener("click",()=>{ state.adminStoreFilter=btn.dataset.invStore; render(); });
  });

  // Stock view selector (consolidado / por punto)
  document.querySelectorAll("[data-stock-view]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.stockView=btn.dataset.stockView; state.editingStock=null; render(); });
  });

  // Cat filter
  document.querySelectorAll("[data-cat]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.catFilter=btn.dataset.cat; render(); });
  });

  // Period filter
  document.querySelectorAll("[data-period]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.periodFilter=btn.dataset.period; render(); });
  });

  // Product cards
  document.querySelectorAll("[data-product]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id=btn.dataset.product;
      const p=CATALOG.find(c=>c.id===id);
      if(!p) return;
      const ex=state.cart.find(i=>i.id===id);
      if(ex) state.cart=state.cart.map(i=>i.id===id?{...i,qty:i.qty+1}:i);
      else state.cart=[...state.cart,{...p,qty:1}];
      render();
    });
  });

  // Cart qty
  document.querySelectorAll("[data-qty-minus]").forEach(btn=>{
    btn.addEventListener("click",()=>{ const id=btn.dataset.qtyMinus; state.cart=state.cart.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty-1)}:i); render(); });
  });
  document.querySelectorAll("[data-qty-plus]").forEach(btn=>{
    btn.addEventListener("click",()=>{ const id=btn.dataset.qtyPlus; state.cart=state.cart.map(i=>i.id===id?{...i,qty:i.qty+1}:i); render(); });
  });
  document.querySelectorAll("[data-qty-remove]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.cart=state.cart.filter(i=>i.id!==btn.dataset.qtyRemove); render(); });
  });

  // Discount
  document.querySelectorAll("[data-discount]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.discount=parseInt(btn.dataset.discount); render(); });
  });

  // Payment
  document.querySelectorAll("[data-payment]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.payment=btn.dataset.payment; render(); });
  });

  // Note
  document.getElementById("sale-note")?.addEventListener("input",e=>{ state.note=e.target.value; });

  // Sell button
  document.getElementById("sell-btn")?.addEventListener("click", handleSell);

  // Inventory edit
  document.querySelectorAll("[data-edit-stock]").forEach(btn=>{
    btn.addEventListener("click",()=>{ const id=btn.dataset.editStock; state.editingStock=id; const sId=getInvStandId(); const inv=state.inventory[sId]||{}; state.editStockVal=String(inv[id]||0); render(); });
  });
  document.querySelectorAll("[data-edit-bodega]").forEach(btn=>{
    btn.addEventListener("click",()=>{ const id=btn.dataset.editBodega; state.editingStock=id; const inv=state.inventory["bodega"]||{}; state.editStockVal=String(inv[id]||0); render(); });
  });
  document.getElementById("inv-cancel")?.addEventListener("click",()=>{ state.editingStock=null; render(); });
  document.getElementById("inv-input")?.addEventListener("input",e=>{ state.editStockVal=e.target.value; });

  document.querySelectorAll("[data-save]").forEach(btn=>{
    btn.addEventListener("click",()=>{ const sId=getInvStandId(); handleUpdateStock(sId, btn.dataset.save, parseInt(state.editStockVal)||0); });
  });
  document.querySelectorAll("[data-save-bodega]").forEach(btn=>{
    btn.addEventListener("click",()=>{ handleUpdateStock("bodega", btn.dataset.saveBodega, parseInt(state.editStockVal)||0); });
  });

  // Cost edit
  document.querySelectorAll("[data-edit-cost]").forEach(btn=>{
    btn.addEventListener("click",()=>{ const id=btn.dataset.editCost; state.editingCost=id; state.editCostVal=String(getCost(id)||""); render(); });
  });
  document.getElementById("cost-cancel")?.addEventListener("click",()=>{ state.editingCost=null; render(); });
  document.getElementById("cost-input")?.addEventListener("input",e=>{ state.editCostVal=e.target.value; });
  document.querySelectorAll("[data-cost-save]").forEach(btn=>{
    btn.addEventListener("click",()=>{ handleUpdateCost(btn.dataset.costSave, parseFloat(state.editCostVal)||0); });
  });

  // Finanzas: filtros
  document.querySelectorAll("[data-fin-period]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.finPeriod=btn.dataset.finPeriod; render(); });
  });
  document.querySelectorAll("[data-fin-store]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.finStore=btn.dataset.finStore; render(); });
  });
  document.querySelectorAll("[data-fin-tab]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.finTab=btn.dataset.finTab; render(); });
  });

  // Finanzas: form gasto
  document.getElementById("gasto-fecha")?.addEventListener("change",e=>{ state.gastoFecha=e.target.value; });
  document.getElementById("gasto-stand")?.addEventListener("change",e=>{ state.gastoStand=e.target.value; });
  document.getElementById("gasto-cat")?.addEventListener("change",e=>{ state.gastoCat=e.target.value; });
  document.getElementById("gasto-monto")?.addEventListener("input",e=>{ state.gastoMonto=e.target.value; });
  document.getElementById("gasto-nota")?.addEventListener("input",e=>{ state.gastoNota=e.target.value; });
  document.getElementById("gasto-save-btn")?.addEventListener("click", handleGastoSave);

  // Finanzas: editar gasto
  document.querySelectorAll("[data-eg-edit]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id = btn.dataset.egEdit;
      const g = (state.gastos||[]).find(x=>x.id===id);
      if(!g) return;
      state.editingGasto = id;
      state.egEditFecha = g.fecha;
      state.egEditStand = g.stand;
      state.egEditCat = g.cat;
      state.egEditMonto = String(g.monto);
      state.egEditNota = g.nota||"";
      render();
    });
  });
  document.getElementById("eg-edit-fecha")?.addEventListener("change",e=>{ state.egEditFecha=e.target.value; });
  document.getElementById("eg-edit-stand")?.addEventListener("change",e=>{ state.egEditStand=e.target.value; });
  document.getElementById("eg-edit-cat")?.addEventListener("change",e=>{ state.egEditCat=e.target.value; });
  document.getElementById("eg-edit-monto")?.addEventListener("input",e=>{ state.egEditMonto=e.target.value; });
  document.getElementById("eg-edit-nota")?.addEventListener("input",e=>{ state.egEditNota=e.target.value; });
  document.getElementById("eg-edit-cancel")?.addEventListener("click",()=>{ state.editingGasto=null; render(); });
  document.getElementById("eg-edit-save")?.addEventListener("click",e=>{ handleGastoEditSave(e.target.dataset.id); });
  document.getElementById("eg-edit-delete")?.addEventListener("click",e=>{
    if(confirm("¿Eliminar este gasto?")) { handleGastoEditDelete(e.target.dataset.id); }
  });

  // Dispatch
  document.getElementById("dispatch-product")?.addEventListener("change",e=>{ state.dispatchProduct=e.target.value; });
  document.getElementById("dispatch-target")?.addEventListener("change",e=>{ state.dispatchTarget=e.target.value; });
  document.getElementById("dispatch-qty")?.addEventListener("input",e=>{ state.dispatchQty=e.target.value; });
  document.getElementById("dispatch-btn")?.addEventListener("click", handleDispatch);

  // Rutinas
  document.querySelectorAll("[data-rutina-open]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.rutinaModal=btn.dataset.rutinaOpen; render(); });
  });
  document.getElementById("close-rutina-modal")?.addEventListener("click",()=>{ state.rutinaModal=null; render(); });
  document.querySelectorAll("[data-add-rutina]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const rutinaId = btn.dataset.addRutina;
      const varId = btn.dataset.variante;
      const rutina = RUTINAS.find(r=>r.id===rutinaId);
      const variante = rutina?.variantes.find(v=>v.id===varId);
      if(!rutina||!variante) return;
      const invNow = state.inventory[getActiveInvSourceId()]||{};
      if(!varianteDisponible(variante, invNow)) { showToast("Sin stock suficiente para esta variante","err"); return; }
      const cartItem = {
        id: varId,
        rutinaId,
        name: rutina.name,
        sub: variante.label,
        price: rutina.price,
        qty: 1,
        isRutina: true,
        items: variante.items,
      };
      const ex = state.cart.find(i=>i.id===varId);
      if(ex) state.cart = state.cart.map(i=>i.id===varId?{...i,qty:i.qty+1}:i);
      else state.cart = [...state.cart, cartItem];
      state.rutinaModal = null;
      render();
    });
  });

  // Kardex
  document.getElementById("kardex-product")?.addEventListener("change",e=>{ state.kardexProduct=e.target.value; });
  document.getElementById("kardex-qty")?.addEventListener("input",e=>{ state.kardexQty=e.target.value; });
  document.getElementById("kardex-lote")?.addEventListener("input",e=>{ state.kardexLote=e.target.value; });
  document.getElementById("kardex-obs")?.addEventListener("input",e=>{ state.kardexObs=e.target.value; });
  document.getElementById("kardex-save-btn")?.addEventListener("click", handleKardexEntrada);
  document.getElementById("kardex-filter")?.addEventListener("change",e=>{ state.kardexFilter=e.target.value; render(); });

  document.querySelectorAll("[data-kx-edit]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id = btn.dataset.kxEdit;
      const m = (state.kardexMovements||[]).find(x=>x.id===id);
      if(!m) return;
      state.editingKardex = id;
      state.kxEditProduct = m.product;
      state.kxEditQty = String(m.qty);
      state.kxEditLote = m.lote||"";
      state.kxEditObs = m.obs||"";
      render();
    });
  });
  document.getElementById("kx-edit-product")?.addEventListener("change",e=>{ state.kxEditProduct=e.target.value; });
  document.getElementById("kx-edit-qty")?.addEventListener("input",e=>{ state.kxEditQty=e.target.value; });
  document.getElementById("kx-edit-lote")?.addEventListener("input",e=>{ state.kxEditLote=e.target.value; });
  document.getElementById("kx-edit-obs")?.addEventListener("input",e=>{ state.kxEditObs=e.target.value; });
  document.getElementById("kx-edit-cancel")?.addEventListener("click",()=>{ state.editingKardex=null; render(); });
  document.getElementById("kx-edit-save")?.addEventListener("click",e=>{ handleKardexEditSave(e.target.dataset.id); });
  document.getElementById("kx-edit-delete")?.addEventListener("click",e=>{
    if(confirm("¿Eliminar este movimiento? Esto ajustará el inventario de bodega.")) {
      handleKardexEditDelete(e.target.dataset.id);
    }
  });
}

// ─── ACTIONS ─────────────────────────────────────────────────
async function handleSell() {
  if (!state.cart.length) return;
  const subtotal = state.cart.reduce((s,i)=>s+i.price*i.qty,0);
  const discAmt = subtotal*state.discount/100;
  const total = subtotal-discAmt;

  const sale = {
    id: genId(),
    fecha: today(),
    timestamp: new Date().toISOString(),
    stand: getActiveSaleStandId(),
    items: state.cart.map(i=>({id:i.id,ref:i.ref||i.rutinaId,name:`${i.name} ${i.sub}`,qty:i.qty,price:i.price,subtotal:i.price*i.qty,isRutina:i.isRutina||false,rutinaItems:i.items||null})),
    subtotal, descuento:state.discount, descuentoAmt:discAmt, total,
    pago: state.payment, nota: state.note
  };

  try {
    // Guardar venta
    await db.collection("ventas").doc(sale.id).set(sale);

    // Actualizar inventario (Oficina descuenta de Bodega Central)
    const invSourceId = getInvSourceForStand(sale.stand);
    const inv = {...(state.inventory[invSourceId]||{})};
    sale.items.forEach(item=>{
      if(item.isRutina && item.rutinaItems) {
        item.rutinaItems.forEach(ri=>{ inv[ri.id]=Math.max(0,(inv[ri.id]||0)-(ri.q*item.qty)); });
      } else {
        inv[item.id]=Math.max(0,(inv[item.id]||0)-item.qty);
      }
    });
    await db.collection("inventarios").doc(invSourceId).set(inv);

    state.inventory[invSourceId] = inv;
    state.sales = [...state.sales, sale];
    state.cart = [];
    state.discount = 0;
    state.note = "";
    state.success = total;
    render();
    setTimeout(()=>{ state.success=null; render(); }, 2200);
  } catch(e) {
    showToast("⚠️ Error al guardar: "+e.message, "err");
  }
}

async function handleUpdateStock(standId, productId, newStock) {
  try {
    const inv = {...(state.inventory[standId]||{})};
    inv[productId] = newStock;
    await db.collection("inventarios").doc(standId).set(inv);
    state.inventory[standId] = inv;
    state.editingStock = null;
    showToast("✅ Stock actualizado");
    render();
  } catch(e) {
    showToast("⚠️ Error: "+e.message, "err");
  }
}

async function handleUpdateCost(productId, newCost) {
  try {
    const costs = {...(state.costs||{})};
    costs[productId] = newCost;
    await db.collection("config").doc("costos").set(costs);
    state.costs = costs;
    state.editingCost = null;
    showToast("✅ Costo actualizado");
    render();
  } catch(e) {
    showToast("⚠️ Error: "+e.message, "err");
  }
}

// ─── GASTOS ──────────────────────────────────────────────────
async function handleGastoSave() {
  if (state.gastoSaving) return;
  const monto = parseFloat(state.gastoMonto)||0;
  if (!state.gastoFecha || !state.gastoStand || !state.gastoCat || monto<=0) {
    showToast("Completa fecha, local, categoría y monto","err"); return;
  }
  state.gastoSaving = true; render();
  try {
    const gasto = {
      id: genId(),
      fecha: state.gastoFecha,
      timestamp: new Date().toISOString(),
      stand: state.gastoStand,
      cat: state.gastoCat,
      monto,
      nota: state.gastoNota.trim(),
      registradoPor: state.user.email,
    };
    await db.collection("gastos").doc(gasto.id).set(gasto);
    state.gastos = [gasto, ...(state.gastos||[])];
    state.gastoMonto=""; state.gastoNota="";
    state.gastoSaving=false;
    showToast("✅ Gasto registrado");
    render();
  } catch(e) {
    state.gastoSaving=false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleGastoEditSave(id) {
  const gastos = state.gastos||[];
  const original = gastos.find(g=>g.id===id);
  if(!original) { showToast("Gasto no encontrado","err"); return; }
  const monto = parseFloat(state.egEditMonto)||0;
  if (!state.egEditFecha || !state.egEditStand || !state.egEditCat || monto<=0) {
    showToast("Completa todos los campos","err"); return;
  }
  state.egEditSaving = true; render();
  try {
    const updated = {
      ...original,
      fecha: state.egEditFecha,
      stand: state.egEditStand,
      cat: state.egEditCat,
      monto,
      nota: state.egEditNota.trim(),
      editadoPor: state.user.email,
      editadoEn: new Date().toISOString(),
    };
    await db.collection("gastos").doc(id).set(updated);
    state.gastos = gastos.map(g=>g.id===id?updated:g);
    state.editingGasto = null;
    state.egEditSaving = false;
    showToast("✅ Gasto actualizado");
    render();
  } catch(e) {
    state.egEditSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleGastoEditDelete(id) {
  const gastos = state.gastos||[];
  state.egEditSaving = true; render();
  try {
    await db.collection("gastos").doc(id).delete();
    state.gastos = gastos.filter(g=>g.id!==id);
    state.editingGasto = null;
    state.egEditSaving = false;
    showToast("✅ Gasto eliminado");
    render();
  } catch(e) {
    state.egEditSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleDispatch() {
  const product = state.dispatchProduct;
  const target = state.dispatchTarget;
  const qty = parseInt(state.dispatchQty)||0;
  if(!product||!qty||qty<=0) { showToast("Completa todos los campos","err"); return; }

  const bodegaInv = {...(state.inventory["bodega"]||{})};
  const available = bodegaInv[product]||0;
  if(available<qty) { showToast(`Solo hay ${available} uds en Bodega`,"err"); return; }

  state.dispatching = true; render();
  try {
    // Restar de bodega
    bodegaInv[product] = available-qty;
    await db.collection("inventarios").doc("bodega").set(bodegaInv);

    // Sumar al stand
    const standInv = {...(state.inventory[target]||{})};
    standInv[product] = (standInv[product]||0)+qty;
    await db.collection("inventarios").doc(target).set(standInv);

    // Registrar movimiento en despachos y kardex
    await db.collection("despachos").add({
      fecha: today(), timestamp: new Date().toISOString(),
      product, qty, from:"bodega", to:target,
      productName: CATALOG.find(p=>p.id===product)?.name+" "+CATALOG.find(p=>p.id===product)?.sub
    });
    await db.collection("kardex").add({
      id: genId(),
      fecha: today(), timestamp: new Date().toISOString(),
      type: "salida",
      product, qty, lote:"", obs:"",
      to: target,
      registradoPor: state.user.email,
    });

    state.inventory["bodega"] = bodegaInv;
    state.inventory[target] = standInv;
    state.dispatchProduct=""; state.dispatchQty=""; state.dispatching=false;
    showToast(`✅ Despachado a ${STANDS.find(s=>s.id===target)?.name}`);
    render();
  } catch(e) {
    state.dispatching=false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}


async function handleKardexEntrada() {
  if (state.kardexSaving) return; // evita doble-registro por doble click
  const product = state.kardexProduct;
  const qty = parseInt(state.kardexQty)||0;
  const lote = state.kardexLote.trim();
  if(!product||qty<=0) { showToast("Selecciona producto y cantidad","err"); return; }

  state.kardexSaving = true; render();
  try {
    const mov = {
      id: genId(),
      fecha: today(),
      timestamp: new Date().toISOString(),
      type: "entrada",
      product, qty, lote,
      obs: state.kardexObs,
      registradoPor: state.user.email,
    };

    // Guardar movimiento en Firestore
    await db.collection("kardex").doc(mov.id).set(mov);

    // Sumar al inventario de bodega
    const bodegaInv = {...(state.inventory["bodega"]||{})};
    bodegaInv[product] = (bodegaInv[product]||0) + qty;
    await db.collection("inventarios").doc("bodega").set(bodegaInv);

    state.inventory["bodega"] = bodegaInv;
    state.kardexMovements = [mov, ...(state.kardexMovements||[])];
    state.kardexProduct=""; state.kardexQty=""; state.kardexLote=""; state.kardexObs="";
    state.kardexSaving = false;
    showToast(`✅ Entrada registrada: ${qty} uds`);
    render();
  } catch(e) {
    state.kardexSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

function showToast(msg, type="ok") {
  state.toast={msg,type};
  render();
  setTimeout(()=>{ state.toast=null; render(); },3000);
}

// ─── FIREBASE LISTENERS ───────────────────────────────────────
function setupListeners(userInfo) {
  // Unsubscribe previous
  if(state.unsubInventory) state.unsubInventory();
  if(state.unsubSales) state.unsubSales();

  // Listen to all inventories
  state.unsubInventory = db.collection("inventarios").onSnapshot(snap=>{
    snap.forEach(doc=>{ state.inventory[doc.id]=doc.data(); });
    render();
  });

  // Listen to sales - stand only sees own, admin/bodega sees all
  let salesQuery = db.collection("ventas").orderBy("timestamp","desc").limit(200);
  if(userInfo.role==="asesor" && state.selectedStand) salesQuery = salesQuery.where("stand","==",state.selectedStand);

  state.unsubSales = salesQuery.onSnapshot(snap=>{
    state.sales = snap.docs.map(d=>d.data());
    render();
  });

  // Kardex listener
  db.collection("kardex").orderBy("timestamp","desc").limit(500).onSnapshot(snap=>{
    state.kardexMovements = snap.docs.map(d=>d.data());
    render();
  });

  // Costos listener
  db.collection("config").doc("costos").onSnapshot(doc=>{
    state.costs = doc.exists ? (doc.data()||{}) : {};
    render();
  });

  // Gastos operativos listener
  if (userInfo.canFinanzas) {
    db.collection("gastos").orderBy("timestamp","desc").limit(1000).onSnapshot(snap=>{
      state.gastos = snap.docs.map(d=>d.data());
      render();
    });
  }
}

// ─── AUTH LISTENER ────────────────────────────────────────────
auth.onAuthStateChanged(user=>{
  if(user) {
    const userInfo = USERS[user.email];
    if(!userInfo) { auth.signOut(); state.loading=false; render(); return; }
    state.user = user;
    state.userInfo = userInfo;
    state.tab = (userInfo.role==="asesor")?"pos":(userInfo.role==="full")?"dashboard":"dashboard";
    state.loading = false;
    setupListeners(userInfo);
    render();
  } else {
    if(state.unsubInventory) state.unsubInventory();
    if(state.unsubSales) state.unsubSales();
    state.user=null; state.userInfo=null;
    state.inventory={}; state.sales=[];
    state.loading=false;
    render();
  }
});

// Initial render
render();
</script>
