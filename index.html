function canUseDespachos() {
  return ["gerardo@worthy.com","rosita@worthy.com","bodega@worthy.com","bodgas@worthy.com"].includes((state.user?.email||"").toLowerCase());
}

function getTabsForRole(role) {
  const u = state.userInfo;

  // Admin - solo reportes
  if (role === "admin") return [
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"ventas",icon:"📋",label:"Ventas"},
    {id:"inventario",icon:"📦",label:"Inventario"},
    {id:"bodega",icon:"🏭",label:"Bodega"},
  ];

  // Bodega - solo bodega central
  if (role === "bodega") return [
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"pos",icon:"🛒",label:"Vender"},
    {id:"inventario",icon:"📦",label:"Bodega"},
    {id:"materiales",icon:"🧾",label:"Materiales"},
    {id:"despachar",icon:"🚚",label:"Despachos"},
    {id:"kardex",icon:"📒",label:"Kardex"},
    {id:"cambiar",icon:"🔄",label:"Cambiar"},
  ];

  // Full (gerardo, rosita) - todo
  if (role === "full") return [
    ...(u.canFinanzas?[{id:"rentabilidad",icon:"📈",label:"Dashboard"}]:[]),
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"pos",icon:"🛒",label:"Vender"},
    {id:"ventas",icon:"📋",label:"Ventas"},
    {id:"inventario",icon:"📦",label:"Stock"},
    {id:"materiales",icon:"🧾",label:"Materiales"},
    ...(canUseDespachos()?[{id:"despachar",icon:"🚚",label:"Despachos"}]:[]),
    {id:"bodega",icon:"🏭",label:"Bodega"},
    {id:"kardex",icon:"📒",label:"Kardex"},
    ...(u.canFinanzas?[{id:"finanzas",icon:"💰",label:"Finanzas"}]:[]),
    {id:"cambiar",icon:"🔄",label:"Cambiar"},
  ];

  // Asesor - vender + inventario stand
  return [
    {id:"dashboard",icon:"📊",label:"Inicio"},
    {id:"pos",icon:"🛒",label:"Vender"},
    {id:"ventas",icon:"📋",label:"Ventas"},
    {id:"inventario",icon:"📦",label:"Stock"},
    {id:"cambiar",icon:"🔄",label:"Cambiar"},
  ];
}

function renderTab() {
  const role = state.userInfo.role;
  if (state.tab === "cambiar" && role === "asesor") {
    state.selectedStand = null;
    state.tab = "pos";
    render();
    return "";
  }
  if (state.tab === "cambiar" && role === "full") {
    state.selectedStand = null;
    state.tab = "dashboard";
    render();
    return "";
  }
  if (state.tab === "cambiar" && role === "bodega") {
    state.selectedStand = null;
    state.tab = "dashboard";
    render();
    return "";
  }
  switch(state.tab) {
    case "dashboard":  return (role==="admin"||role==="full") ? renderAdminDashboard() : role==="bodega" ? renderBodegaDashboard() : renderStandDashboard();
    case "pos":        return renderPOS();
    case "inventario": return renderInventario();
    case "materiales": return (role==="full"||role==="bodega") ? renderMateriales() : "<p>No autorizado</p>";
    case "ventas":     return renderVentas();
    case "despachar":  return canUseDespachos() ? renderDespachar() : "<p>No autorizado</p>";
    case "bodega":     return renderAdminBodega();
    case "kardex":     return renderKardex();
    case "finanzas":   return state.userInfo?.canFinanzas ? renderFinanzas() : "<p>No autorizado</p>";
    case "rentabilidad": return state.userInfo?.canFinanzas ? renderRentabilidadDashboard() : "<p>No autorizado</p>";
    default:           return "<p>Tab no encontrado</p>";
  }
}

function renderStandDashboard() {
  const todaySales = state.sales.filter(s=>s.fecha===today());
  const todayGross = salesGrossTotal(todaySales);
  const todayTotal = salesNetTotal(todaySales);
  const byPay = PAYMENTS.map(pt=>({...pt,t:salesNetTotal(todaySales.filter(s=>s.pago===pt.id)),g:salesGrossTotal(todaySales.filter(s=>s.pago===pt.id))}));
  const last14 = getLastN(state.sales, 14);
  const chartLabels = JSON.stringify(last14.map(d=>d.label));
  const chartData = JSON.stringify(last14.map(d=>Number(d.total.toFixed(2))));
  const chartMeta = encodeURIComponent(JSON.stringify(getTrendChartMeta(last14)));
  const chartMinWidth = getTrendChartMinWidth(last14);
  const topMap={};
  todaySales.forEach(s=>s.items&&s.items.forEach(i=>{topMap[i.id]=(topMap[i.id]||0)+i.qty;}));
  const top = Object.entries(topMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const standId = (state.userInfo.role==="full"||state.userInfo.role==="asesor") ? state.selectedStand : state.userInfo.stand;
  const inv = state.inventory[standId] || {};
  const lowStock = CATALOG.filter(p=>((inv[p.id]||0)>0&&(inv[p.id]||0)<=6));
  const outStock = CATALOG.filter(p=>(inv[p.id]||0)===0);

  return `
  <div class="card card-purple" style="padding:20px;margin-bottom:12px;">
    <div style="font-size:10px;color:var(--lavender);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;">Ventas hoy</div>
    <div style="font-size:40px;font-weight:900;color:var(--lime);margin-top:4px;line-height:1;">${fmt(todayTotal)}</div>
    <div style="font-size:12px;color:var(--lavender);margin-top:4px;">${todaySales.length} transacciones · Ticket promedio ${fmt(todaySales.length?todayTotal/todaySales.length:0)}</div>
    ${renderTaxSummary(todayGross,true)}
    <div style="display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;">
      ${byPay.filter(pt=>pt.t>0).map(pt=>`<div style="flex:1;min-width:70px;background:rgba(255,255,255,0.12);border-radius:10px;padding:8px;text-align:center;">
        <div style="font-size:10px;color:var(--lavender);font-weight:600;">${pt.icon} ${pt.label}</div>
        <div style="font-size:13px;font-weight:800;color:white;margin-top:3px;">${fmt(pt.t)}</div>
        <div style="font-size:9px;color:var(--lavender);margin-top:2px;">Cobrado ${fmt(pt.g)}</div>
      </div>`).join("")}
    </div>
  </div>

  ${renderPaymentConsolidado(todaySales, "Consolidado por medio de pago · Hoy")}

  <div class="card">
    <div class="section-title">Tendencia sin IVA · últimos 14 días</div>
    <div class="sales-chart-legend"><span class="sales-chart-legend-line"></span> Corte de semana: lunes a domingo</div>
    <div class="sales-chart-scroll">
      <div class="sales-chart-inner" style="min-width:${chartMinWidth}px;" data-trend-chart='${chartLabels}|||${chartData}|||${chartMeta}'>
        <canvas id="trendChart" role="img" aria-label="Gráfico de barras de ventas diarias de los últimos 14 días">Tendencia de ventas de los últimos 14 días.</canvas>
      </div>
    </div>
  </div>

  ${top.length>0?`<div class="card">
    <div class="section-title">Más vendido hoy</div>
    ${top.map(([id,qty])=>{const p=CATALOG.find(c=>c.id===id);return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <span style="font-size:18px;">${p?.emoji}</span>
      <div style="flex:1;"><div style="font-size:12px;font-weight:700;color:var(--purple);">${p?.name} ${p?.sub}</div></div>
      <span class="badge badge-lime">${qty} uds</span>
      <span style="font-size:13px;font-weight:800;color:var(--purple);">${fmt((p?getPrice(p.id):0)*qty)}</span>
    </div>`;}).join("")}
  </div>`:""}

  ${outStock.length>0||lowStock.length>0?`<div class="alert-card alert-${outStock.length>0?"red":"amber"}">
    <div class="section-title">${outStock.length>0?"⚠️ Alertas inventario":"📦 Stock bajo"}</div>
    ${outStock.map(p=>`<div class="alert-item alert-item-red">❌ ${p.name} ${p.sub} — AGOTADO</div>`).join("")}
    ${lowStock.map(p=>`<div class="alert-item alert-item-amber">⚡ ${p.name} ${p.sub} — ${inv[p.id]} uds</div>`).join("")}
  </div>`:""}`;
}

// ─── BODEGA DASHBOARD ────────────────────────────────────────
function renderBodegaDashboard() {
  const view = state.bodegaView || "bodega";
  const options = [{id:"all",name:"Todos los puntos",emoji:"📊"},...STOCK_POINTS];
  const selected = options.find(o=>o.id===view) || options.find(o=>o.id==="bodega");
  const inv = view === "all"
    ? CATALOG.reduce((acc,p)=>{
        acc[p.id] = STOCK_POINTS.reduce((sum,pt)=>sum+Number((state.inventory[pt.id]||{})[p.id]||0),0);
        return acc;
      },{})

const DAILY_SALES_GOAL = 134;

function countDaysInclusive(from, to) {
  const start = new Date(from+"T12:00:00");
  const end = new Date(to+"T12:00:00");
  return Math.max(1, Math.round((end-start)/86400000)+1);
}

function salesNetForGoal(from, to, standId) {
  return salesNetTotal(state.sales.filter(s=>
    s.fecha>=from && s.fecha<=to &&
    (standId==="all" || s.stand===standId)
  ));
}

function getGoalProgressMetrics() {
  const now = new Date(Date.now()-5*60*60*1000);
  const todayIso = today();
  const weekStart = dateToIsoLocal(getMonday(now));
  const monthStart = dateToIsoLocal(new Date(now.getFullYear(), now.getMonth(), 1));
  const standId = state.inicioStand || "all";
  const makeMetric = (label, from, to) => {
    const days = countDaysInclusive(from, to);
    const goal = DAILY_SALES_GOAL * days;
    const real = salesNetForGoal(from, to, standId);
    return { label, days, goal, real, pct: goal>0 ? (real/goal*100) : 0 };
  };
  return [
    makeMetric("Diario", todayIso, todayIso),
    makeMetric("Semana", weekStart, todayIso),
    makeMetric("Mes acumulado", monthStart, todayIso),
  ];
}

const RENT_STAGES = [
  { id:"riesgo", label:"Riesgo", min:0, max:77, color:"#D96C6C" },
  { id:"equilibrio", label:"Equilibrio", min:78, max:91, color:"#E8C66A" },
  { id:"crecimiento", label:"Crecimiento", min:92, max:119, color:"#DFA36B" },
  { id:"consolidacion", label:"Consolidación", min:120, max:149, color:"#A8DCAB" },
  { id:"escalabilidad", label:"Escalabilidad", min:150, max:999999, color:"#39FF14" },
];

function getRentStage(value, days=1, thresholds=null) {
  if (thresholds) {
    return thresholds.find(s=>value >= s.min && value <= s.max) || thresholds[0];
  }
  const safeDays = Math.max(1, days||1);
  return RENT_STAGES.find(s=>value >= s.min*safeDays && value <= s.max*safeDays) || RENT_STAGES[0];
}

function buildDynamicRentStages(d) {
  const days = Math.max(1, d.days||1);
  const marginRate = d.ventas > 0 ? Math.max(d.margenBruto / d.ventas, 0.01) : 0.64;
  const fixedToCover = Math.max(d.arriendo + d.sellerCommission + d.bankAndManualCommission, 0);
  const breakEven = fixedToCover / marginRate;
  const periodBreakEven = Math.max(breakEven, 78 * days);
  return [
    { id:"riesgo", label:"Riesgo", min:0, max:Math.max(periodBreakEven-0.01,0), color:"#D96C6C" },
    { id:"equilibrio", label:"Equilibrio", min:periodBreakEven, max:periodBreakEven*1.15, color:"#E8C66A" },
    { id:"crecimiento", label:"Crecimiento", min:periodBreakEven*1.15, max:periodBreakEven*1.50, color:"#DFA36B" },
    { id:"consolidacion", label:"Consolidación", min:periodBreakEven*1.50, max:periodBreakEven*1.90, color:"#A8DCAB" },
    { id:"escalabilidad", label:"Escalabilidad", min:periodBreakEven*1.90, max:999999999, color:"#39FF14" },
  ];
}

function getMonthToDateRange() {
  const now = new Date(Date.now()-5*60*60*1000);
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  return {
    from: dateToIsoLocal(first),
    to: today()
  };
}

function getRentDateRange() {
  const now = new Date(Date.now()-5*60*60*1000);
  const todayIso = today();
  if (state.rentPeriod === "week") {
    return { from:dateToIsoLocal(getMonday(now)), to:todayIso };
  }
  if (state.rentPeriod === "month") return getMonthToDateRange();
  if (state.rentPeriod === "range") {
    const from = state.rentRangoDesde || todayIso;
    const to = state.rentRangoHasta || todayIso;
    return { from: from <= to ? from : to, to: from <= to ? to : from };
  }
  return { from:todayIso, to:todayIso };
}

function getRentFilteredSales(from, to, store) {
  return state.sales.filter(s=>s.fecha>=from && s.fecha<=to && (store==="all" || s.stand===store));
}

function getRentFilteredGastos(from, to, store) {
  return (state.gastos||[]).filter(g=>g.fecha>=from && g.fecha<=to && (store==="all" || g.stand===store));
}

function sumGastosByIds(gastos, ids) {
  return gastos.filter(g=>ids.includes(g.cat)).reduce((s,g)=>s+Number(g.monto||0),0);
}

function getRentData() {
  const store = state.rentStore || "quicentro";
  const range = getRentDateRange();
  const days = countDaysInclusive(range.from, range.to);
  const rangeSales = getRentFilteredSales(range.from, range.to, store);
  const rangeGastos = getRentFilteredGastos(range.from, range.to, store);
  const ventas = salesNetTotal(rangeSales);
  const cogs = rangeSales.reduce((s,v)=>s+ventaCOGS(v),0);
  const margenBruto = ventas - cogs;
  const payment = getPaymentConsolidado(rangeSales);
  const bankCommission = payment.groups.find(g=>g.id==="bendo")?.commission || 0;
  const sellerPay = getSellerPayForRange(rangeSales, range.from, range.to, store);
  const autoRent = getAutomaticRentForRange(range.from, range.to, store);
  const arriendo = autoRent + getManualRentForRange(rangeGastos, store);
  const atencion = 0;
  const transporte = 0;
  const marketing = sumGastosByIds(rangeGastos, ["marketing"]);
  const sellerCommission = sellerPay.total;
  const bankAndManualCommission = getManualBankCommissionExpenses(rangeGastos) + bankCommission;
  const comisiones = sellerCommission + bankAndManualCommission;
  const reinversion = cogs;
  const gastosOperativos = arriendo + atencion + transporte + comisiones + marketing;
  const utilidadOperativa = margenBruto - gastosOperativos;
  const utilidadNeta = ventas - arriendo - atencion - transporte - comisiones - marketing - reinversion;
  const data = {
    store,
    range,
    days,
    dailyValue: days>0 ? ventas/days : ventas,
    periodValue: ventas,
    ventas,
    cogs,
    margenBruto,
    arriendo,
    atencion,
    transporte,
    marketing,
    comisiones,
    sellerBase: sellerPay.base,
    sellerVariable: sellerPay.variable,
    sellerCommission,
    bankAndManualCommission,
    reinversion,
    gastosOperativos,
    utilidadOperativa,
    utilidadNeta,
    cashFlowAvailable: utilidadNeta,
  };
  const periodStages = buildDynamicRentStages(data);
  const dailyStages = periodStages.map(s=>({
    ...s,
    min:s.min / Math.max(days,1),
    max:s.max / Math.max(days,1)
  }));
  data.dynamicStages = periodStages;
  data.dynamicDailyStages = dailyStages;
  data.breakEvenPeriod = periodStages.find(s=>s.id==="equilibrio")?.min || 0;
  data.breakEvenDaily = data.breakEvenPeriod / Math.max(days,1);
  data.dailyStage = getRentStage(data.dailyValue,1,dailyStages);
  data.periodStage = getRentStage(ventas,days,periodStages);
  return data;
}

function getDashboardCashFlow(d) {
  const steps = [
    { id:"ventas", label:"Ingreso por ventas sin IVA", amount:d.ventas, kind:"in", note:"Dinero generado por ventas del periodo seleccionado.", color:"var(--lime)" },
    { id:"bendo", label:"Bendo / comisiones bancarias", amount:-d.bankAndManualCommission, kind:"out", note:"Lo que se descuenta por cobros con tarjeta y comisiones registradas.", color:"#C8B8E8" },
    { id:"producto", label:"Costo del producto", amount:-d.cogs, kind:"out", note:"Reposición de inventario, proveedores y producción.", color:"#D96C6C" },
    { id:"arriendo", label:"Arriendo", amount:-d.arriendo, kind:"out", note:"Quicentro automático; otros puntos se toman de gastos manuales.", color:"#E8C66A" },
    { id:"personal", label:"Personal", amount:-d.sellerCommission, kind:"out", note:`Base ${fmt(d.sellerBase)} + comisiones por venta ${fmt(d.sellerVariable)}.`, color:"#DFA36B" },
  ];
  if (d.marketing > 0) {
    steps.push({ id:"marketing", label:"Mercadeo / obsequios", amount:-d.marketing, kind:"out", note:"Gastos de marketing registrados en el periodo.", color:"var(--purple)" });
  }
  let running = 0;
  return steps.map(step=>{
    running += Number(step.amount||0);
    return { ...step, balance:running };
  });
}

function renderAdminDashboard() {
  const stores = [{id:"all",name:"Todos"},...PUNTOS_VENTA];

  // ── Filtro combinado: periodo (hoy/semana/mes/mesEspecifico/rango) x punto de venta ──
  const filteredSales = getInicioFilteredSales();
  const { from, to } = getInicioDateRange();
  const mesEspecificoLabel = (() => {
    const [y,m] = (state.inicioMesAno||"").split("-").map(Number);
    if(!y||!m) return "";
    return new Date(y, m-1, 1).toLocaleDateString("es-EC",{month:"long",year:"numeric"});
  })();
  const periodLabel = state.inicioPeriod==="hoy" ? "Hoy"
    : state.inicioPeriod==="semana" ? `Semana calendario · ${fmtDate(from)} – ${fmtDate(to)}`
    : state.inicioPeriod==="mes" ? `Mes acumulado · ${fmtDate(from)} – ${fmtDate(to)}`
    : state.inicioPeriod==="mesEspecifico" ? mesEspecificoLabel
    : state.inicioPeriod==="rango" ? `${fmtDate(from)} – ${fmtDate(to)}`
    : state.inicioPeriod==="todo" ? "Todo el histórico"
    : "Hoy";

  const periodGross = salesGrossTotal(filteredSales);
  const periodTotal = salesNetTotal(filteredSales);
  const periodTx = filteredSales.length;
  const avgTicket = periodTx>0 ? periodTotal/periodTx : 0;
  const periodDates = filteredSales.map(s=>s.fecha).filter(Boolean).sort();
  const periodDays = state.inicioPeriod==="todo" && periodDates.length ? countDaysInclusive(periodDates[0], periodDates[periodDates.length-1]) : countDaysInclusive(from, to);
  const avgDaily = periodDays>0 ? periodTotal/periodDays : 0;

  // Comparacion vs ayer (solo tiene sentido si periodo = hoy)
  const yestIso = (()=>{ const d=new Date(Date.now()-5*60*60*1000); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
  const salesForStand = state.inicioStand==="all" ? state.sales : state.sales.filter(s=>s.stand===state.inicioStand);
  const yestTotal = salesNetTotal(salesForStand.filter(s=>s.fecha===yestIso));
  const pctChange = yestTotal>0 ? ((periodTotal-yestTotal)/yestTotal*100) : (periodTotal>0?100:0);

  // Ventas por stand - segun filtro de periodo (todos los stands, independiente del filtro de stand)
  const standTotals = PUNTOS_VENTA.map(st=>{
    const stSales = state.sales.filter(s=>s.fecha>=from && s.fecha<=to && s.stand===st.id);
    return { ...st, total: salesNetTotal(stSales), gross: salesGrossTotal(stSales), count: stSales.length };
  });
  const maxStand = Math.max(...standTotals.map(s=>s.total),1);

  // Ranking de productos (USD y unidades) - segun filtro
  const rankMap = {};
  filteredSales.forEach(s=>{
    const grossItems = (s.items||[]).reduce((sum,i)=>sum+Number(i.subtotal||0),0);
    const netFactor = grossItems>0 ? saleNet(s)/grossItems : 1;
    s.items&&s.items.forEach(i=>{
    if(!rankMap[i.id]) rankMap[i.id] = { id:i.id, name:i.name, qty:0, total:0 };
    rankMap[i.id].qty += i.qty;
    rankMap[i.id].total += Number(i.subtotal||0)*netFactor;
  });
  });
  const topByUsd = Object.values(rankMap).sort((a,b)=>b.total-a.total);

  const composition = getSalesComposition(filteredSales);

function renderBarChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const wrapper = canvas.parentElement;
  const raw = wrapper?.dataset?.trendChart || "";
  const [labelsJson, dataJson, metaEncoded] = raw.split("|||");
  if(!labelsJson || !dataJson) return;

  let labels, data, chartMeta={mode:"summary",weekStarts:[],weekLabels:[]};
  try {
    labels = JSON.parse(labelsJson);
    data = JSON.parse(dataJson);
    if(metaEncoded) chartMeta = JSON.parse(decodeURIComponent(metaEncoded));
  } catch(e) { return; }

  const dailyMode = chartMeta.mode === "daily";
  const weeklyMode = chartMeta.mode === "weekly";
  const smallScreen = window.innerWidth <= 420;
  const showValueLabels = data.length <= 45;
  const topPadding = dailyMode && chartMeta.weekStarts?.length>1 ? 60 : 34;

  if(canvas._chartInstance) canvas._chartInstance.destroy();
  canvas._chartInstance = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Ventas',
        data,
        backgroundColor: '#8DC63F',
        borderColor: '#6fa030',
        borderWidth: 1,
        borderRadius: 6,
        maxBarThickness: dailyMode ? 30 : 44,
        categoryPercentage: dailyMode ? 0.78 : 0.72,
        barPercentage: dailyMode ? 0.9 : 0.88,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      layout: { padding: { top: topPadding, left: 4, right: 6, bottom: 2 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title(items) {
              const label = items?.[0]?.label;
              return Array.isArray(label) ? label.join(' · ') : label;
            },
            label(c){ return 'Ventas sin IVA: $' + Number(c.parsed.y||0).toFixed(2); }
          }
        },
        datalabels: undefined
      },
      scales: {
        y: {
          beginAtZero:true,
          ticks: {
            callback(v){ return '$'+v; },
            font:{size:9,weight:'700'},
            color:'#6B7280',
            maxTicksLimit:6
          },
          grid:{ color:'rgba(108,114,128,0.10)'},
          border:{display:false}
        },
        x: {
          offset:true,
          ticks: {
            font:{size:dailyMode?(smallScreen?10:11):10,weight:'800'},
            color:'#2D1B69',
            maxRotation:0,
            minRotation:0,
            autoSkip:dailyMode || chartMeta.mode==="summary" ? false : true,
            autoSkipPadding:weeklyMode?14:10,
            padding:8
          },
          grid:{ display:false },
          border:{ color:'rgba(45,27,105,.22)' }
        }
      }
    },
    plugins: [
      {
        id:'worthyWeekBands',
        beforeDatasetsDraw(chart) {
          if(!dailyMode || !chartMeta.weekStarts?.length) return;
          const bars = chart.getDatasetMeta(0).data;
          if(!bars.length) return;
          const {ctx,chartArea} = chart;

          // Fondo alternado muy suave para leer cada semana como un bloque.
          chartMeta.weekStarts.forEach((startIndex,weekIndex)=>{
            const nextStart = chartMeta.weekStarts[weekIndex+1] ?? bars.length;
            const first = bars[startIndex];
            const last = bars[Math.max(startIndex,nextStart-1)];
            if(!first || !last) return;
            const left = startIndex===0 ? chartArea.left : (bars[startIndex-1].x+first.x)/2;
            const right = nextStart>=bars.length ? chartArea.right : (last.x+bars[nextStart].x)/2;
            if(weekIndex%2===1) {
              ctx.save();
              ctx.fillStyle='rgba(200,184,232,.10)';
              ctx.fillRect(left,chartArea.top,right-left,chartArea.bottom-chartArea.top);
              ctx.restore();
            }
          });
        },
        afterDraw(chart) {
          if(!dailyMode || !chartMeta.weekStarts?.length) return;
          const bars = chart.getDatasetMeta(0).data;
          if(!bars.length) return;
          const {ctx,chartArea} = chart;

          // Separador visible justo antes de cada lunes, excepto el primer bloque.
          chartMeta.weekStarts.slice(1).forEach(startIndex=>{
            const previous = bars[startIndex-1];
            const current = bars[startIndex];
            if(!previous || !current) return;
            const x = (previous.x+current.x)/2;
            ctx.save();
            ctx.strokeStyle='rgba(45,27,105,.48)';
            ctx.lineWidth=2;
            ctx.setLineDash([5,4]);
            ctx.beginPath();
            ctx.moveTo(x,chartArea.top-5);
            ctx.lineTo(x,chartArea.bottom+2);
            ctx.stroke();
            ctx.restore();
          });

          // Encabezado de cada bloque semanal con total sin IVA.
          if(chartMeta.weekStarts.length > 1) {
            chartMeta.weekStarts.forEach((startIndex,weekIndex)=>{
              const nextStart = chartMeta.weekStarts[weekIndex+1] ?? bars.length;
              const first = bars[startIndex];
              const last = bars[Math.max(startIndex,nextStart-1)];
              if(!first || !last) return;
              const left = startIndex===0 ? chartArea.left : (bars[startIndex-1].x+first.x)/2;
              const right = nextStart>=bars.length ? chartArea.right : (last.x+bars[nextStart].x)/2;
              ctx.save();
              ctx.fillStyle='#2D1B69';
              ctx.font=`800 ${smallScreen?9:10}px system-ui, sans-serif`;
              ctx.textAlign='center';
              ctx.textBaseline='middle';
              const center = (left+right)/2;
              ctx.fillText(chartMeta.weekLabels?.[weekIndex]||'Semana',center,chartArea.top-34);
              ctx.fillStyle='#6fa030';
              ctx.font=`900 ${smallScreen?10:11}px system-ui, sans-serif`;
              ctx.fillText('$'+Number(chartMeta.weekTotals?.[weekIndex]||0).toFixed(0),center,chartArea.top-19);
              ctx.restore();
            });
          }
        }
      },
      {
        id: 'valueLabels',
        afterDatasetsDraw(chart) {
          if(!showValueLabels) return;
          const {ctx} = chart;
          chart.data.datasets.forEach((dataset, i) => {
            const meta = chart.getDatasetMeta(i);
            meta.data.forEach((bar, idx) => {
              const val = Number(dataset.data[idx]||0);
              if(val<=0) return;
              ctx.save();
              ctx.fillStyle = '#2D1B69';
              ctx.font = `900 ${smallScreen?11:12}px system-ui, sans-serif`;
              ctx.textAlign = 'center';
              ctx.fillText('$'+val.toFixed(0), bar.x, bar.y - 6);
              ctx.restore();
            });
          });
        }
      }
    ]
  });
}


function renderDoughnutChart(canvasId) {
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  const wrapper = ctx.parentElement;
  const raw = wrapper?.dataset?.donutChart || "";
  if(!raw) return;
  let payload;
  try { payload = JSON.parse(decodeURIComponent(raw)); } catch(e) { return; }
  const labels = payload.labels||[];
  const values = payload.values||[];
  const total = values.reduce((s,v)=>s+Number(v||0),0);
  if(!total) return;
  const palette = ['#2D1B69','#8DC63F','#C8B8E8','#F59E0B','#0047AB','#8E4585','#FF6B6B','#0BDA51','#FFDE21','#6B7280','#D946EF','#14B8A6','#F97316','#3D2A85'];

  if(ctx._chartInstance) ctx._chartInstance.destroy();
  ctx._chartInstance = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels,
      datasets:[{
        data:values,
        backgroundColor:labels.map((_,i)=>palette[i%palette.length]),
        borderColor:'#FFFFFF',
        borderWidth:2,
        hoverOffset:7,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      cutout:'48%',
      plugins:{
        legend:{
          position:'bottom',
          labels:{
            boxWidth:11,
            boxHeight:11,
            padding:10,
            color:'#2D1B69',
            font:{size:10,weight:'700'},
            generateLabels(chart){
              const ds=chart.data.datasets[0];
              const sum=ds.data.reduce((s,v)=>s+Number(v||0),0);
              return chart.data.labels.map((label,i)=>({
                text:`${label} · ${sum>0?(Number(ds.data[i])/sum*100).toFixed(1):'0.0'}%`,
                fillStyle:ds.backgroundColor[i],
                strokeStyle:'#FFFFFF',
                lineWidth:1,
                hidden:false,
                index:i,
              }));
            }
          }
        },
        tooltip:{
          callbacks:{
            label(c){
              const value=Number(c.raw||0);
              const pct=total>0?value/total*100:0;
              const formatted=payload.valueType==='currency'?fmt(value):`${Number(value.toFixed(2))} uds`;
              return `${c.label}: ${formatted} (${pct.toFixed(1)}%)`;
            }
          }
        }
      }
    },
    plugins:[{
      id:'slicePercentLabels',
      afterDatasetsDraw(chart){
        const ds=chart.data.datasets[0];
        const sum=ds.data.reduce((s,v)=>s+Number(v||0),0);
        const meta=chart.getDatasetMeta(0);
        meta.data.forEach((arc,i)=>{
          const pct=sum>0?Number(ds.data[i])/sum*100:0;
          if(pct<5) return;
          const pos=arc.tooltipPosition();
          const c=chart.ctx;
          c.save();
          c.fillStyle='#FFFFFF';
          c.font='800 10px system-ui, sans-serif';
          c.textAlign='center';
          c.textBaseline='middle';
          c.fillText(`${pct.toFixed(0)}%`,pos.x,pos.y);
          c.restore();
        });
      }
    }]
  });
}

        ${canSeeCosts?`<div style="text-align:right;">
          <div style="font-size:11px;color:var(--lavender);">${totalUnitsGeneral} uds</div>
          <div style="font-size:10px;color:var(--lavender);">en total</div>
        </div>`:""}
      </div>

      <div class="section-title">Stock por SKU — todos los puntos</div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:560px;">
          <thead>
            <tr style="border-bottom:2px solid var(--lavender);">
              <th style="text-align:left;padding:6px 4px;color:var(--gray);font-weight:700;">Producto</th>
              ${STOCK_POINTS.map(pt=>`<th style="text-align:center;padding:6px 4px;color:var(--gray);font-weight:700;">${pt.emoji}<br>${pt.name}</th>`).join("")}
              <th style="text-align:center;padding:6px 4px;color:var(--purple);font-weight:800;">Total</th>
              ${canSeeCosts?`<th style="text-align:center;padding:6px 4px;color:var(--gray);font-weight:700;">Costo<br>unit.</th>
              <th style="text-align:center;padding:6px 4px;color:var(--purple);font-weight:800;">Subtotal</th>`:""}
            </tr>
          </thead>
          <tbody>
            ${CATALOG.map(p=>{
              const rowTotal = STOCK_POINTS.reduce((s,pt)=>s+((state.inventory[pt.id]||{})[p.id]||0),0);
              const cost = getCost(p.id);
              const subtotal = rowTotal*cost;
              return `<tr style="border-bottom:1px solid var(--lavender-light);">
                <td style="padding:6px 4px;font-weight:700;color:var(--purple);">${p.emoji} ${p.name} <span style="color:var(--gray);font-weight:400;">${p.sub}</span></td>
                ${STOCK_POINTS.map(pt=>{
                  const stock = (state.inventory[pt.id]||{})[p.id]||0;
                  const color = stock===0?"var(--red)":stock<=5?"var(--amber)":"var(--gray)";
                  return `<td style="text-align:center;padding:6px 4px;font-weight:700;color:${color};">${stock}</td>`;
                }).join("")}
                <td style="text-align:center;padding:6px 4px;font-weight:900;color:var(--purple);">${rowTotal}</td>
                ${canSeeCosts?`<td style="text-align:center;padding:6px 4px;font-weight:700;color:${cost>0?"var(--gray)":"var(--red)"};">${cost>0?fmt(cost):"—"}</td>
                <td style="text-align:center;padding:6px 4px;font-weight:900;color:var(--purple);">${fmt(subtotal)}</td>`:""}
              </tr>`;
            }).join("")}
          </tbody>
          <tfoot>
            <tr style="border-top:2px solid var(--purple);">
              <td style="padding:6px 4px;font-weight:800;color:var(--purple);">Total uds</td>
              ${STOCK_POINTS.map(pt=>{
                const inv = state.inventory[pt.id]||{};
                const t = CATALOG.reduce((s,p)=>s+(inv[p.id]||0),0);
                return `<td style="text-align:center;padding:6px 4px;font-weight:800;color:var(--purple);">${t}</td>`;
              }).join("")}
              <td style="text-align:center;padding:6px 4px;font-weight:900;color:var(--lime);background:var(--purple);border-radius:6px;">${totalUnitsGeneral}</td>
              ${canSeeCosts?`<td colspan="2"></td>`:""}
            </tr>
            ${canSeeCosts?`<tr style="border-top:1px solid var(--lavender);">
              <td style="padding:6px 4px;font-weight:800;color:var(--purple);">Valor al costo</td>
              ${STOCK_POINTS.map(pt=>{
                const inv = state.inventory[pt.id]||{};
                const v = CATALOG.reduce((s,p)=>s+(inv[p.id]||0)*getCost(p.id),0);
                return `<td style="text-align:center;padding:6px 4px;font-weight:800;color:var(--purple);">${fmt(v)}</td>`;
              }).join("")}
              <td style="text-align:center;padding:6px 4px;font-weight:900;color:var(--lime);background:var(--purple);border-radius:6px;">${fmt(totalGeneral)}</td>
              <td colspan="2"></td>
            </tr>`:""}
          </tfoot>
        </table>
      </div>`;
    }

    // Vista individual de un punto (stand o bodega)
    const point = STOCK_POINTS.find(pt=>pt.id===view) || STOCK_POINTS[0];
    const inv = state.inventory[point.id] || {};
    const totalValue = CATALOG.reduce((s,p)=>s+(inv[p.id]||0)*getCost(p.id),0);

    return `
    <div class="filter-bar">
      <button class="filter-btn" data-stock-view="consolidado">Consolidado</button>
      ${STOCK_POINTS.map(pt=>`<button class="filter-btn ${view===pt.id?"active":""}" data-stock-view="${pt.id}">${pt.emoji} ${pt.name}</button>`).join("")}
    </div>

    <div class="card card-purple" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div>
        <div style="font-size:11px;color:var(--lavender);font-weight:700;text-transform:uppercase;letter-spacing:1px;">${point.emoji} ${point.name}${canSeeCosts?" · valor al costo":""}</div>
        ${canSeeCosts?`<div style="font-size:28px;font-weight:900;color:var(--lime);">${fmt(totalValue)}</div>`:`<div style="font-size:28px;font-weight:900;color:var(--lime);">${CATALOG.reduce((s,p)=>s+(inv[p.id]||0),0)} uds</div>`}
      </div>
      ${canSeeCosts?`<div style="text-align:right;">
        <div style="font-size:11px;color:var(--lavender);">${CATALOG.reduce((s,p)=>s+(inv[p.id]||0),0)} uds</div>
        <div style="font-size:10px;color:var(--lavender);">en stock</div>
      </div>`:""}
    </div>

    <div class="section-title">Stock por SKU — toca ✏️ para ajustar</div>
    ${CATALOG.map(p=>{
      const stock = inv[p.id]||0;
      const level = stock>5?"green":stock>0?"amber":"red";
      return `<div class="card" style="margin-bottom:8px;">
        <div class="inv-item">
          <span class="inv-emoji">${p.emoji}</span>
          <div class="inv-info">
            <div class="inv-name">${p.name} <span style="font-weight:400;color:var(--gray);">${p.sub}</span></div>
            <div class="inv-sub">${p.ref} · ${fmt(getPrice(p.id))}</div>
          </div>
          ${state.editingStock===p.id?`
            <input type="number" class="inv-edit-input" id="inv-input" value="${state.editStockVal}" min="0">
            <button class="btn-lime btn-sm" id="inv-save" data-save="${p.id}">OK</button>
            <button class="btn-ghost btn-sm" id="inv-cancel">✕</button>
          `:`
            <span class="badge badge-${level}">${stock} uds</span>
            <button style="background:var(--lavender-light);border:none;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:13px;" data-edit-stock="${p.id}">✏️</button>
          `}
        </div>
      </div>`;
    }).join("")}`;
  }


  // Asesor / stand: solo su propio punto, sin selector
  const standId = getInvStandId();
  const inv = state.inventory[standId] || {};
  const totalValue = CATALOG.reduce((s,p)=>s+(inv[p.id]||0)*getCost(p.id),0);

  return `
  <div class="card card-purple" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div>
      <div style="font-size:11px;color:var(--lavender);font-weight:700;text-transform:uppercase;letter-spacing:1px;">Valor en stock (al costo)</div>
      <div style="font-size:28px;font-weight:900;color:var(--lime);">${fmt(totalValue)}</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px;color:var(--lavender);">${CATALOG.reduce((s,p)=>s+(inv[p.id]||0),0)} uds</div>
      <div style="font-size:10px;color:var(--lavender);">en stock</div>
    </div>
  </div>

  <div class="section-title">Stock por SKU — toca ✏️ para ajustar</div>
  ${CATALOG.map(p=>{
    const stock = inv[p.id]||0;
    const level = stock>5?"green":stock>0?"amber":"red";
    return `<div class="card" style="margin-bottom:8px;">
      <div class="inv-item">
        <span class="inv-emoji">${p.emoji}</span>
        <div class="inv-info">
          <div class="inv-name">${p.name} <span style="font-weight:400;color:var(--gray);">${p.sub}</span></div>
          <div class="inv-sub">${p.ref} · ${fmt(getPrice(p.id))}</div>
        </div>
        ${state.editingStock===p.id?`
          <input type="number" class="inv-edit-input" id="inv-input" value="${state.editStockVal}" min="0">
          <button class="btn-lime btn-sm" id="inv-save" data-save="${p.id}">OK</button>
          <button class="btn-ghost btn-sm" id="inv-cancel">✕</button>
        `:`
          <span class="badge badge-${level}">${stock} uds</span>
          <button style="background:var(--lavender-light);border:none;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:13px;" data-edit-stock="${p.id}">✏️</button>
        `}
      </div>
    </div>`;
  }).join("")}`;
}

// ─── VENTAS ──────────────────────────────────────────────────
function renderVentas() {
  const role = state.userInfo.role;
  const canFilterStore = role==="admin" || role==="full";
  const baseSales = (canFilterStore && state.adminStoreFilter!=="all")
    ? state.sales.filter(s=>s.stand===state.adminStoreFilter)
    : state.sales;

  const { from, to } = getPeriodRange(state.ventasPeriod, state.ventasMesAno, state.ventasRangoDesde, state.ventasRangoHasta);
  let filteredSales = baseSales.filter(s=>s.fecha>=from && s.fecha<=to);

  filteredSales = [...filteredSales].sort((a,b)=>String(b.timestamp).localeCompare(String(a.timestamp)));
  const totalGross = salesGrossTotal(filteredSales);
  const totalRev = salesNetTotal(filteredSales);
  const mesEspecificoLabel = (() => {
    const [y,m] = (state.ventasMesAno||"").split("-").map(Number);
    if(!y||!m) return "";
    return new Date(y, m-1, 1).toLocaleDateString("es-EC",{month:"long",year:"numeric"});
  })();
  const periodLabel = state.ventasPeriod==="hoy" ? "Hoy"
    : state.ventasPeriod==="semana" ? `Semana calendario · ${fmtDate(from)} – ${fmtDate(to)}`
    : state.ventasPeriod==="mes" ? `Mes acumulado · ${fmtDate(from)} – ${fmtDate(to)}`
    : state.ventasPeriod==="mesEspecifico" ? mesEspecificoLabel
    : state.ventasPeriod==="rango" ? `${fmtDate(from)} – ${fmtDate(to)}`
    : state.ventasPeriod==="todo" ? "Todo el histórico"
    : "Hoy";

  const breakdownDates = filteredSales.map(s=>s.fecha).filter(Boolean).sort();
  const breakdownFrom = state.ventasPeriod==="todo" && breakdownDates.length ? breakdownDates[0] : from;
  const breakdownTo = state.ventasPeriod==="todo" && breakdownDates.length ? breakdownDates[breakdownDates.length-1] : to;
  const breakdown = state.ventasPeriod==="todo" && !breakdownDates.length ? [] : getDailyBreakdown(filteredSales, breakdownFrom, breakdownTo);
  const breakdownLabels = JSON.stringify(breakdown.map(d=>d.label));
  const breakdownData = JSON.stringify(breakdown.map(d=>Number(d.total.toFixed(2))));
  const breakdownMetaObject = getTrendChartMeta(breakdown);
  const breakdownMeta = encodeURIComponent(JSON.stringify(breakdownMetaObject));
  const breakdownMinWidth = getTrendChartMinWidth(breakdown);

  return `
  ${canFilterStore?`<div class="store-selector">
    ${[{id:"all",name:"Todos"},...PUNTOS_VENTA].map(s=>`<button class="store-btn ${state.adminStoreFilter===s.id?"active":""}" data-store="${s.id}">${s.id==="oficina"?"🏢 ":s.id!=="all"?"🏪 ":""}${s.name}</button>`).join("")}
  </div>`:""}

  <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <button onclick="exportToExcel()" style="background:var(--lime);color:white;border:none;border-radius:10px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">📥 Exportar Excel</button>
  </div>
  <div class="period-filter" style="flex-wrap:wrap;">
    <button class="period-btn ${state.ventasPeriod==="hoy"?"active":""}" data-ventas-period="hoy">Hoy</button>
    <button class="period-btn ${state.ventasPeriod==="semana"?"active":""}" data-ventas-period="semana">Semana</button>
    <button class="period-btn ${state.ventasPeriod==="mes"?"active":""}" data-ventas-period="mes">Mes actual</button>
    <button class="period-btn ${state.ventasPeriod==="mesEspecifico"?"active":""}" data-ventas-period="mesEspecifico">📅 Mes</button>
    <button class="period-btn ${state.ventasPeriod==="rango"?"active":""}" data-ventas-period="rango">📅 Rango</button>
    <button class="period-btn ${state.ventasPeriod==="todo"?"active":""}" data-ventas-period="todo">Todo</button>
  </div>
  ${state.ventasPeriod==="mesEspecifico"?`<div class="card" style="margin-bottom:12px;padding:10px;">
    <input type="month" class="dispatch-input" id="ventas-mes" value="${state.ventasMesAno}" max="${today().slice(0,7)}">
  </div>`:""}
  ${state.ventasPeriod==="rango"?`<div class="card" style="margin-bottom:12px;padding:10px;display:flex;flex-direction:column;gap:8px;">
    <div>
      <label style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;">Desde</label>
      <input type="date" class="dispatch-input" id="ventas-rango-desde" value="${state.ventasRangoDesde}" max="${today()}">
    </div>
    <div>
      <label style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;">Hasta</label>
      <input type="date" class="dispatch-input" id="ventas-rango-hasta" value="${state.ventasRangoHasta}" max="${today()}">
    </div>
  </div>`:""}

  <div class="card card-purple" style="padding:16px;margin-bottom:12px;">
    <div class="section-title" style="color:var(--lavender);margin-bottom:4px;">Ingresos · ${periodLabel}</div>
    <div style="font-size:30px;font-weight:900;color:var(--lime);">${fmt(totalRev)}</div>
    <div style="font-size:11px;color:var(--lavender);">${filteredSales.length} transacciones · Ticket promedio ${fmt(filteredSales.length?totalRev/filteredSales.length:0)}</div>
    ${renderTaxSummary(totalGross,true)}
  </div>

  <div class="card" style="margin-bottom:12px;">
    <div class="section-title">Ventas sin IVA por ${breakdownMetaObject.mode==="daily"?"día":"semana calendario"} · ${periodLabel}</div>
    ${breakdownMetaObject.mode==="daily"?`<div class="sales-chart-legend"><span class="sales-chart-legend-line"></span> Cada línea separa una semana calendario · Lunes a domingo</div>`:""}
    <div class="sales-chart-scroll">
      <div class="sales-chart-inner" style="min-width:${breakdownMinWidth}px;" data-trend-chart='${breakdownLabels}|||${breakdownData}|||${breakdownMeta}'>
        <canvas id="ventasTrendChart" role="img" aria-label="Gráfico de barras de ventas por periodo">Ventas por periodo.</canvas>
      </div>
    </div>
  </div>

  ${renderPaymentConsolidado(filteredSales, `Consolidado por medio de pago · ${periodLabel}`)}

  ${filteredSales.length===0
    ?`<div style="text-align:center;padding:32px;color:var(--gray);font-size:14px;">Sin ventas en este período</div>`
    :filteredSales.map(sale=>{
      const isEditing = state.editingSale===sale.id;
      const canEdit = role==="full";
      if (isEditing) {
        const evSubtotal = (state.evEditItems||[]).reduce((s,it)=>s+it.price*it.qty,0);
        const evDescAmt = evSubtotal*(state.evEditDescuento||0)/100;
        const evTotal = evSubtotal - evDescAmt;
        return `<div class="card" style="margin-bottom:8px;border-left:4px solid var(--purple);">
          <div class="section-title">Editar venta · ${fmtDate(sale.fecha)} ${fmtTime(sale.timestamp)}</div>
          ${(state.evEditItems||[]).map((it,idx)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:700;color:var(--purple);">${it.name}</div>
              <div style="font-size:11px;color:var(--gray);">${fmt(it.price)} c/u</div>
            </div>
            <div class="qty-controls">
              <button class="qty-btn" data-ev-qty-minus="${idx}">−</button>
              <span class="cart-qty">${it.qty}</span>
              <button class="qty-btn" data-ev-qty-plus="${idx}">+</button>
            </div>
            <span class="cart-subtotal">${fmt(it.price*it.qty)}</span>
          </div>`).join("")}

          <div class="discount-bar">
            <span class="discount-label">Descuento</span>
            ${[0,5,10,15,20].map(d=>`<button class="discount-btn ${state.evEditDescuento===d?"active":""}" data-ev-discount="${d}">${d}%</button>`).join("")}
          </div>

          <div style="margin-top:10px;">
            <div class="section-title">Método de pago</div>
            <div class="payment-methods">
              ${PAYMENTS.map(pt=>`<button class="payment-btn ${state.evEditPago===pt.id?"active":""}" data-ev-payment="${pt.id}">
                <div class="pay-icon">${pt.icon}</div>
                <div>${pt.label}</div>
              </button>`).join("")}
            </div>
          </div>

          <textarea id="ev-edit-nota" placeholder="Nota opcional..." style="margin-top:10px;">${state.evEditNota}</textarea>

          <div style="margin-top:10px;">
            ${state.evEditDescuento>0?`<div class="total-iva" style="text-align:right;margin-bottom:4px;">Descuento ${state.evEditDescuento}% incluido</div>`:""}
            ${renderTaxSummary(evTotal)}
          </div>

          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn-lime" style="flex:1;" id="ev-edit-save" data-id="${sale.id}" ${state.evEditSaving?"disabled":""}>${state.evEditSaving?"Guardando...":"Guardar"}</button>
            <button class="btn-ghost" style="flex:1;" id="ev-edit-cancel">Cancelar</button>
          </div>
          <button class="btn-ghost" style="color:var(--red);border-color:var(--red);width:100%;margin-top:8px;" id="ev-edit-delete" data-id="${sale.id}" ${state.evEditSaving?"disabled":""}>🗑️ Eliminar venta completa</button>
        </div>`;
      }
      return `<div class="card sale-card" style="margin-bottom:8px;">
      <div class="sale-header">
        <div style="flex:1;min-width:0;">
          <div class="sale-meta">${fmtDate(sale.fecha)} · ${fmtTime(sale.timestamp)}${role==="admin"&&sale.stand?` · ${PUNTOS_VENTA.find(s=>s.id===sale.stand)?.name||sale.stand}`:""}${sale.historica?` · <span style="color:var(--purple);font-weight:700;">📜 Histórica</span>`:""}</div>
          <div class="sale-items">${sale.items?sale.items.map(i=>`${i.name} ×${i.qty}`).join(" · "):"—"}</div>
          ${sale.nota?`<div class="sale-note">📝 ${sale.nota}</div>`:""}
        </div>
        <div style="text-align:right;margin-left:8px;">
          <div class="sale-amount">${fmt(saleNet(sale))}</div>
          <div style="font-size:11px;color:var(--gray);text-align:right;margin-top:2px;">IVA 15%: ${fmt(getTaxBreakdown(sale.total).iva)}<br>Total cobrado: ${fmt(sale.total)}</div>
          <span class="badge badge-${sale.obsequio?"lime":sale.pago==="efectivo"?"green":PAYMENTS.find(p=>p.id===sale.pago)?.group==="bendo"?"purple":"amber"}">
            ${sale.obsequio?"🎁 Obsequio":`${PAYMENTS.find(p=>p.id===sale.pago)?.icon||""} ${PAYMENTS.find(p=>p.id===sale.pago)?.label||sale.pago}`}
          </span>
        </div>
      </div>
      ${canEdit?`<div style="margin-top:8px;text-align:right;">
        <button class="btn-ghost" data-ev-edit="${sale.id}" style="font-size:11px;padding:4px 10px;">✏️ Editar</button>
      </div>`:""}
    </div>`;
    }).join("")}`;
}

// ─── DESPACHOS ───────────────────────────────────────────────
function renderDespachar() {
  const inv = state.inventory["bodega"] || {};
  const mode = state.dispatchMode || "bodega_punto";
  const isPlantEntry = mode === "planta_bodega";
  return `
  <div class="card card-purple" style="margin-bottom:12px;padding:16px;">
    <div style="font-size:11px;color:var(--lavender);font-weight:700;text-transform:uppercase;letter-spacing:1px;">Despachos</div>
    <div style="font-size:12px;color:var(--lavender);margin-top:4px;">Registra entradas desde planta y salidas de Bodega Central hacia cada punto de venta</div>
  </div>

  <div class="card">
    <div class="dispatch-form">
      <div>
        <div class="section-title">Tipo de movimiento</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <button class="period-btn ${mode==="bodega_punto"?"active":""}" data-dispatch-mode="bodega_punto" style="font-size:13px;">Bodega → Punto</button>
          <button class="period-btn ${mode==="planta_bodega"?"active":""}" data-dispatch-mode="planta_bodega" style="font-size:13px;">Planta → Bodega</button>
        </div>
      </div>
      <div>
        <div class="section-title">Producto</div>
        <select class="dispatch-select" id="dispatch-product">
          <option value="">Selecciona un producto...</option>
          ${CATALOG.map(p=>`<option value="${p.id}" ${state.dispatchProduct===p.id?"selected":""}>${p.name} ${p.sub}${isPlantEntry?"":" — Stock bodega: "+(inv[p.id]||0)+" uds"}</option>`).join("")}
        </select>
      </div>
      ${!isPlantEntry?`<div>
        <div class="section-title">Destino</div>
        <select class="dispatch-select" id="dispatch-target">
          ${PUNTOS_VENTA.map(s=>`<option value="${s.id}" ${state.dispatchTarget===s.id?"selected":""}>${s.name}</option>`).join("")}
        </select>
      </div>`:`<div style="background:var(--lavender-light);border-radius:12px;padding:10px;">
        <div style="font-size:11px;font-weight:900;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;">Destino</div>
        <div style="font-size:15px;font-weight:900;color:var(--purple);margin-top:2px;">Bodega Central</div>
      </div>`}
      <div>
        <div class="section-title">Cantidad</div>
        <input type="number" class="dispatch-input" id="dispatch-qty" min="1" placeholder="${isPlantEntry?"Cantidad recibida desde planta":"Cantidad a despachar"}" value="${state.dispatchQty}">
      </div>
      <button class="btn-lime btn-lime-full" id="dispatch-btn" ${state.dispatching?"disabled":""}>
        ${state.dispatching?"Guardando...":isPlantEntry?"🏭 Confirmar entrada a bodega":"🚚 Confirmar despacho"}
      </button>

function auditProductMatches(productId, filterId) {
  if (filterId === "balm_all") return ["WLBN6","WLBP6","WLBR6"].includes(productId);
  return productId === filterId;
}

function auditSaleQtyForProduct(sale, filterId) {
  return (sale.items||[]).reduce((sum,item)=>{
    if (item.isRutina && item.rutinaItems) {
      return sum + item.rutinaItems.reduce((s,ri)=>s+(auditProductMatches(ri.id,filterId)?Number(ri.q||0)*Number(item.qty||0):0),0);
    }
    return sum + (auditProductMatches(item.id,filterId)?Number(item.qty||0):0);
  },0);
}

function renderInventoryAudit() {
  const date = state.auditDate || today();
  const stand = state.auditStand || "quicentro";
  const product = state.auditProduct || "balm_all";
  const productOptions = [
    { id:"balm_all", label:"Todos Lip Balm" },
    ...CATALOG.map(p=>({ id:p.id, label:`${p.name} ${p.sub}` }))
  ];
  const standOptions = STOCK_POINTS.filter(s=>s.id!=="bodega");
  const salesRows = (state.sales||[])
    .filter(s=>s.fecha===date && s.stand===stand)
    .map(s=>({ sale:s, qty:auditSaleQtyForProduct(s,product) }))
    .filter(r=>r.qty>0)
    .sort((a,b)=>String(a.sale.timestamp||"").localeCompare(String(b.sale.timestamp||"")));
  const saleQty = salesRows.reduce((sum,r)=>sum+r.qty,0);
  const kardexRows = (state.kardexMovements||[]).filter(m=>{
    if (m.fecha !== date || !auditProductMatches(m.product, product)) return false;
    if (m.type === "ajuste") return m.standId === stand;
    if (m.type === "salida") return m.to === stand;
    if (m.type === "entrada") return m.standId === stand || m.to === stand;
    return false;
  }).sort((a,b)=>String(a.timestamp||"").localeCompare(String(b.timestamp||"")));
  const incoming = kardexRows.reduce((sum,m)=>{
    if (m.type==="ajuste") return sum + Math.max(Number(m.qty||0),0);
    if (m.type==="salida" && m.to===stand) return sum + Number(m.qty||0);
    if (m.type==="entrada" && (m.standId===stand || m.to===stand)) return sum + Number(m.qty||0);
    return sum;
  },0);
  const outgoing = saleQty + kardexRows.reduce((sum,m)=>{
    if (m.type==="ajuste") return sum + Math.max(-Number(m.qty||0),0);
    return sum;
  },0);
  const net = incoming - outgoing;
  const currentStock = product==="balm_all"
    ? ["WLBN6","WLBP6","WLBR6"].reduce((s,id)=>s+Number((state.inventory[stand]||{})[id]||0),0)
    : Number((state.inventory[stand]||{})[product]||0);
  return `<div class="card" style="margin-bottom:12px;border:2px solid var(--lavender);">
    <div class="section-title">Seguimiento de inventario</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:10px;">
      <input type="date" class="dispatch-input" id="audit-date" value="${date}" max="${today()}">
      <select class="dispatch-select" id="audit-stand">
        ${standOptions.map(s=>`<option value="${s.id}" ${stand===s.id?"selected":""}>${s.name}</option>`).join("")}
      </select>
      <select class="dispatch-select" id="audit-product">
        ${productOptions.map(p=>`<option value="${p.id}" ${product===p.id?"selected":""}>${p.label}</option>`).join("")}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;">
      <div style="background:var(--lavender-light);border-radius:10px;padding:8px;text-align:center;"><div style="font-size:11px;color:var(--gray);font-weight:800;">Entradas</div><div style="font-size:20px;color:var(--lime-dark);font-weight:1000;">+${incoming}</div></div>
      <div style="background:var(--lavender-light);border-radius:10px;padding:8px;text-align:center;"><div style="font-size:11px;color:var(--gray);font-weight:800;">Salidas venta</div><div style="font-size:20px;color:var(--red);font-weight:1000;">-${saleQty}</div></div>
      <div style="background:var(--lavender-light);border-radius:10px;padding:8px;text-align:center;"><div style="font-size:11px;color:var(--gray);font-weight:800;">Neto dia</div><div style="font-size:20px;color:var(--purple);font-weight:1000;">${net>0?"+":""}${net}</div></div>
      <div style="background:var(--lavender-light);border-radius:10px;padding:8px;text-align:center;"><div style="font-size:11px;color:var(--gray);font-weight:800;">Stock actual</div><div style="font-size:20px;color:var(--purple);font-weight:1000;">${currentStock}</div></div>
    </div>
    ${salesRows.length?`<div style="font-size:12px;font-weight:900;color:var(--purple);margin:8px 0 5px;">Ventas que descontaron este producto</div>
      ${salesRows.map(r=>`<div style="border-top:1px solid var(--lavender-light);padding:6px 0;font-size:12px;color:var(--gray);">
        <strong style="color:var(--red);">-${r.qty}</strong> · ${fmtTime(r.sale.timestamp)} · ${(r.sale.items||[]).map(i=>`${i.name} x${i.qty}`).join(" · ")}
      </div>`).join("")}`:`<div style="font-size:12px;color:var(--gray);padding:8px 0;">No hay ventas de este producto en la fecha seleccionada.</div>`}
    ${kardexRows.length?`<div style="font-size:12px;font-weight:900;color:var(--purple);margin:10px 0 5px;">Ajustes / despachos del dia</div>
      ${kardexRows.map(m=>`<div style="border-top:1px solid var(--lavender-light);padding:6px 0;font-size:12px;color:var(--gray);">
        <strong style="color:${m.type==="ajuste"&&Number(m.qty)<0?"var(--red)":"var(--lime-dark)"};">${m.type==="ajuste"&&Number(m.qty)<0?"":"+"}${m.qty}</strong> · ${fmtTime(m.timestamp)} · ${m.type} · ${m.obs||""} ${m.to?`· hacia ${STANDS.find(s=>s.id===m.to)?.name||m.to}`:""}
      </div>`).join("")}`:""}
    <div style="font-size:11px;color:var(--gray);margin-top:8px;">Nota: esta auditoria detecta ventas, rutinas, despachos y ajustes con registro. Una edicion directa del numero de stock no deja detalle historico.</div>
  </div>`;
}

async function handleKardexEditSave(id) {
  const movs = state.kardexMovements || [];
  const original = movs.find(m=>m.id===id);
  if(!original) { showToast("Movimiento no encontrado","err"); return; }

  const newProduct = state.kxEditProduct;
  const newQty = parseInt(state.kxEditQty)||0;
  if(!newProduct||newQty<=0) { showToast("Completa producto y cantidad","err"); return; }

  state.kxEditSaving = true; render();
  try {
    const updatedMov = {
      ...original,
      product: newProduct,
      qty: newQty,
      lote: state.kxEditLote.trim(),
      obs: state.kxEditObs,
      editadoPor: state.user.email,
      editadoEn: new Date().toISOString(),
    };
    let bodegaInv = null;
    await db.runTransaction(async tx=>{
      const invRef = db.collection("inventarios").doc("bodega");
      const invDoc = await tx.get(invRef);
      bodegaInv = {...(invDoc.exists ? (invDoc.data()||{}) : {})};
      bodegaInv[original.product] = Number(bodegaInv[original.product]||0) - Number(original.qty||0);
      if (bodegaInv[original.product] < 0) throw new Error(`No puedes dejar stock negativo al editar ${original.product}`);
      bodegaInv[newProduct] = Number(bodegaInv[newProduct]||0) + newQty;
      tx.set(invRef, bodegaInv);
      tx.set(db.collection("kardex").doc(id), updatedMov);
    });

    state.inventory["bodega"] = bodegaInv;
    state.kardexMovements = movs.map(m=>m.id===id?updatedMov:m);
    state.editingKardex = null;
    state.kxEditSaving = false;
    showToast("✅ Movimiento actualizado");
    render();
  } catch(e) {
    state.kxEditSaving = false;
    showToast("Error: "+e.message,"err");
    render();
  }
}

async function handleKardexEditDelete(id) {
  const movs = state.kardexMovements || [];
  const original = movs.find(m=>m.id===id);
  if(!original) { showToast("Movimiento no encontrado","err"); return; }

  state.kxEditSaving = true; render();
  try {
    let bodegaInv = null;
    await db.runTransaction(async tx=>{
      const invRef = db.collection("inventarios").doc("bodega");
      const invDoc = await tx.get(invRef);
      bodegaInv = {...(invDoc.exists ? (invDoc.data()||{}) : {})};
      bodegaInv[original.product] = Number(bodegaInv[original.product]||0) - Number(original.qty||0);
      if (bodegaInv[original.product] < 0) throw new Error(`No puedes dejar stock negativo al eliminar ${original.product}`);
      tx.set(invRef, bodegaInv);
      tx.delete(db.collection("kardex").doc(id));
    });

    state.inventory["bodega"] = bodegaInv;
    state.kardexMovements = movs.filter(m=>m.id!==id);
    state.editingKardex = null;
    state.kxEditSaving = false;
    showToast("✅ Movimiento eliminado");
    render();
  } catch(e) {
    state.kxEditSaving = false;
    showToast("Error: "+e.message,"err");
    render();
  }
}

// ─── HELPERS ─────────────────────────────────────────────────
function getLast7(sales) {
  return getLastN(sales, 7);
}

function getLastN(sales, n) {
  return Array.from({length:n},(_,i)=>{
    const d=new Date(Date.now()-5*60*60*1000); d.setDate(d.getDate()-(n-1-i));
    const iso=dateToIsoLocal(d);
    return {
      iso,
      label:[DAY_LETTERS[d.getDay()],formatDayMonth(d)],
      dayLetter:DAY_LETTERS[d.getDay()],
      isWeekStart:d.getDay()===1,
      weekLabel:getCalendarWeekLabel(d),
      total: sales.filter(s=>s.fecha===iso).reduce((s,v)=>s+saleNet(v),0),
      isToday: iso===today()
    };
  });
}

// ─── EDICION DE VENTAS ─────────────────────────────────────────
function addStockDelta(delta, productId, qty) {
  const units = Number(qty||0);
  if (!productId || units === 0) return;
  delta[productId] = Number(delta[productId]||0) + units;
}

// Construye el movimiento de stock de una venta.
// sign -1 descuenta stock, sign +1 devuelve stock.
function getSaleInventoryDelta(items, sign) {
  const delta = {};
  items.forEach(item=>{
    if (item.isRutina && item.rutinaItems) {
      item.rutinaItems.forEach(ri=>{
        addStockDelta(delta, ri.id, sign * Number(ri.q||0) * Number(item.qty||0));
      });
    } else {
      addStockDelta(delta, item.id, sign * Number(item.qty||0));
    }
  });
  return delta;
}

function mergeStockDeltas(...deltas) {
  const merged = {};
  deltas.forEach(delta=>{
    Object.entries(delta||{}).forEach(([productId, qty])=>addStockDelta(merged, productId, qty));
  });
  return merged;
}

function applyInventoryDelta(inv, delta, allowNegative=false) {
  const next = {...(inv||{})};
  const missing = [];
  Object.entries(delta||{}).forEach(([productId, qty])=>{
    const current = Number(next[productId]||0);
    const value = current + Number(qty||0);
    if (!allowNegative && value < 0) {
      const p = CATALOG.find(c=>c.id===productId);
      missing.push({ productId, name:p?`${p.name} ${p.sub}`:productId, available:current, required:Math.abs(Number(qty||0)) });
    }
    next[productId] = value;
  });
  return { inv:next, missing };
}

function automaticCommissionDocId(saleId) {
  return `COM-${saleId}`;
}

function getAutoCommissionExpenseIdsForSale(saleId) {
  return (state.gastos||[])
    .filter(g=>g.id===automaticCommissionDocId(saleId) || String(g.nota||"").includes(`venta ${saleId}`))
    .filter(g=>g.cat==="comisiones" && String(g.nota||"").startsWith("Comisión "))
    .map(g=>g.id)
    .filter(Boolean);
}

function buildAutomaticCommissionExpense(sale) {
  if (!sale || sale.obsequio) return null;
  const comisionRate = getComisionRate(sale.pago);
  if (comisionRate <= 0) return null;
  const comisionMonto = Number(sale.total||0) * comisionRate;
  return {
    id: automaticCommissionDocId(sale.id),
    fecha: sale.fecha,
    timestamp: new Date().toISOString(),
    stand: sale.stand,
    cat: "comisiones",
    monto: Number(comisionMonto.toFixed(2)),
    nota: `Comisión ${PAYMENTS.find(p=>p.id===sale.pago)?.label||sale.pago} (${(comisionRate*100).toFixed(0)}%) · venta ${sale.id}`,
    automatico: true,
    saleId: sale.id,
  };
}

function applySaleInventoryDelta(invSourceId, items, sign) {
  const inv = {...(state.inventory[invSourceId]||{})};
  const delta = getSaleInventoryDelta(items, sign);
  const applied = applyInventoryDelta(inv, delta, true);
  Object.keys(applied.inv).forEach(k=>{ applied.inv[k] = Math.max(0, Number(applied.inv[k]||0)); });
  return applied.inv;
}

function stockMissingMessage(missing) {
  if (!missing || !missing.length) return "";
  const first = missing[0];
  return `Stock insuficiente: ${first.name}. Disponible ${first.available}, necesitas ${first.required}.`;
}

async function updateInventoryWithTransaction(invSourceId, delta, writeCallback) {
  const invRef = db.collection("inventarios").doc(invSourceId);
  let updatedInv = null;
  await db.runTransaction(async tx=>{
    const invDoc = await tx.get(invRef);
    const currentInv = invDoc.exists ? (invDoc.data()||{}) : {};
    const applied = applyInventoryDelta(currentInv, delta, false);
    if (applied.missing.length) throw new Error(stockMissingMessage(applied.missing));
    updatedInv = applied.inv;
    tx.set(invRef, updatedInv);
    writeCallback(tx, updatedInv);
  });
  return updatedInv;
}

async function handleSaleEditSave(id) {
  const sale = state.sales.find(s=>s.id===id);
  if(!sale) { showToast("Venta no encontrada","err"); return; }

  const newItems = state.evEditItems||[];
  const subtotal = newItems.reduce((s,it)=>s+it.price*it.qty,0);
  const discAmt = subtotal*(state.evEditDescuento||0)/100;
  const total = subtotal - discAmt;

  state.evEditSaving = true; render();
  try {
    const invSourceId = getInvSourceForStand(sale.stand);
    const updatedSale = {
      ...sale,
      items: newItems.map(it=>({...it, subtotal: it.price*it.qty})),
      subtotal, descuento: state.evEditDescuento||0, descuentoAmt: discAmt, total,
      pago: state.evEditPago, nota: state.evEditNota.trim(),
      editadoPor: state.user.email,
      editadoEn: new Date().toISOString(),
    };
    const delta = mergeStockDeltas(
      getSaleInventoryDelta(sale.items||[], +1),
      getSaleInventoryDelta(updatedSale.items||[], -1)
    );
    const autoCommission = buildAutomaticCommissionExpense(updatedSale);
    const oldAutoCommissionIds = getAutoCommissionExpenseIdsForSale(id);
    const inv = await updateInventoryWithTransaction(invSourceId, delta, tx=>{
      tx.set(db.collection("ventas").doc(id), updatedSale);
      oldAutoCommissionIds.forEach(gid=>tx.delete(db.collection("gastos").doc(gid)));
      if (autoCommission) tx.set(db.collection("gastos").doc(autoCommission.id), autoCommission);
    });

    state.inventory[invSourceId] = inv;
    state.sales = state.sales.map(s=>s.id===id?updatedSale:s);
    state.gastos = [
      ...(state.gastos||[]).filter(g=>!oldAutoCommissionIds.includes(g.id)),
      ...(autoCommission?[autoCommission]:[])
    ];
    state.editingSale = null;
    state.evEditSaving = false;
    showToast("✅ Venta actualizada");
    render();
  } catch(e) {
    state.evEditSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleSaleDelete(id) {
  const sale = state.sales.find(s=>s.id===id);

      tx.delete(db.collection("ventas").doc(id));
      oldAutoCommissionIds.forEach(gid=>tx.delete(db.collection("gastos").doc(gid)));
    });

    state.inventory[invSourceId] = inv;
    state.sales = state.sales.filter(s=>s.id!==id);
    state.gastos = (state.gastos||[]).filter(g=>!oldAutoCommissionIds.includes(g.id));
    state.editingSale = null;

async function handleSell() {
  if (!state.cart.length || state.selling) return;
  const subtotal = state.cart.reduce((s,i)=>s+(state.customPrices[i.id]!==undefined?state.customPrices[i.id]:i.price)*i.qty,0);
  const discAmt = subtotal*state.discount/100;
  const total = state.obsequio ? 0 : (subtotal-discAmt);
  const cartCost = state.cart.reduce((s,i)=>{
    if(i.isRutina && i.items) return s + i.items.reduce((s2,ri)=>s2+(getCost(ri.id)||0)*(ri.q||0)*(i.qty||0),0);
    return s + (getCost(i.id)||0)*i.qty;
  },0);

  const sale = {
    id: genId(),
    fecha: today(),
    timestamp: new Date().toISOString(),
    stand: getActiveSaleStandId(),
    items: state.cart.map(i=>{ const cp=state.customPrices[i.id]; const effectivePrice=cp!==undefined?cp:i.price; return {id:i.id,ref:i.ref||i.rutinaId,name:`${i.name} ${i.sub}`,qty:i.qty,price:effectivePrice,precioOriginal:i.price,precioModificado:cp!==undefined,subtotal:effectivePrice*i.qty,isRutina:i.isRutina||false,rutinaItems:i.items||null}; }),
    subtotal: state.obsequio?0:subtotal, descuento:state.discount, descuentoAmt:state.obsequio?0:discAmt, total,
    pago: state.obsequio?"obsequio":state.payment, nota: state.note,
    obsequio: !!state.obsequio
  };

  state.selling = true; render();
  try {
    // Actualizar inventario (Oficina descuenta de Bodega Central)
    const invSourceId = getInvSourceForStand(sale.stand);
    const delta = getSaleInventoryDelta(sale.items||[], -1);
    const extraGastos = [];
    if (state.obsequio && cartCost > 0) {
      extraGastos.push({
        id: genId(),
        fecha: sale.fecha,
        timestamp: new Date().toISOString(),
        stand: sale.stand,
        cat: "marketing",
        monto: Number(cartCost.toFixed(2)),
        nota: `Obsequio · venta ${sale.id}`,
      });
    }
    const autoCommission = buildAutomaticCommissionExpense(sale);
    if (autoCommission) extraGastos.push(autoCommission);
    const inv = await updateInventoryWithTransaction(invSourceId, delta, tx=>{
      tx.set(db.collection("ventas").doc(sale.id), sale);
      extraGastos.forEach(g=>tx.set(db.collection("gastos").doc(g.id), g));
    });

    state.inventory[invSourceId] = inv;
    state.sales = [...state.sales, sale];
    if (extraGastos.length) state.gastos = [...(state.gastos||[]), ...extraGastos];
    state.cart = [];
    state.customPrices = {};
    state.discount = 0;
    state.note = "";
    state.obsequio = false;
    state.success = total;
    state.selling = false;
    render();
    setTimeout(()=>{ state.success=null; render(); }, 2200);
  } catch(e) {
    state.selling = false;
    showToast("⚠️ Error al guardar: "+e.message, "err");
  }
}

async function handleHistSell() {

  const subtotal = state.histCart.reduce((s,i)=>{

    stand: state.histStand,

      return {
        id:i.id,
        ref:i.ref||i.rutinaId,
        name:`${i.name} ${i.sub}`,
        qty:i.qty,

        precioModificado:cp!==undefined,

        isRutina:i.isRutina||false,
        rutinaItems:i.items||null
      };
    }),
    subtotal, descuento:state.histDiscount, descuentoAmt:discAmt, total,
    pago: state.histPayment, nota: state.histNote,
    historica: true
  };

  try {
    await db.collection("ventas").doc(sale.id).set(sale);

    // Comision bancaria automatica (igual que venta normal)
    const comisionRate = getComisionRate(sale.pago);
    if (comisionRate > 0) {
      const comisionMonto = total * comisionRate;
      const gastoCom = {

    state.histCustomPrices = {};
    state.histDiscount = 0;
    state.histNote = "";
    state.histSaving = false;

    render();
  } catch(e) {
    state.histSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

// Parser simple de CSV (sin librerias externas). Soporta comas y campos sin comillas.
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if (lines.length===0) return [];
  const headers = lines[0].split(",").map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const cols = line.split(",").map(c=>c.trim());
    const row = {};
    headers.forEach((h,i)=>{ row[h] = cols[i]!==undefined ? cols[i] : ""; });
    return row;
  });
}

const VALID_PUNTOS = PUNTOS_VENTA.map(p=>p.id);
const VALID_PAGOS = PAYMENTS.map(p=>p.id);

function handleHistFileSelected(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const rows = parseCSV(text);
    const errors = [];
    const ventasMap = {};

    rows.forEach((row, idx) => {
      const lineNum = idx+2; // +1 por header, +1 por 1-index
      const ventaId = row["venta_id"];
      const fecha = row["fecha"];
      const stand = row["punto_venta"];
      const productId = row["producto_id"];
      const cantidad = parseFloat(row["cantidad"]);
      const precio = parseFloat(row["precio_unitario"]);
      const pago = row["metodo_pago"];
      const descPct = row["descuento_pct"] ? parseFloat(row["descuento_pct"]) : 0;

      if (!ventaId) { errors.push(`Fila ${lineNum}: falta venta_id`); return; }
      if (!fecha || !/^\d{4}-\d{2}-\d{2}$/.test(fecha)) { errors.push(`Fila ${lineNum}: fecha inválida "${fecha}" (usa YYYY-MM-DD)`); return; }
      if (!VALID_PUNTOS.includes(stand)) { errors.push(`Fila ${lineNum}: punto_venta inválido "${stand}"`); return; }
      const product = CATALOG.find(p=>p.id===productId);
      if (!product) { errors.push(`Fila ${lineNum}: producto_id desconocido "${productId}"`); return; }
      if (isNaN(cantidad) || cantidad<=0) { errors.push(`Fila ${lineNum}: cantidad inválida "${row["cantidad"]}"`); return; }
      if (isNaN(precio) || precio<0) { errors.push(`Fila ${lineNum}: precio_unitario inválido "${row["precio_unitario"]}"`); return; }
      if (!VALID_PAGOS.includes(pago)) { errors.push(`Fila ${lineNum}: metodo_pago inválido "${pago}" (usa: ${VALID_PAGOS.join(", ")})`); return; }

      if (!ventasMap[ventaId]) {
        ventasMap[ventaId] = {
          id: "H-"+ventaId+"-"+genId(),
          fecha, stand, pago,
          descPct: isNaN(descPct)?0:descPct,
          items: []
        };
      }
      ventasMap[ventaId].items.push({
        id: product.id, ref: product.ref, name: `${product.name} ${product.sub}`,
        qty: cantidad, price: precio, subtotal: cantidad*precio,
        isRutina: false, rutinaItems: null
      });
    });

    const ventas = Object.values(ventasMap).map(v=>{
      const subtotal = v.items.reduce((s,i)=>s+i.subtotal,0);
      const descuentoAmt = subtotal * v.descPct/100;
      return {
        id: v.id, fecha: v.fecha, timestamp: new Date(v.fecha+"T12:00:00").toISOString(),
        stand: v.stand, items: v.items,
        subtotal, descuento: v.descPct, descuentoAmt, total: subtotal-descuentoAmt,
        pago: v.pago, nota: "", historica: true
      };
    });

    state.histFileRows = ventas;
    state.histFileErrors = errors;
    state.histFileResult = null;
    render();
  };
  reader.readAsText(file);
}

async function handleUpdateStock(standId, productId, newStock) {
  try {
    let inv = null;
    let mov = null;
    await db.runTransaction(async tx=>{
      const invRef = db.collection("inventarios").doc(standId);
      const invDoc = await tx.get(invRef);
      inv = {...(invDoc.exists ? (invDoc.data()||{}) : {})};
      const current = Number(inv[productId]||0);
      const next = Math.max(0, Number(newStock||0));
      inv[productId] = next;
      tx.set(invRef, inv);
      if (next !== current) {
        mov = {
          id: genId(),
          fecha: today(),
          timestamp: new Date().toISOString(),
          type: "ajuste",
          product: productId,
          qty: next-current,
          stockAnterior: current,
          stockNuevo: next,
          standId,
          lote: "",
          obs: "Edicion directa de stock",
          registradoPor: state.user.email,
        };
        tx.set(db.collection("kardex").doc(mov.id), mov);
      }
    });
    if (mov) state.kardexMovements = [mov, ...(state.kardexMovements||[])];
    state.inventory[standId] = inv;
    state.editingStock = null;
    showToast("✅ Stock actualizado");
    render();
  } catch(e) {
    showToast("⚠️ Error: "+e.message, "err");
  }
}

async function handleUpdateCost(productId, newCost) {

    const costs = {...(state.costs||{})};
    costs[productId] = newCost;
    await db.collection("config").doc("costos").set(costs);
    state.costs = costs;
    state.editingCost = null;
    showToast("✅ Costo actualizado");
    render();
  } catch(e) {
    showToast("⚠️ Error: "+e.message, "err");
  }
}

async function handleUpdatePrice(productId, newPrice) {

    const prices = {...(state.prices||{})};
    prices[productId] = newPrice;
    await db.collection("config").doc("precios").set(prices);
    state.prices = prices;
    state.editingPrice = null;
