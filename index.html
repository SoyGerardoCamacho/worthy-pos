      <div style="font-size:10px;color:var(--lavender);">en stock</div>
    </div>
  </div>

  <div class="section-title">Stock por SKU — toca ✏️ para ajustar</div>
  ${CATALOG.map(p=>{
    const stock = inv[p.id]||0;
    const level = stock>5?"green":stock>0?"amber":"red";
    return `<div class="card" style="margin-bottom:8px;">
      <div class="inv-item">
        <span class="inv-emoji">${p.emoji}</span>
        <div class="inv-info">
          <div class="inv-name">${p.name} <span style="font-weight:400;color:var(--gray);">${p.sub}</span></div>
          <div class="inv-sub">${p.ref} · ${fmt(getPrice(p.id))}</div>
        </div>
        ${state.editingStock===p.id?`
          <input type="number" class="inv-edit-input" id="inv-input" value="${state.editStockVal}" min="0">
          <button class="btn-lime btn-sm" id="inv-save" data-save="${p.id}">OK</button>
          <button class="btn-ghost btn-sm" id="inv-cancel">✕</button>
        `:`
          <span class="badge badge-${level}">${stock} uds</span>
          <button style="background:var(--lavender-light);border:none;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:13px;" data-edit-stock="${p.id}">✏️</button>
        `}
      </div>
    </div>`;
  }).join("")}`;
}

// ─── VENTAS ──────────────────────────────────────────────────
function renderVentas() {
  const role = state.userInfo.role;
  const canFilterStore = role==="admin" || role==="full";
  const baseSales = (canFilterStore && state.adminStoreFilter!=="all")
    ? state.sales.filter(s=>s.stand===state.adminStoreFilter)
    : state.sales;

  const { from, to } = getPeriodRange(state.ventasPeriod, state.ventasMesAno, state.ventasRangoDesde, state.ventasRangoHasta);
  let filteredSales = baseSales.filter(s=>s.fecha>=from && s.fecha<=to);

  filteredSales = [...filteredSales].sort((a,b)=>String(b.timestamp).localeCompare(String(a.timestamp)));
  const totalRev = filteredSales.reduce((s,v)=>s+Number(v.total),0);
  const mesEspecificoLabel = (() => {
    const [y,m] = (state.ventasMesAno||"").split("-").map(Number);
    if(!y||!m) return "";
    return new Date(y, m-1, 1).toLocaleDateString("es-EC",{month:"long",year:"numeric"});
  })();
  const periodLabel = state.ventasPeriod==="hoy" ? "Hoy"
    : state.ventasPeriod==="semana" ? `Semana calendario · ${fmtDate(from)} – ${fmtDate(to)}`
    : state.ventasPeriod==="mes" ? "Este mes"
    : state.ventasPeriod==="mesEspecifico" ? mesEspecificoLabel
    : state.ventasPeriod==="rango" ? `${fmtDate(from)} – ${fmtDate(to)}`
    : state.ventasPeriod==="todo" ? "Todo el histórico"
    : "Hoy";

  const breakdownDates = filteredSales.map(s=>s.fecha).filter(Boolean).sort();
  const breakdownFrom = state.ventasPeriod==="todo" && breakdownDates.length ? breakdownDates[0] : from;
  const breakdownTo = state.ventasPeriod==="todo" && breakdownDates.length ? breakdownDates[breakdownDates.length-1] : to;
  const breakdown = state.ventasPeriod==="todo" && !breakdownDates.length ? [] : getDailyBreakdown(filteredSales, breakdownFrom, breakdownTo);
  const breakdownLabels = JSON.stringify(breakdown.map(d=>d.label));
  const breakdownData = JSON.stringify(breakdown.map(d=>Number(d.total.toFixed(2))));
  const breakdownMetaObject = getTrendChartMeta(breakdown);
  const breakdownMeta = encodeURIComponent(JSON.stringify(breakdownMetaObject));
  const breakdownMinWidth = getTrendChartMinWidth(breakdown);

  return `
  ${canFilterStore?`<div class="store-selector">
    ${[{id:"all",name:"Todos"},...PUNTOS_VENTA].map(s=>`<button class="store-btn ${state.adminStoreFilter===s.id?"active":""}" data-store="${s.id}">${s.id==="oficina"?"🏢 ":s.id!=="all"?"🏪 ":""}${s.name}</button>`).join("")}
  </div>`:""}

  <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <button onclick="exportToExcel()" style="background:var(--lime);color:white;border:none;border-radius:10px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">📥 Exportar Excel</button>
  </div>
  <div class="period-filter" style="flex-wrap:wrap;">
    <button class="period-btn ${state.ventasPeriod==="hoy"?"active":""}" data-ventas-period="hoy">Hoy</button>
    <button class="period-btn ${state.ventasPeriod==="semana"?"active":""}" data-ventas-period="semana">Semana</button>
    <button class="period-btn ${state.ventasPeriod==="mes"?"active":""}" data-ventas-period="mes">Mes actual</button>
    <button class="period-btn ${state.ventasPeriod==="mesEspecifico"?"active":""}" data-ventas-period="mesEspecifico">📅 Mes</button>
    <button class="period-btn ${state.ventasPeriod==="rango"?"active":""}" data-ventas-period="rango">📅 Rango</button>
    <button class="period-btn ${state.ventasPeriod==="todo"?"active":""}" data-ventas-period="todo">Todo</button>
  </div>
  ${state.ventasPeriod==="mesEspecifico"?`<div class="card" style="margin-bottom:12px;padding:10px;">
    <input type="month" class="dispatch-input" id="ventas-mes" value="${state.ventasMesAno}" max="${today().slice(0,7)}">
  </div>`:""}
  ${state.ventasPeriod==="rango"?`<div class="card" style="margin-bottom:12px;padding:10px;display:flex;flex-direction:column;gap:8px;">
    <div>
      <label style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;">Desde</label>
      <input type="date" class="dispatch-input" id="ventas-rango-desde" value="${state.ventasRangoDesde}" max="${today()}">
    </div>
    <div>
      <label style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;">Hasta</label>
      <input type="date" class="dispatch-input" id="ventas-rango-hasta" value="${state.ventasRangoHasta}" max="${today()}">
    </div>
  </div>`:""}

  <div class="card card-purple" style="padding:16px;margin-bottom:12px;">
    <div class="section-title" style="color:var(--lavender);margin-bottom:4px;">Ingresos · ${periodLabel}</div>
    <div style="font-size:30px;font-weight:900;color:var(--lime);">${fmt(totalRev)}</div>
    <div style="font-size:11px;color:var(--lavender);">${filteredSales.length} transacciones · Ticket promedio ${fmt(filteredSales.length?totalRev/filteredSales.length:0)}</div>
    ${renderTaxSummary(totalRev,true)}
  </div>

  <div class="card" style="margin-bottom:12px;">
    <div class="section-title">Ventas por ${breakdownMetaObject.mode==="daily"?"día":"semana calendario"} · ${periodLabel}</div>
    ${breakdownMetaObject.mode==="daily"?`<div class="sales-chart-legend"><span class="sales-chart-legend-line"></span> Cada línea separa una semana calendario · Lunes a domingo</div>`:""}
    <div class="sales-chart-scroll">
      <div class="sales-chart-inner" style="min-width:${breakdownMinWidth}px;" data-trend-chart='${breakdownLabels}|||${breakdownData}|||${breakdownMeta}'>
        <canvas id="ventasTrendChart" role="img" aria-label="Gráfico de barras de ventas por periodo">Ventas por periodo.</canvas>
      </div>
    </div>
  </div>

  ${renderPaymentConsolidado(filteredSales, `Consolidado por medio de pago · ${periodLabel}`)}

  ${filteredSales.length===0
    ?`<div style="text-align:center;padding:32px;color:var(--gray);font-size:14px;">Sin ventas en este período</div>`
    :filteredSales.map(sale=>{
      const isEditing = state.editingSale===sale.id;
      const canEdit = role==="full";
      if (isEditing) {
        const evSubtotal = (state.evEditItems||[]).reduce((s,it)=>s+it.price*it.qty,0);
        const evDescAmt = evSubtotal*(state.evEditDescuento||0)/100;
        const evTotal = evSubtotal - evDescAmt;
        return `<div class="card" style="margin-bottom:8px;border-left:4px solid var(--purple);">
          <div class="section-title">Editar venta · ${fmtDate(sale.fecha)} ${fmtTime(sale.timestamp)}</div>
          ${(state.evEditItems||[]).map((it,idx)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:700;color:var(--purple);">${it.name}</div>
              <div style="font-size:11px;color:var(--gray);">${fmt(it.price)} c/u</div>
            </div>
            <div class="qty-controls">
              <button class="qty-btn" data-ev-qty-minus="${idx}">−</button>
              <span class="cart-qty">${it.qty}</span>
              <button class="qty-btn" data-ev-qty-plus="${idx}">+</button>
            </div>
            <span class="cart-subtotal">${fmt(it.price*it.qty)}</span>
          </div>`).join("")}

          <div class="discount-bar">
            <span class="discount-label">Descuento</span>
            ${[0,5,10,15,20].map(d=>`<button class="discount-btn ${state.evEditDescuento===d?"active":""}" data-ev-discount="${d}">${d}%</button>`).join("")}
          </div>

          <div style="margin-top:10px;">
            <div class="section-title">Método de pago</div>
            <div class="payment-methods">
              ${PAYMENTS.map(pt=>`<button class="payment-btn ${state.evEditPago===pt.id?"active":""}" data-ev-payment="${pt.id}">
                <div class="pay-icon">${pt.icon}</div>
                <div>${pt.label}</div>
              </button>`).join("")}
            </div>
          </div>

          <textarea id="ev-edit-nota" placeholder="Nota opcional..." style="margin-top:10px;">${state.evEditNota}</textarea>

          <div style="margin-top:10px;">
            ${state.evEditDescuento>0?`<div class="total-iva" style="text-align:right;margin-bottom:4px;">Descuento ${state.evEditDescuento}% incluido</div>`:""}
            ${renderTaxSummary(evTotal)}
          </div>

          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn-lime" style="flex:1;" id="ev-edit-save" data-id="${sale.id}" ${state.evEditSaving?"disabled":""}>${state.evEditSaving?"Guardando...":"Guardar"}</button>
            <button class="btn-ghost" style="flex:1;" id="ev-edit-cancel">Cancelar</button>
          </div>
          <button class="btn-ghost" style="color:var(--red);border-color:var(--red);width:100%;margin-top:8px;" id="ev-edit-delete" data-id="${sale.id}" ${state.evEditSaving?"disabled":""}>🗑️ Eliminar venta completa</button>
        </div>`;
      }
      return `<div class="card sale-card" style="margin-bottom:8px;">
      <div class="sale-header">
        <div style="flex:1;min-width:0;">
          <div class="sale-meta">${fmtDate(sale.fecha)} · ${fmtTime(sale.timestamp)}${role==="admin"&&sale.stand?` · ${PUNTOS_VENTA.find(s=>s.id===sale.stand)?.name||sale.stand}`:""}${sale.historica?` · <span style="color:var(--purple);font-weight:700;">📜 Histórica</span>`:""}</div>
          <div class="sale-items">${sale.items?sale.items.map(i=>`${i.name} ×${i.qty}`).join(" · "):"—"}</div>
          ${sale.nota?`<div class="sale-note">📝 ${sale.nota}</div>`:""}
        </div>
        <div style="text-align:right;margin-left:8px;">
          <div class="sale-amount">${fmt(sale.total)}</div>
          <div style="font-size:11px;color:var(--gray);text-align:right;margin-top:2px;">Sin IVA: ${fmt(getTaxBreakdown(sale.total).sinIva)}<br>IVA 15%: ${fmt(getTaxBreakdown(sale.total).iva)}<br>Total: ${fmt(sale.total)}</div>
          <span class="badge badge-${sale.obsequio?"lime":sale.pago==="efectivo"?"green":PAYMENTS.find(p=>p.id===sale.pago)?.group==="bendo"?"purple":"amber"}">
            ${sale.obsequio?"🎁 Obsequio":`${PAYMENTS.find(p=>p.id===sale.pago)?.icon||""} ${PAYMENTS.find(p=>p.id===sale.pago)?.label||sale.pago}`}
          </span>
        </div>
      </div>
      ${canEdit?`<div style="margin-top:8px;text-align:right;">
        <button class="btn-ghost" data-ev-edit="${sale.id}" style="font-size:11px;padding:4px 10px;">✏️ Editar</button>
      </div>`:""}
    </div>`;
    }).join("")}`;
}

// ─── ADMIN BODEGA ────────────────────────────────────────────
function renderAdminBodega() {
  const role = state.userInfo.role;
  const adjStand = state.bodegaAdjStand || "bodega";
  const inv = state.inventory["bodega"] || {};
  const canSeeCosts = (role==="full" || role==="bodega");
  const canEditPrices = (role==="full");
  return `
  <div class="card card-purple" style="margin-bottom:12px;padding:16px;">
    <div style="font-size:11px;color:var(--lavender);font-weight:700;text-transform:uppercase;letter-spacing:1px;">Bodega Central</div>
    <div style="font-size:28px;font-weight:900;color:var(--lime);margin-top:4px;">${fmt(CATALOG.reduce((s,p)=>s+(inv[p.id]||0)*getCost(p.id),0))}</div>
    <div style="font-size:12px;color:var(--lavender);margin-top:2px;">${CATALOG.reduce((s,p)=>s+(inv[p.id]||0),0)} unidades totales${canSeeCosts?" · valor al costo":""}</div>

  <div class="card">

      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="font-size:20px;">${p.emoji}</span>
        <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--purple);">${p.name} ${p.sub}</div><div style="font-size:10px;color:var(--gray);">${p.ref}</div></div>
        ${state.editingStock===p.id?`

          <button class="btn-lime btn-sm" data-save-bodega="${p.id}">OK</button>

          <button style="background:#FEF3C7;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;" data-ajuste-stock="${p.id}" data-ajuste-stand="bodega">⚖️</button>
        `}
      </div>`;
    }).join("")}
  </div>

  ${canEditPrices?`<div class="card" style="margin-top:12px;">
    <div class="section-title">Precios (PVP) · toca 🏷️ para editar</div>
    <div style="font-size:11px;color:var(--gray);margin-bottom:10px;">Precio de venta al público, IVA 15% incluido. Solo editable por Gerardo y Rosita.</div>
    ${CATALOG.map(p=>{
      const price = getPrice(p.id);
      const isOverride = typeof (state.prices||{})[p.id] === "number";
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="font-size:20px;">${p.emoji}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:var(--purple);">${p.name} ${p.sub}</div>
          <div style="font-size:10px;color:var(--gray);">${isOverride?"Actualizado":"Precio de catálogo"}</div>
        </div>
        ${state.editingPrice===p.id?`
          <input type="number" class="inv-edit-input" id="price-input" value="${state.editPriceVal}" min="0" step="0.01" style="width:70px;">
          <button class="btn-lime btn-sm" data-price-save="${p.id}">OK</button>
          <button class="btn-ghost btn-sm" id="price-cancel">✕</button>
        `:`
          <span class="badge badge-purple">${fmt(price)}</span>
          <button style="background:var(--lavender-light);border:none;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:13px;" data-edit-price="${p.id}">🏷️</button>
        `}
      </div>`;
    }).join("")}
  </div>`:""}

    ${CATALOG.map(p=>{
      const cost = getCost(p.id);
      const price = getPrice(p.id);

        <span style="font-size:20px;">${p.emoji}</span>

      <div style="font-size:13px;color:var(--purple);font-weight:700;margin-bottom:8px;">Stock en: ${adjStand==="bodega"?"Bodega Central":PUNTOS_VENTA.find(s=>s.id===adjStand)?.name||adjStand}</div>

async function handleKardexEditSave(id) {
  const movs = state.kardexMovements || [];
  const original = movs.find(m=>m.id===id);
  if(!original) { showToast("Movimiento no encontrado","err"); return; }

  const newProduct = state.kxEditProduct;
  const newQty = parseInt(state.kxEditQty)||0;
  if(!newProduct||newQty<=0) { showToast("Completa producto y cantidad","err"); return; }

  state.kxEditSaving = true; render();
  try {
    const bodegaInv = {...(state.inventory["bodega"]||{})};

    // Revertir el efecto del movimiento original sobre el inventario de bodega
    bodegaInv[original.product] = (bodegaInv[original.product]||0) - (original.qty||0);

    // Aplicar el efecto del movimiento nuevo (corregido)
    bodegaInv[newProduct] = (bodegaInv[newProduct]||0) + newQty;

    await db.collection("inventarios").doc("bodega").set(bodegaInv);

    const updatedMov = {
      ...original,
      product: newProduct,
      qty: newQty,
      lote: state.kxEditLote.trim(),
      obs: state.kxEditObs,
      editadoPor: state.user.email,
      editadoEn: new Date().toISOString(),
    };
    await db.collection("kardex").doc(id).set(updatedMov);

    state.inventory["bodega"] = bodegaInv;
    state.kardexMovements = movs.map(m=>m.id===id?updatedMov:m);
    state.editingKardex = null;
    state.kxEditSaving = false;
    showToast("✅ Movimiento actualizado");
    render();
  } catch(e) {
    state.kxEditSaving = false;
    showToast("Error: "+e.message,"err");
    render();
  }
}

async function handleKardexEditDelete(id) {
  const movs = state.kardexMovements || [];
  const original = movs.find(m=>m.id===id);
  if(!original) { showToast("Movimiento no encontrado","err"); return; }

  state.kxEditSaving = true; render();
  try {
    const bodegaInv = {...(state.inventory["bodega"]||{})};
    // Revertir el efecto del movimiento sobre bodega
    bodegaInv[original.product] = (bodegaInv[original.product]||0) - (original.qty||0);
    await db.collection("inventarios").doc("bodega").set(bodegaInv);

    await db.collection("kardex").doc(id).delete();

    state.inventory["bodega"] = bodegaInv;
    state.kardexMovements = movs.filter(m=>m.id!==id);
    state.editingKardex = null;
    state.kxEditSaving = false;
    showToast("✅ Movimiento eliminado");
    render();
  } catch(e) {
    state.kxEditSaving = false;
    showToast("Error: "+e.message,"err");
    render();
  }
}

// ─── HELPERS ─────────────────────────────────────────────────
function getLast7(sales) {
  return getLastN(sales, 7);
}

function getLastN(sales, n) {
  return Array.from({length:n},(_,i)=>{
    const d=new Date(Date.now()-5*60*60*1000); d.setDate(d.getDate()-(n-1-i));
    const iso=dateToIsoLocal(d);
    return {
      iso,
      label:[DAY_LETTERS[d.getDay()],formatDayMonth(d)],
      dayLetter:DAY_LETTERS[d.getDay()],
      isWeekStart:d.getDay()===1,
      weekLabel:getCalendarWeekLabel(d),
      total: sales.filter(s=>s.fecha===iso).reduce((s,v)=>s+Number(v.total),0),
      isToday: iso===today()
    };
  });
}

// Aplica el delta de unidades (positivo=devuelve stock, negativo=descuenta) de una venta al inventario
function applySaleInventoryDelta(invSourceId, items, sign) {
  const inv = {...(state.inventory[invSourceId]||{})};
  items.forEach(item=>{
    if (item.isRutina && item.rutinaItems) {
      item.rutinaItems.forEach(ri=>{
        inv[ri.id] = Math.max(0, (inv[ri.id]||0) + sign*(ri.q||0)*(item.qty||0));
      });
    } else {
      inv[item.id] = Math.max(0, (inv[item.id]||0) + sign*(item.qty||0));
    }
  });
  return inv;
}

async function handleSaleEditSave(id) {
  const sale = state.sales.find(s=>s.id===id);
  if(!sale) { showToast("Venta no encontrada","err"); return; }

  const newItems = state.evEditItems||[];
  const subtotal = newItems.reduce((s,it)=>s+it.price*it.qty,0);
  const discAmt = subtotal*(state.evEditDescuento||0)/100;
  const total = subtotal - discAmt;

  state.evEditSaving = true; render();
  try {
    const invSourceId = getInvSourceForStand(sale.stand);

    // Revertir el efecto del inventario original (devolver stock segun cantidades viejas)
    let inv = applySaleInventoryDelta(invSourceId, sale.items||[], +1);
    // Aplicar el efecto del inventario nuevo (descontar segun cantidades nuevas)
    newItems.forEach(item=>{
      if (item.isRutina && item.rutinaItems) {
        item.rutinaItems.forEach(ri=>{
          inv[ri.id] = Math.max(0, (inv[ri.id]||0) - (ri.q||0)*(item.qty||0));
        });
      } else {
        inv[item.id] = Math.max(0, (inv[item.id]||0) - (item.qty||0));
      }
    });

    await db.collection("inventarios").doc(invSourceId).set(inv);

    const updatedSale = {
      ...sale,
      items: newItems.map(it=>({...it, subtotal: it.price*it.qty})),
      subtotal, descuento: state.evEditDescuento||0, descuentoAmt: discAmt, total,
      pago: state.evEditPago, nota: state.evEditNota.trim(),
      editadoPor: state.user.email,
      editadoEn: new Date().toISOString(),
    };
    await db.collection("ventas").doc(id).set(updatedSale);

    state.inventory[invSourceId] = inv;
    state.sales = state.sales.map(s=>s.id===id?updatedSale:s);
    state.editingSale = null;
    state.evEditSaving = false;
    showToast("✅ Venta actualizada");
    render();
  } catch(e) {
    state.evEditSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleSaleDelete(id) {
  const sale = state.sales.find(s=>s.id===id);
  if(!sale) { showToast("Venta no encontrada","err"); return; }

  state.evEditSaving = true; render();
  try {
    const invSourceId = getInvSourceForStand(sale.stand);
    // Revertir inventario (devolver stock de todos los items)
    const inv = applySaleInventoryDelta(invSourceId, sale.items||[], +1);
    await db.collection("inventarios").doc(invSourceId).set(inv);

    await db.collection("ventas").doc(id).delete();

    state.inventory[invSourceId] = inv;
    state.sales = state.sales.filter(s=>s.id!==id);
    state.editingSale = null;
    state.evEditSaving = false;
    showToast("✅ Venta eliminada");
    render();
  } catch(e) {
    state.evEditSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleSell() {
  if (!state.cart.length) return;
  const subtotal = state.cart.reduce((s,i)=>s+(state.customPrices[i.id]!==undefined?state.customPrices[i.id]:i.price)*i.qty,0);
  const discAmt = subtotal*state.discount/100;
  const total = state.obsequio ? 0 : (subtotal-discAmt);
  const cartCost = state.cart.reduce((s,i)=>{
    if(i.isRutina && i.items) return s + i.items.reduce((s2,ri)=>s2+(getCost(ri.id)||0)*(ri.q||0)*(i.qty||0),0);
    return s + (getCost(i.id)||0)*i.qty;
  },0);

  const sale = {
    id: genId(),
    fecha: today(),
    timestamp: new Date().toISOString(),
    stand: getActiveSaleStandId(),
    items: state.cart.map(i=>{ const cp=state.customPrices[i.id]; const effectivePrice=cp!==undefined?cp:i.price; return {id:i.id,ref:i.ref||i.rutinaId,name:`${i.name} ${i.sub}`,qty:i.qty,price:effectivePrice,precioOriginal:i.price,precioModificado:cp!==undefined,subtotal:effectivePrice*i.qty,isRutina:i.isRutina||false,rutinaItems:i.items||null}; }),
    subtotal: state.obsequio?0:subtotal, descuento:state.discount, descuentoAmt:state.obsequio?0:discAmt, total,
    pago: state.obsequio?"obsequio":state.payment, nota: state.note,
    obsequio: !!state.obsequio
  };

  try {
    // Guardar venta
    await db.collection("ventas").doc(sale.id).set(sale);

    // Actualizar inventario (Oficina descuenta de Bodega Central)
    const invSourceId = getInvSourceForStand(sale.stand);
    const inv = {...(state.inventory[invSourceId]||{})};
    sale.items.forEach(item=>{
      if(item.isRutina && item.rutinaItems) {
        item.rutinaItems.forEach(ri=>{ inv[ri.id]=Math.max(0,(inv[ri.id]||0)-(ri.q*item.qty)); });
      } else {
        inv[item.id]=Math.max(0,(inv[item.id]||0)-item.qty);
      }
    });
    await db.collection("inventarios").doc(invSourceId).set(inv);

    // Si es obsequio: registrar gasto de marketing por el costo
    if (state.obsequio && cartCost > 0) {
      const gasto = {
        id: genId(),
        fecha: sale.fecha,
        timestamp: new Date().toISOString(),
        stand: sale.stand,
        cat: "marketing",
        monto: Number(cartCost.toFixed(2)),
        nota: `Obsequio · venta ${sale.id}`,
      };
      await db.collection("gastos").doc(gasto.id).set(gasto);
      state.gastos = [...(state.gastos||[]), gasto];
    }

    // Si es tarjeta (debito/credito): registrar comision bancaria automatica
    if (!state.obsequio) {
      const comisionRate = getComisionRate(sale.pago);
      if (comisionRate > 0) {
        const comisionMonto = total * comisionRate;
        const gastoCom = {
          id: genId(),
          fecha: sale.fecha,
          timestamp: new Date().toISOString(),
          stand: sale.stand,
          cat: "comisiones",
          monto: Number(comisionMonto.toFixed(2)),
          nota: `Comisión ${PAYMENTS.find(p=>p.id===sale.pago)?.label||sale.pago} (${(comisionRate*100).toFixed(0)}%) · venta ${sale.id}`,
        };
        await db.collection("gastos").doc(gastoCom.id).set(gastoCom);
        state.gastos = [...(state.gastos||[]), gastoCom];
      }
    }

    state.inventory[invSourceId] = inv;
    state.sales = [...state.sales, sale];
    state.cart = [];
    state.customPrices = {};
    state.discount = 0;
    state.note = "";
    state.obsequio = false;
    state.success = total;
    render();
    setTimeout(()=>{ state.success=null; render(); }, 2200);
  } catch(e) {
    showToast("⚠️ Error al guardar: "+e.message, "err");
  }
}

// Parser simple de CSV (sin librerias externas). Soporta comas y campos sin comillas.
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if (lines.length===0) return [];
  const headers = lines[0].split(",").map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const cols = line.split(",").map(c=>c.trim());
    const row = {};
    headers.forEach((h,i)=>{ row[h] = cols[i]!==undefined ? cols[i] : ""; });
    return row;
  });
}

const VALID_PUNTOS = PUNTOS_VENTA.map(p=>p.id);
const VALID_PAGOS = PAYMENTS.map(p=>p.id);

function handleHistFileSelected(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const rows = parseCSV(text);
    const errors = [];
    const ventasMap = {};

    rows.forEach((row, idx) => {
      const lineNum = idx+2; // +1 por header, +1 por 1-index
      const ventaId = row["venta_id"];
      const fecha = row["fecha"];
      const stand = row["punto_venta"];
      const productId = row["producto_id"];
      const cantidad = parseFloat(row["cantidad"]);
      const precio = parseFloat(row["precio_unitario"]);
      const pago = row["metodo_pago"];
      const descPct = row["descuento_pct"] ? parseFloat(row["descuento_pct"]) : 0;

      if (!ventaId) { errors.push(`Fila ${lineNum}: falta venta_id`); return; }
      if (!fecha || !/^\d{4}-\d{2}-\d{2}$/.test(fecha)) { errors.push(`Fila ${lineNum}: fecha inválida "${fecha}" (usa YYYY-MM-DD)`); return; }
      if (!VALID_PUNTOS.includes(stand)) { errors.push(`Fila ${lineNum}: punto_venta inválido "${stand}"`); return; }
      const product = CATALOG.find(p=>p.id===productId);
      if (!product) { errors.push(`Fila ${lineNum}: producto_id desconocido "${productId}"`); return; }
      if (isNaN(cantidad) || cantidad<=0) { errors.push(`Fila ${lineNum}: cantidad inválida "${row["cantidad"]}"`); return; }
      if (isNaN(precio) || precio<0) { errors.push(`Fila ${lineNum}: precio_unitario inválido "${row["precio_unitario"]}"`); return; }
      if (!VALID_PAGOS.includes(pago)) { errors.push(`Fila ${lineNum}: metodo_pago inválido "${pago}" (usa: ${VALID_PAGOS.join(", ")})`); return; }

      if (!ventasMap[ventaId]) {
        ventasMap[ventaId] = {
          id: "H-"+ventaId+"-"+genId(),
          fecha, stand, pago,
          descPct: isNaN(descPct)?0:descPct,
          items: []
        };
      }
      ventasMap[ventaId].items.push({
        id: product.id, ref: product.ref, name: `${product.name} ${product.sub}`,
        qty: cantidad, price: precio, subtotal: cantidad*precio,
        isRutina: false, rutinaItems: null
      });
    });

    const ventas = Object.values(ventasMap).map(v=>{
      const subtotal = v.items.reduce((s,i)=>s+i.subtotal,0);
      const descuentoAmt = subtotal * v.descPct/100;
      return {
        id: v.id, fecha: v.fecha, timestamp: new Date(v.fecha+"T12:00:00").toISOString(),
        stand: v.stand, items: v.items,
        subtotal, descuento: v.descPct, descuentoAmt, total: subtotal-descuentoAmt,
        pago: v.pago, nota: "", historica: true
      };
    });

    state.histFileRows = ventas;
    state.histFileErrors = errors;
    state.histFileResult = null;
    render();
  };
  reader.readAsText(file);
}

async function handleHistFileSave() {
  if (!state.histFileRows || !state.histFileRows.length || state.histFileSaving) return;
  state.histFileSaving = true; render();

  try {
    let count = 0, total = 0;
    for (const sale of state.histFileRows) {
      await db.collection("ventas").doc(sale.id).set(sale);
      state.sales = [...state.sales, sale];
      count++; total += sale.total;

      const comisionRate = getComisionRate(sale.pago);
      if (comisionRate > 0) {
        const comisionMonto = sale.total * comisionRate;
        const gastoCom = {
          id: genId(),
          fecha: sale.fecha,
          timestamp: new Date().toISOString(),
          stand: sale.stand,
          cat: "comisiones",
          monto: Number(comisionMonto.toFixed(2)),
          nota: `Comisión ${PAYMENTS.find(p=>p.id===sale.pago)?.label||sale.pago} (${(comisionRate*100).toFixed(0)}%) · venta histórica ${sale.id}`,
        };
        await db.collection("gastos").doc(gastoCom.id).set(gastoCom);
        state.gastos = [...(state.gastos||[]), gastoCom];
      }
    }
    state.histFileResult = { count, total };
    state.histFileRows = null;
    state.histFileErrors = [];
    state.histFileSaving = false;
    showToast("✅ Ventas históricas registradas");
    render();
  } catch(e) {
    state.histFileSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

function downloadHistTemplate() {
  const csv = [
    "venta_id,fecha,punto_venta,producto_id,cantidad,precio_unitario,metodo_pago,descuento_pct",
    "H001,2026-03-05,quicentro,WMO30,1,19.55,efectivo,0",
    "H001,2026-03-05,quicentro,WLBN6,2,5.95,efectivo,0",
    "H002,2026-03-05,mercadito,WHT80,1,27.75,deuna,0",
  ].join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "plantilla_ventas_historicas.csv";
  a.click();
  URL.revokeObjectURL(url);
}

// ─── GASTOS ──────────────────────────────────────────────────
async function handleGastoSave() {
  if (state.gastoSaving) return;
  const monto = parseFloat(state.gastoMonto)||0;
  if (!state.gastoFecha || !state.gastoStand || !state.gastoCat || monto<=0) {
    showToast("Completa fecha, local, categoría y monto","err"); return;
  }
  state.gastoSaving = true; render();
  try {
    const gasto = {
      id: genId(),
      fecha: state.gastoFecha,
      timestamp: new Date().toISOString(),
      stand: state.gastoStand,
      cat: state.gastoCat,
      monto,
      nota: state.gastoNota.trim(),
      registradoPor: state.user.email,
    };
    await db.collection("gastos").doc(gasto.id).set(gasto);
    state.gastos = [gasto, ...(state.gastos||[])];
    state.gastoMonto=""; state.gastoNota="";
    state.gastoSaving=false;
    showToast("✅ Gasto registrado");
    render();
  } catch(e) {
    state.gastoSaving=false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleGastoEditSave(id) {
  const gastos = state.gastos||[];
  const original = gastos.find(g=>g.id===id);
  if(!original) { showToast("Gasto no encontrado","err"); return; }
  const monto = parseFloat(state.egEditMonto)||0;
  if (!state.egEditFecha || !state.egEditStand || !state.egEditCat || monto<=0) {
    showToast("Completa todos los campos","err"); return;
  }
  state.egEditSaving = true; render();
  try {
    const updated = {
      ...original,
      fecha: state.egEditFecha,
      stand: state.egEditStand,
      cat: state.egEditCat,
      monto,
      nota: state.egEditNota.trim(),
      editadoPor: state.user.email,
      editadoEn: new Date().toISOString(),
    };
    await db.collection("gastos").doc(id).set(updated);
    state.gastos = gastos.map(g=>g.id===id?updated:g);
    state.editingGasto = null;
    state.egEditSaving = false;
    showToast("✅ Gasto actualizado");
    render();
  } catch(e) {
    state.egEditSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

// ─── CAJA ────────────────────────────────────────────────────
async function handleCajaCerrar() {
  if (state.cajaSaving) return;
  const efIni = parseFloat(state.cajaEfectivoInicial);
  const efFin = parseFloat(state.cajaEfectivoFinal);
  if (isNaN(efIni) || isNaN(efFin)) {
    showToast("Ingresa efectivo inicial y final","err"); return;
  }
  state.cajaSaving = true; render();
  try {
    const standId = state.cajaStand;
    const fecha = state.cajaFecha;
    const docId = cierreDocId(standId, fecha);
    const cierre = {
      id: docId,
      stand: standId,
      fecha,
      efectivoInicial: efIni,
      efectivoFinal: efFin,
      bendoBanco: state.cajaBendoBanco!==""? (parseFloat(state.cajaBendoBanco)||0) : null,
      transferBanco: state.cajaTransferBanco!==""? (parseFloat(state.cajaTransferBanco)||0) : null,
      nota: state.cajaNota.trim(),
      cerradoPor: state.user.email,
      cerradoEn: new Date().toISOString(),
    };
    await db.collection("cierres_caja").doc(docId).set(cierre);
    state.cierres = {...(state.cierres||{}), [docId]: cierre};
    state.cajaEfectivoInicial=""; state.cajaEfectivoFinal=""; state.cajaBendoBanco=""; state.cajaTransferBanco=""; state.cajaNota="";
    state.cajaSaving = false;
    showToast("✅ Caja cerrada");
    render();
  } catch(e) {
    state.cajaSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleCajaReabrir() {
  const standId = state.cajaStand;
  const fecha = state.cajaFecha;

  try {
    await db.collection("cierres_caja").doc(docId).delete();

  }
}

async function handleAjusteInventario() {
  const { productId, standId } = state.ajusteModal || {};
  const delta = parseInt(state.ajusteDelta)||0;
  const nota = state.ajusteNota.trim();
  if (!productId || delta === 0) { showToast("Ingresa un ajuste (+/−)","err"); return; }
  if (!nota) { showToast("El motivo del ajuste es obligatorio","err"); return; }

  state.ajusteSaving = true; render();
  try {
    const inv = {...(state.inventory[standId]||{})};
    const stockAnterior = inv[productId]||0;
    const stockNuevo = stockAnterior + delta;
    if (stockNuevo < 0) {
      state.ajusteSaving = false;
      showToast(`No puedes dejar stock negativo. Stock actual: ${stockAnterior}`,"err");
      render();
      return;
    }
    inv[productId] = stockNuevo;

    await db.collection("inventarios").doc(standId).set(inv);

    // Registrar en kardex
    const mov = {
      id: genId(),
      fecha: today(),
      timestamp: new Date().toISOString(),
      type: "ajuste",
      product: productId,
      qty: delta,
      stockAnterior,
      stockNuevo,
      standId,
      lote: "",
      obs: nota,
      registradoPor: state.user.email,
    };
    await db.collection("kardex").doc(mov.id).set(mov);

    state.inventory[standId] = inv;
    state.kardexMovements = [mov, ...(state.kardexMovements||[])];
    state.ajusteModal = null;
    state.ajusteDelta = ""; state.ajusteNota = "";
    state.ajusteSaving = false;
    const p = CATALOG.find(c=>c.id===productId);
    showToast(`✅ Ajuste: ${p?.name} ${delta>0?"+"+delta:delta} uds`);
    render();
  } catch(e) {
    state.ajusteSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

async function handleDispatch() {
  const product = state.dispatchProduct;
  const target = state.dispatchTarget;
  const qty = parseInt(state.dispatchQty)||0;
  if(!product||!qty||qty<=0) { showToast("Completa todos los campos","err"); return; }

  const bodegaInv = {...(state.inventory["bodega"]||{})};
  const available = bodegaInv[product]||0;
  if(available<qty) { showToast(`Solo hay ${available} uds en Bodega`,"err"); return; }

  state.dispatching = true; render();
  try {
    // Restar de bodega
    bodegaInv[product] = available-qty;
    await db.collection("inventarios").doc("bodega").set(bodegaInv);

    // Sumar al stand
    const standInv = {...(state.inventory[target]||{})};
    standInv[product] = (standInv[product]||0)+qty;
    await db.collection("inventarios").doc(target).set(standInv);

    // Registrar movimiento en despachos y kardex
    await db.collection("despachos").add({
      fecha: today(), timestamp: new Date().toISOString(),
      product, qty, from:"bodega", to:target,
      productName: CATALOG.find(p=>p.id===product)?.name+" "+CATALOG.find(p=>p.id===product)?.sub
    });
    await db.collection("kardex").add({
      id: genId(),
      fecha: today(), timestamp: new Date().toISOString(),
      type: "salida",
      product, qty, lote:"", obs:"",
      to: target,
      registradoPor: state.user.email,
    });

    state.inventory["bodega"] = bodegaInv;
    state.inventory[target] = standInv;
    state.dispatchProduct=""; state.dispatchQty=""; state.dispatching=false;
    showToast(`✅ Despachado a ${STANDS.find(s=>s.id===target)?.name}`);
    render();
  } catch(e) {
    state.dispatching=false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}


async function handleKardexEntrada() {
  if (state.kardexSaving) return; // evita doble-registro por doble click
  const product = state.kardexProduct;
  const qty = parseInt(state.kardexQty)||0;
  const lote = state.kardexLote.trim();
  if(!product||qty<=0) { showToast("Selecciona producto y cantidad","err"); return; }

  state.kardexSaving = true; render();
  try {
    const mov = {
      id: genId(),
      fecha: today(),
      timestamp: new Date().toISOString(),
      type: "entrada",
      product, qty, lote,
      obs: state.kardexObs,
      registradoPor: state.user.email,
    };

    // Guardar movimiento en Firestore
    await db.collection("kardex").doc(mov.id).set(mov);

    // Sumar al inventario de bodega
    const bodegaInv = {...(state.inventory["bodega"]||{})};
    bodegaInv[product] = (bodegaInv[product]||0) + qty;
    await db.collection("inventarios").doc("bodega").set(bodegaInv);

    state.inventory["bodega"] = bodegaInv;
    state.kardexMovements = [mov, ...(state.kardexMovements||[])];
    state.kardexProduct=""; state.kardexQty=""; state.kardexLote=""; state.kardexObs="";
    state.kardexSaving = false;
    showToast(`✅ Entrada registrada: ${qty} uds`);
    render();
  } catch(e) {
    state.kardexSaving = false;
    showToast("⚠️ Error: "+e.message,"err");
    render();
  }
}

function showToast(msg, type="ok") {
  state.toast={msg,type};
  render();
  setTimeout(()=>{ state.toast=null; render(); },3000);
}

// ─── FIREBASE LISTENERS ───────────────────────────────────────
function setupListeners(userInfo) {
  // Unsubscribe previous
  if(state.unsubInventory) state.unsubInventory();
  if(state.unsubSales) state.unsubSales();

  // Listen to all inventories
  state.unsubInventory = db.collection("inventarios").onSnapshot(snap=>{
    snap.forEach(doc=>{ state.inventory[doc.id]=doc.data(); });
    render();
  });

  // Listen to sales - stand only sees own, admin/bodega sees all
  let salesQuery = db.collection("ventas").orderBy("timestamp","desc").limit(200);
  if(userInfo.role==="asesor" && state.selectedStand) salesQuery = salesQuery.where("stand","==",state.selectedStand);

  state.unsubSales = salesQuery.onSnapshot(snap=>{
    state.sales = snap.docs.map(d=>d.data());
    render();
  });

  // Kardex listener
  db.collection("kardex").orderBy("timestamp","desc").limit(500).onSnapshot(snap=>{
    state.kardexMovements = snap.docs.map(d=>d.data());
    render();
  });

  // Costos listener
  db.collection("config").doc("costos").onSnapshot(doc=>{
    state.costs = doc.exists ? (doc.data()||{}) : {};
    render();
  });

  // Precios listener
  db.collection("config").doc("precios").onSnapshot(doc=>{
    state.prices = doc.exists ? (doc.data()||{}) : {};
    render();
  });

  // Gastos operativos listener
  if (userInfo.canFinanzas) {
    db.collection("gastos").orderBy("timestamp","desc").limit(1000).onSnapshot(snap=>{
      state.gastos = snap.docs.map(d=>d.data());
      render();
    });

    // Cierres de caja listener
    db.collection("cierres_caja").onSnapshot(snap=>{
      const map = {};
      snap.forEach(doc=>{ map[doc.id] = doc.data(); });
      state.cierres = map;
      render();
    });
  }
}

// ─── AUTH LISTENER ────────────────────────────────────────────
auth.onAuthStateChanged(user=>{
  if(user) {
    const userInfo = USERS[user.email];
    if(!userInfo) { auth.signOut(); state.loading=false; render(); return; }
    state.user = user;
    state.userInfo = userInfo;
    state.tab = (userInfo.role==="asesor")?"pos":(userInfo.role==="full")?"dashboard":"dashboard";
    state.loading = false;
    setupListeners(userInfo);
    render();
  } else {
    if(state.unsubInventory) state.unsubInventory();
    if(state.unsubSales) state.unsubSales();
    state.user=null; state.userInfo=null;
    state.inventory={}; state.sales=[];
    state.loading=false;
    render();
  }
});

// Initial render
render();
