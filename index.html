<style>
:root {
  --purple: #2D1B69;
  --purple-mid: #3d2a85;
  --lime: #8DC63F;
  --lime-dark: #6fa030;
  --lavender: #C8B8E8;
  --lavender-light: #e8dff6;
  --off-white: #F9F7FF;
  --white: #FFFFFF;
  --gray: #6B7280;
  --red: #EF4444;
  --amber: #F59E0B;
  --green: #10B981;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--off-white); min-height: 100vh; }

/* LOGIN */
.login-screen { min-height:100vh; background: var(--purple); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.login-logo { font-size:40px; font-weight:900; color:var(--lime); letter-spacing:-1px; }
.login-logo-img { height:42px; width:auto; display:block; margin:0 auto; }
.brand-logo-img { height:24px; width:auto; display:block; }
.login-sub { font-size:13px; color:var(--lavender); font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-top:4px; margin-bottom:40px; }
.login-card { background:white; border-radius:20px; padding:28px; width:100%; max-width:380px; }
.login-card h2 { font-size:18px; color:var(--purple); font-weight:800; margin-bottom:20px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:14px; font-weight:700; color:var(--gray); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:6px; }
.form-group input { width:100%; border:1.5px solid var(--lavender); border-radius:10px; padding:12px 14px; font-size:15px; color:var(--purple); font-family:inherit; outline:none; transition:border 0.15s; }
.form-group input:focus { border-color:var(--purple); }
.btn-primary { width:100%; background:var(--lime); color:white; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; transition:opacity 0.15s; }
.btn-primary:hover { opacity:0.9; }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
.login-error { font-size:13px; color:var(--red); font-weight:600; margin-top:10px; text-align:center; }

/* APP LAYOUT */
.app { max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:80px; }
.header { background:var(--purple); padding:14px 18px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; }
.header-brand .brand-name { font-size:20px; font-weight:900; color:var(--lime); letter-spacing:-0.5px; }
.header-brand .brand-stand { font-size:12px; color:var(--lavender); font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.header-right { text-align:right; }
.header-right .today-total { font-size:14px; font-weight:800; color:white; }
.header-right .today-date { font-size:12px; color:var(--lavender); }
.logout-btn { background:rgba(255,255,255,0.15); border:none; border-radius:8px; padding:6px 10px; color:white; font-size:13px; cursor:pointer; margin-left:8px; font-family:inherit; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:white; border-top:1px solid var(--lavender); display:flex; padding:6px 0 10px; box-shadow:0 -2px 12px rgba(45,27,105,0.1); z-index:100; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; cursor:pointer; font-family:inherit; padding:0; }
.nav-item .nav-icon { font-size:20px; }
.nav-item .nav-label { font-size:11px; font-weight:700; color:var(--gray); letter-spacing:0.3px; }
.nav-item.active .nav-label { color:var(--purple); }
.nav-item .nav-dot { width:18px; height:3px; border-radius:99px; background:var(--lime); }

/* CONTENT */
.content { padding:14px; }

/* CARDS */
.card { background:white; border-radius:16px; padding:14px; box-shadow:0 1px 4px rgba(45,27,105,0.08); margin-bottom:12px; }
.card-purple { background:var(--purple); }
.card-lavender { background:var(--lavender-light); }

/* BADGES */
.badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:99px; font-size:13px; font-weight:700; }
.badge-green { background:#D1FAE5; color:#065F46; }
.badge-amber { background:#FEF3C7; color:#92400E; }
.badge-red { background:#FEE2E2; color:#991B1B; }
.badge-purple { background:var(--lavender-light); color:var(--purple); }
.badge-lime { background:#ECFCCB; color:#365314; }

/* SECTION TITLE */
.section-title { font-size:14px; font-weight:700; color:var(--gray); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:10px; }

/* PRODUCT GRID */
.product-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.product-card { border-radius:14px; padding:10px 8px; text-align:left; cursor:pointer; border:1.5px solid var(--lavender); background:white; font-family:inherit; transition:all 0.15s; }
.product-card.in-cart { background:var(--purple); border:2px solid var(--lime); }
.product-card.out-stock { opacity:0.4; cursor:not-allowed; }
.product-card .p-emoji { font-size:20px; }
.product-card .p-ref { font-size:12px; font-weight:800; color:var(--gray); margin-top:2px; }
.product-card.in-cart .p-ref { color:var(--lavender); }
.product-card .p-name { font-size:14px; font-weight:700; color:var(--purple); line-height:1.2; margin-top:2px; }
.product-card.in-cart .p-name { color:white; }
.product-card .p-sub { font-size:13px; color:var(--gray); }
.product-card.in-cart .p-sub { color:var(--lavender); }
.product-card .p-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
.product-card .p-price { font-size:16px; font-weight:900; color:var(--purple); }
.product-card.in-cart .p-price { color:var(--lime); }
.product-card .p-cart-qty { font-size:12px; color:var(--lime); font-weight:700; margin-top:3px; }

/* CART */
.cart-item { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.cart-item-info { flex:1; }
.cart-item-name { font-size:15px; font-weight:700; color:var(--purple); }
.cart-item-price { font-size:13px; color:var(--gray); }
.qty-controls { display:flex; align-items:center; gap:5px; }
.qty-btn { width:26px; height:26px; border-radius:8px; border:1px solid var(--lavender); background:white; font-weight:800; cursor:pointer; font-family:inherit; font-size:14px; display:flex; align-items:center; justify-content:center; }
.qty-remove { background:#FEE2E2; color:var(--red); border:none; }
.cart-qty { font-size:14px; font-weight:800; color:var(--purple); min-width:18px; text-align:center; }
.cart-subtotal { font-size:15px; font-weight:800; color:var(--purple); min-width:46px; text-align:right; }

/* PAYMENT */
.payment-methods { display:flex; gap:8px; flex-wrap:wrap; }
.payment-btn { flex:1 1 30%; min-width:90px; padding:10px 4px; border-radius:12px; border:2px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; text-align:center; transition:all 0.15s; }
.payment-btn.active { border-color:var(--purple); background:var(--purple); color:white; }
.payment-btn .pay-icon { font-size:18px; }

/* TOTAL */
.total-row { display:flex; justify-content:space-between; align-items:center; padding-top:6px; border-top:2px solid var(--purple); }
.total-label { font-size:18px; font-weight:800; color:var(--purple); }
.total-amount { font-size:26px; font-weight:900; color:var(--purple); }
.total-iva { font-size:12px; color:var(--gray); text-align:right; }

/* FILTERS */
.filter-bar { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-btn { flex-shrink:0; padding:8px 14px; border-radius:20px; border:1.5px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
.filter-btn.active { border-color:var(--purple); background:var(--purple); color:white; }

/* PERIOD FILTER */
.period-filter { display:flex; gap:8px; margin-bottom:12px; }
.period-btn { flex:1 1 30%; min-width:80px; padding:10px; border-radius:10px; border:1.5px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:15px; cursor:pointer; font-family:inherit; }
.period-btn.active { border-color:var(--purple); background:var(--purple); color:white; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.stat-card { border-radius:14px; padding:14px; text-align:center; }
.stat-label { font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.stat-value { font-size:28px; font-weight:900; }

/* BAR CHART */
.bar-chart { display:flex; align-items:flex-end; gap:5px; height:72px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.bar-val { font-size:11px; color:var(--gray); font-weight:700; }
.bar { width:100%; border-radius:4px 4px 0 0; transition:height 0.3s; }
.bar-today { background:var(--lime); }
.bar-other { background:var(--lavender); }
.bar-day { font-size:11px; font-weight:600; }

/* SALE CARD */
.sale-card { border-left:4px solid var(--lime); }
.sale-header { display:flex; justify-content:space-between; align-items:flex-start; }
.sale-meta { font-size:13px; color:var(--gray); }
.sale-items { font-size:14px; color:var(--purple); margin-top:3px; font-weight:600; line-height:1.4; }
.sale-note { font-size:13px; color:var(--gray); margin-top:2px; }
.sale-amount { font-size:18px; font-weight:900; color:var(--purple); }

/* INVENTORY ITEM */
.inv-item { display:flex; align-items:center; gap:10px; }
.inv-emoji { font-size:22px; }
.inv-info { flex:1; min-width:0; }
.inv-name { font-size:15px; font-weight:700; color:var(--purple); }
.inv-sub { font-size:12px; color:var(--gray); }
.inv-edit-input { width:56px; border-radius:8px; border:2px solid var(--purple); padding:5px; font-size:15px; font-weight:800; color:var(--purple); text-align:center; font-family:inherit; }

/* BUTTONS */
.btn-lime { background:var(--lime); color:white; border:none; border-radius:12px; padding:12px 20px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-lime:disabled { opacity:0.5; cursor:not-allowed; }
.btn-lime-full { width:100%; font-size:16px; padding:14px; margin-top:4px; }
.btn-ghost { background:transparent; color:var(--purple); border:1.5px solid var(--lavender); border-radius:12px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-sm { padding:5px 10px; font-size:12px; border-radius:8px; }

/* SUCCESS */
.success-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:320px; gap:12px; }
.success-emoji { font-size:56px; }
.success-title { font-size:20px; font-weight:800; color:var(--purple); }
.success-amount { font-size:32px; font-weight:900; color:var(--lime); }

/* TOAST */
.toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); font-weight:800; font-size:13px; padding:10px 20px; border-radius:12px; z-index:999; box-shadow:0 4px 16px rgba(0,0,0,0.2); white-space:nowrap; transition:opacity 0.3s; }
.toast-ok { background:var(--lime); color:white; }
.toast-err { background:var(--red); color:white; }

/* LOADING */
.loading-screen { min-height:100vh; background:var(--purple); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
.loading-title { color:var(--lime); font-size:18px; font-weight:800; }
.loading-sub { color:var(--lavender); font-size:12px; }

/* ADMIN */
.store-selector { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; }
.store-btn { flex-shrink:0; padding:8px 16px; border-radius:20px; border:1.5px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
.store-btn.active { border-color:var(--purple); background:var(--purple); color:white; }

/* DISPATCH */
.dispatch-form { display:flex; flex-direction:column; gap:12px; }
.dispatch-select { width:100%; border:1.5px solid var(--lavender); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--purple); font-family:inherit; background:white; }
.dispatch-input { width:100%; border:1.5px solid var(--lavender); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--purple); font-family:inherit; }

/* TEXTAREA */
textarea { width:100%; border-radius:12px; border:1.5px solid var(--lavender); padding:10px; font-size:13px; color:var(--purple); resize:none; font-family:inherit; min-height:52px; }

/* DISCOUNT */
.discount-bar { display:flex; align-items:center; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--lavender); }
.discount-label { font-size:12px; color:var(--gray); flex:1; }
.discount-btn { padding:3px 8px; border-radius:8px; border:1.5px solid var(--lavender); background:white; color:var(--gray); font-weight:700; font-size:11px; cursor:pointer; font-family:inherit; }
.discount-btn.active { border-color:var(--purple); background:var(--purple); color:white; }

/* ALERTS */
.alert-card { border-radius:14px; padding:14px; margin-bottom:12px; }
.alert-red { border-left:4px solid var(--red); background:white; box-shadow:0 1px 4px rgba(45,27,105,0.08); }
.alert-amber { border-left:4px solid var(--amber); background:white; box-shadow:0 1px 4px rgba(45,27,105,0.08); }
.alert-item { font-size:12px; font-weight:700; margin-bottom:4px; }
.alert-item-red { color:var(--red); }
.alert-item-amber { color:var(--amber); }



/* CONSOLIDADO POR MEDIO DE PAGO */
.payment-summary-grid {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin-top:12px;
}
.payment-summary-box {
  min-width:0;
  border:1.5px solid var(--lavender);
  border-radius:14px;
  padding:12px;
  background:var(--off-white);
}
.payment-summary-box .ps-label {
  font-size:11px;
  font-weight:800;
  color:var(--gray);
  text-transform:uppercase;
  letter-spacing:.6px;
}
.payment-summary-box .ps-value {
  font-size:20px;
  font-weight:900;
  color:var(--purple);
  margin-top:4px;
}
.payment-summary-box .ps-meta {
  font-size:11px;
  color:var(--gray);
  margin-top:3px;
  line-height:1.35;
}
.payment-detail-row {
  display:grid;
  grid-template-columns:minmax(145px,1.5fr) minmax(58px,.45fr) minmax(80px,.65fr) minmax(54px,.4fr);
  gap:8px;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid var(--lavender-light);
}
.payment-detail-row:last-child { border-bottom:none; }
.payment-detail-head {
  font-size:10px;
  font-weight:800;
  color:var(--gray);
  text-transform:uppercase;
  letter-spacing:.5px;
}
.payment-detail-name {
  min-width:0;
  font-size:12px;
  font-weight:700;
  color:var(--purple);
  overflow-wrap:anywhere;
}
.payment-detail-number {
  text-align:right;
  font-size:12px;
  font-weight:800;
  color:var(--purple);
}
.payment-total-check {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-top:12px;
  padding:10px 12px;
  border-radius:10px;
  background:var(--lavender-light);
}
@media (max-width: 599px) {
  .payment-summary-grid { grid-template-columns:1fr; }
  .payment-detail-row {
    grid-template-columns:minmax(120px,1.4fr) 44px 72px 44px;
    gap:5px;
  }
}
@media (min-width: 600px) and (max-width: 1023px) {
  .payment-summary-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
}


/* AJUSTE DE INVENTARIO */
.ajuste-modal {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(20, 12, 48, 0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
}
.ajuste-card {
  width: 100%;
  max-width: 420px;
  background: var(--white);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.28);
}
.ajuste-title {
  font-size: 18px;
  font-weight: 900;
  color: var(--purple);
  margin-bottom: 14px;
}
.ajuste-input {
  width: 100%;
  border: 1.5px solid var(--lavender);
  border-radius: 10px;
  padding: 11px 12px;
  margin-bottom: 12px;
  font-size: 15px;
  color: var(--purple);
  font-family: inherit;
  outline: none;
}
.ajuste-input:focus { border-color: var(--purple); }
.ajuste-btns { display: flex; gap: 8px; margin-top: 8px; }
body.modal-open { overflow: hidden; }

/* RESUMEN FISCAL Y ANALITICA */
.tax-summary {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:16px;
}
.tax-summary-item {
  min-width:0;
  min-height:74px;
  border-radius:8px;
  padding:12px 10px;
  background:linear-gradient(135deg, var(--purple) 0%, #49368A 100%);
  box-shadow:0 10px 22px rgba(45,27,105,.13);
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.tax-summary-item:nth-child(2) {
  background:linear-gradient(135deg, #D6C9EE 0%, #EEE6FF 100%);
}
.tax-summary-item.total {
  background:linear-gradient(135deg, var(--lime) 0%, #A4D94F 100%);
}
.tax-summary.dark .tax-summary-item,
.tax-summary.dark .tax-summary-item:nth-child(2),
.tax-summary.dark .tax-summary-item.total {
  background:linear-gradient(135deg, #2D1B69 0%, #49368A 100%);
  box-shadow:0 12px 26px rgba(21,10,61,.22);
}
.tax-summary-label {
  font-size:10.5px;
  font-weight:900;
  color:rgba(255,255,255,.82);
  text-transform:uppercase;
  letter-spacing:.45px;
  line-height:1.15;
}
.tax-summary.dark .tax-summary-label { color:rgba(255,255,255,.86); }
.tax-summary-value { font-size:18px;font-weight:900;color:white;margin-top:7px;line-height:1; }
.tax-summary-item:nth-child(2) .tax-summary-label,
.tax-summary-item.total .tax-summary-label { color:rgba(45,27,105,.72); }
.tax-summary.dark .tax-summary-item:nth-child(2) .tax-summary-label,
.tax-summary.dark .tax-summary-item.total .tax-summary-label { color:rgba(255,255,255,.86); }
.tax-summary-item:nth-child(2) .tax-summary-value,
.tax-summary-item.total .tax-summary-value { color:var(--purple); }
.tax-summary.dark .tax-summary-value,
.tax-summary.dark .tax-summary-item:nth-child(2) .tax-summary-value,
.tax-summary.dark .tax-summary-item.total .tax-summary-value {
  color:var(--lime);
}
.analytics-grid {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
  margin-bottom:12px;
}
.analytics-grid .card { margin-bottom:0; }
.chart-wrap { position:relative;width:100%;height:340px; }
.chart-note { font-size:10px;color:var(--gray);line-height:1.4;margin-top:8px;text-align:center; }
.sales-chart-scroll {
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  padding:2px 0 8px;
  scrollbar-width:thin;
  scrollbar-color:var(--lavender) transparent;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-x:contain;
}
.sales-chart-scroll::-webkit-scrollbar { height:6px; }
.sales-chart-scroll::-webkit-scrollbar-thumb { background:var(--lavender);border-radius:99px; }
.sales-chart-inner {
  position:relative;
  width:100%;
  min-width:320px;
  height:250px;
}
.sales-chart-legend {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin:0 0 8px;
  color:var(--purple);
  font-size:11px;
  font-weight:800;
}
.sales-chart-legend-line {
  width:22px;
  border-top:2px dashed rgba(45,27,105,.45);
}
@media (max-width: 899px) {
  .analytics-grid { grid-template-columns:1fr; }
  .chart-wrap { height:280px; }
  .sales-chart-inner { height:260px; }
}
@media (max-width: 420px) {
  .tax-summary { gap:7px; margin-top:14px; }
  .tax-summary-item { min-height:72px; padding:10px 6px; }
  .tax-summary-label { font-size:9.5px; letter-spacing:.3px; }
  .tax-summary-value { font-size:17px; margin-top:6px; }
  .chart-wrap { height:260px; }
  .sales-chart-inner { height:270px; }
  .sales-chart-legend { font-size:10px; }
}

/* RESPONSIVE */
@media (max-width: 380px) {
  .product-grid { gap:6px; }
  .product-card { padding:8px 6px; }
}


/* ============================================================
   RESPONSIVE WORTHY POS · CELULAR / TABLET / LAPTOP
   ============================================================ */
html { width:100%; min-height:100%; -webkit-text-size-adjust:100%; }
body { width:100%; min-width:320px; overflow-x:hidden; }
button, input, select, textarea { max-width:100%; }
img, canvas { max-width:100%; }
.app { width:100%; max-width:none; margin:0; padding-bottom:calc(82px + env(safe-area-inset-bottom)); }
.header { width:100%; padding-top:calc(14px + env(safe-area-inset-top)); }
.content { width:100%; max-width:1440px; margin:0 auto; padding:14px; }
.bottom-nav {
  left:0;
  transform:none;
  width:100%;
  max-width:none;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  overscroll-behavior-x:contain;
}
.bottom-nav::-webkit-scrollbar { display:none; }
.nav-item { min-width:64px; min-height:52px; padding:2px 3px; }
.card, .alert-card, .product-card, .stat-card { min-width:0; }
.product-card { min-height:142px; display:flex; flex-direction:column; }
.product-card .p-bottom { margin-top:auto; }
.cart-item-info, .inv-info, .sale-header > div, .header-brand { min-width:0; }
.cart-item-name, .inv-name, .sale-items, .header-brand .brand-stand { overflow-wrap:anywhere; }
.filter-bar, .store-selector { scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; }
.filter-btn, .store-btn { scroll-snap-align:start; }
.period-filter { flex-wrap:wrap; }
.period-btn { min-height:42px; }
.payment-btn { min-height:62px; }
.dispatch-input, .dispatch-select, .ajuste-input, textarea, .form-group input { font-size:16px; }
.ajuste-card { max-height:calc(100dvh - 28px); overflow-y:auto; }
.toast { max-width:calc(100vw - 24px); white-space:normal; text-align:center; }

/* Celulares pequeños */
@media (max-width: 420px) {
  .header { padding-left:12px; padding-right:10px; gap:8px; }
  .brand-logo-img { height:20px; }
  .header-brand .brand-stand { font-size:10px; letter-spacing:.6px; max-width:210px; }
  .logout-btn { padding:6px 8px; margin-left:0; }
  .content { padding:10px; }
  .card { padding:12px; border-radius:14px; }
  .product-grid { grid-template-columns:repeat(2, minmax(0,1fr)); gap:7px; }
  .product-card { padding:9px 7px; min-height:136px; }
  .product-card .p-name { font-size:13px; }
  .product-card .p-sub { font-size:12px; }
  .product-card .p-price { font-size:15px; }
  .stats-grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px; }
  .stat-value { font-size:23px; }
  .stat-label { font-size:10px; letter-spacing:.7px; }
  .cart-item { flex-wrap:wrap; align-items:flex-start; padding-bottom:9px; border-bottom:1px solid var(--lavender-light); }
  .cart-item-info { flex:1 1 calc(100% - 120px); }
  .qty-controls { order:3; flex:1 1 auto; }
  .cart-subtotal { order:4; margin-left:auto; align-self:center; }
  .payment-btn { flex:1 1 calc(50% - 8px); min-width:0; }

  .ajuste-card { border-radius:20px 20px 10px 10px; padding:16px; }

  .login-card { padding:22px 18px; }
}

/* Celular grande y tablet vertical */
@media (min-width: 600px) and (max-width: 1023px) {
  .content { padding:20px; max-width:980px; }
  .header { padding-left:24px; padding-right:24px; }
  .brand-logo-img { height:28px; }
  .product-grid { grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
  .product-card { padding:14px 12px; min-height:158px; }
  .stats-grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
  .payment-methods { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); }
  .payment-btn { min-width:0; }
  .period-filter { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); }
  .period-btn { min-width:0; }
  .bottom-nav { justify-content:flex-start; padding-left:8px; padding-right:8px; }
  .nav-item { flex:0 0 86px; min-width:86px; }
  .nav-item .nav-label { font-size:11px; }
  .card { padding:18px; }
  .ajuste-card { max-width:520px; }
}

/* Tablet horizontal y laptop */
@media (min-width: 1024px) {
  body { background:#f3f0fa; }
  .app { min-height:100vh; padding:0; }
  .header {
    position:sticky;
    top:0;
    margin-left:112px;
    width:calc(100% - 112px);
    min-height:72px;
    padding:16px 28px;
    box-shadow:0 2px 12px rgba(45,27,105,.13);

  .content {
    max-width:none;
    margin:0 0 0 112px;

    padding:24px 28px 36px;
  }

    bottom:0;
    left:0;

    height:100dvh;
    max-width:none;
    transform:none;
    flex-direction:column;
    align-items:stretch;
    justify-content:flex-start;

    padding:88px 10px 18px;

    box-shadow:2px 0 14px rgba(45,27,105,.10);
    overflow-y:auto;
    overflow-x:hidden;
  }
  .nav-item {
    flex:0 0 auto;
    min-width:0;
    min-height:66px;
    width:100%;
    border-radius:14px;
    padding:8px 4px;
    justify-content:center;
    transition:background .15s, transform .15s;
  }
  .nav-item:hover { background:var(--lavender-light); transform:translateY(-1px); }
  .nav-item.active { background:var(--purple); }
  .nav-item.active .nav-label { color:white; }
  .nav-item .nav-icon { font-size:22px; }
  .nav-item .nav-label { font-size:10px; line-height:1.15; text-align:center; }
  .nav-item .nav-dot { height:3px; width:28px; }
  .product-grid { grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; }
  .product-card { min-height:170px; padding:16px 14px; }
  .product-card:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 22px rgba(45,27,105,.13); }
  .stats-grid { grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }
  .card { padding:20px; margin-bottom:16px; }
  .filter-bar, .store-selector { overflow-x:visible; flex-wrap:wrap; gap:8px; }
  .period-filter { display:flex; flex-wrap:wrap; }
  .period-btn { flex:0 1 170px; }
  .payment-methods { display:grid; grid-template-columns:repeat(6,minmax(120px,1fr)); }
  .payment-btn { min-width:0; }
  .ajuste-card { max-width:560px; }

}

/* Laptop amplia / monitor */
@media (min-width: 1366px) {
  .header { margin-left:124px; width:calc(100% - 124px); padding-left:34px; padding-right:34px; }
  .content { margin-left:124px; width:calc(100% - 124px); padding:28px 34px 42px; }
  .bottom-nav { width:124px; padding-left:12px; padding-right:12px; }
  .product-grid { grid-template-columns:repeat(5,minmax(0,1fr)); }
  .product-card { min-height:176px; }
}

/* Orientación horizontal de móviles con poca altura */
@media (max-height: 520px) and (max-width: 1023px) and (orientation: landscape) {
  .header { position:relative; }
  .bottom-nav { min-height:58px; }
  .nav-item { min-height:46px; }
  .nav-item .nav-icon { font-size:17px; }
  .content { padding-bottom:76px; }
  .ajuste-modal { align-items:flex-start; overflow-y:auto; }
}

/* ============================================================
   LOOK & FEEL REFRESH · SOLO VISUAL
   ============================================================ */
:root {
  --purple: #26145f;
  --purple-mid: #432c87;
  --lime: #8DC63F;
  --lime-dark: #5f9228;
  --lavender: #d6c9ee;
  --lavender-light: #f0eafa;
  --off-white: #f6f4fb;
  --gray: #647184;
  --ink: #221a3c;
  --line: #e7e1f2;
  --shadow-soft: 0 10px 28px rgba(38,20,95,.08);
  --shadow-lift: 0 14px 34px rgba(38,20,95,.13);
}

body {
  color: var(--ink);
  background:
    linear-gradient(180deg, #fbfaff 0%, var(--off-white) 42%, #f1eef8 100%);
}

.header {
  background: linear-gradient(135deg, #241058 0%, #332079 100%);
  box-shadow: 0 8px 24px rgba(38,20,95,.18);
}

.brand-logo-img { filter: drop-shadow(0 3px 8px rgba(0,0,0,.16)); }
.header-brand .brand-stand { color:#ded5f2; }
.logout-btn {
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.11);
  border-radius:8px;
}

.content { padding-top:16px; }

.card,
.alert-card,
.payment-summary-box,
.stat-card {
  border-radius:8px;
  border:1px solid rgba(214,201,238,.72);
  box-shadow:var(--shadow-soft);
}

.card-purple {
  border:none;
  background:linear-gradient(135deg, #26145f 0%, #3a247c 100%);
  box-shadow:var(--shadow-lift);
}

.card-lavender {
  background:#f3eefb;
  border-color:#ded4f1;
}

.section-title {
  color:#697386;
  font-size:12px;
  letter-spacing:.9px;
}

.filter-btn,
.store-btn,
.period-btn,
.payment-btn,
.btn-ghost,
.dispatch-input,
.dispatch-select,
.form-group input,
textarea,
.inv-edit-input,
.ajuste-input {
  border-radius:8px;
  border-color:var(--line);
}

.filter-btn,
.store-btn,
.period-btn,
.payment-btn {
  background:#fff;
  box-shadow:0 2px 8px rgba(38,20,95,.04);
}

.filter-btn.active,
.store-btn.active,
.period-btn.active,
.payment-btn.active {
  background:var(--purple);
  border-color:var(--purple);
  box-shadow:0 8px 20px rgba(38,20,95,.16);
}

.btn-lime,
.btn-primary {
  border-radius:8px;
  background:linear-gradient(135deg, var(--lime) 0%, #78b833 100%);
  box-shadow:0 10px 22px rgba(141,198,63,.24);
}

.btn-lime:hover,
.btn-primary:hover,
.filter-btn:hover,
.store-btn:hover,
.period-btn:hover,
.payment-btn:hover,
.btn-ghost:hover {
  transform:translateY(-1px);
}

button {
  transition:transform .14s ease, box-shadow .14s ease, background .14s ease, border-color .14s ease;
}

.product-card {
  border-radius:8px;
  border-color:var(--line);
  box-shadow:0 5px 16px rgba(38,20,95,.06);
}

.product-card:hover:not(:disabled) {
  border-color:#c8b8e8;
  box-shadow:var(--shadow-lift);
}

.product-card.in-cart {
  background:linear-gradient(135deg, var(--purple) 0%, #3a247c 100%);
}

.badge {
  border-radius:8px;
  padding:4px 9px;
}

.tax-summary-item {
  border-radius:8px;
  border:0;
}

.tax-summary.dark .tax-summary-item {
  border:1px solid rgba(255,255,255,.12);
}

.bottom-nav {
  border-color:var(--line);
  box-shadow:0 -10px 26px rgba(38,20,95,.12);
}

.nav-item {
  border-radius:8px;
}

.nav-item.active {
  color:var(--purple);
}

.nav-item.active .nav-icon {
  transform:translateY(-1px);
}

.sale-card {
  border-left-color:var(--lime);
}

table {
  background:#fff;
}

th {
  background:#faf8ff;
}

tr:hover td {
  background:#fcfbff;
}

.toast {
  border-radius:8px;
  box-shadow:0 14px 32px rgba(0,0,0,.18);
}

.login-screen,
.loading-screen {
  background:
    radial-gradient(circle at 50% 12%, rgba(141,198,63,.18), transparent 30%),
    linear-gradient(145deg, #241058 0%, #311d72 100%);
}

.login-card {
  border-radius:8px;
  box-shadow:0 22px 50px rgba(0,0,0,.22);
}

@media (min-width: 1024px) {
  body { background:#f5f3fa; }
  .bottom-nav {
    background:#fff;
    border-right-color:var(--line);
  }
  .nav-item.active {
    background:var(--purple);
    box-shadow:0 10px 24px rgba(38,20,95,.20);
  }
}

.login-isotipo-wrap {
  width:min(210px, 54vw);
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 18px;
  filter:drop-shadow(0 20px 34px rgba(0,0,0,.28));
}

.login-isotipo-wrap-sm {
  width:min(150px, 42vw);
  margin-bottom:14px;
}

.login-isotipo-img {
  width:100%;
  height:100%;
  object-fit:contain;
  animation:worthySpin 18s linear infinite;
  transform-origin:50% 50%;
}

.login-logo-img { height:34px; opacity:.96; }
.login-sub { margin-bottom:24px; color:rgba(255,255,255,.82); }
.login-card {
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.62);
}

.card,
.payment-summary-box,
.stat-card,
.alert-card {
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(8px);
}

.card.card-purple {
  background:linear-gradient(135deg, #2D1B69 0%, #3C2780 100%);
  color:white;
}

.card.card-purple .section-title {
  color:var(--lavender);
}

.payment-summary-box {
  background:linear-gradient(135deg, #2D1B69 0%, #49368A 100%);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 12px 26px rgba(21,10,61,.18);
}

.payment-summary-box .ps-label {
  color:rgba(255,255,255,.9);
}

.payment-summary-box .ps-value {
  color:var(--lime);
}

.payment-summary-box .ps-meta {
  color:white;
  font-weight:700;
}

.payment-summary-box .ps-meta strong {
  color:var(--lime);
}

@keyframes worthySpin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}

@media (prefers-reduced-motion: reduce) {
  .login-isotipo-img { animation:none; }
}

</style>

const PAYMENT_GROUPS = [
  { id:"efectivo",     label:"Efectivo" },
  { id:"transferencia",label:"Transferencias" },

];

// Comision de venta segun metodo de pago (0 si no aplica)
function getComisionRate(pagoId) {
  const pt = PAYMENTS.find(p=>p.id===pagoId);
  return (pt && pt.comision) ? pt.comision : 0;
}


// Consolida ventas por método exacto y por grupo financiero.
// Incluye ventas históricas porque usan la misma colección state.sales.
function getPaymentConsolidado(sales) {
  const rows = (sales||[]).filter(s=>!s.obsequio && Number(s.total||0)>0);
  const grossTotal = salesGrossTotal(rows);
  const total = salesNetTotal(rows);

  const methods = PAYMENTS.map(pt=>{
    const methodRows = rows.filter(s=>s.pago===pt.id);
    const gross = salesGrossTotal(methodRows);
    const amount = salesNetTotal(methodRows);
    const commission = methodRows.reduce((sum,s)=>sum+saleGross(s)*getComisionRate(s.pago),0);
    return {
      ...pt,
      total: amount,
      gross,
      count: methodRows.length,
      commission,
      net: gross-commission,
      pct: total>0 ? amount/total*100 : 0,
      grossPct: grossTotal>0 ? gross/grossTotal*100 : 0
    };
  });

  const knownIds = new Set(PAYMENTS.map(p=>p.id));
  const unidentifiedRows = rows.filter(s=>!knownIds.has(s.pago));
  const unidentifiedTotal = salesNetTotal(unidentifiedRows);
  const unidentifiedGross = salesGrossTotal(unidentifiedRows);

  const groupMeta = {
    efectivo:      { icon:"💵", label:"Efectivo" },
    transferencia:{ icon:"📲", label:"Transferencias" },
    bendo:         { icon:"💳", label:"Bendo / Tarjetas" }
  };

  const groups = PAYMENT_GROUPS.map(g=>{
    const groupMethods = methods.filter(m=>m.group===g.id);
    const amount = groupMethods.reduce((sum,m)=>sum+m.total,0);
    const gross = groupMethods.reduce((sum,m)=>sum+m.gross,0);
    const count = groupMethods.reduce((sum,m)=>sum+m.count,0);
    const commission = groupMethods.reduce((sum,m)=>sum+m.commission,0);
    return {
      id:g.id,
      label:groupMeta[g.id]?.label||g.label,
      icon:groupMeta[g.id]?.icon||"💰",
      total:amount,
      gross,
      count,
      commission,
      net:gross-commission,
      pct:total>0 ? amount/total*100 : 0,
      grossPct:grossTotal>0 ? gross/grossTotal*100 : 0
    };
  });

  const tax = getTaxBreakdown(grossTotal);
  return {
    total,
    grossTotal,
    sinIva:tax.sinIva,
    iva:tax.iva,
    count:rows.length,
    methods,
    groups,
    unidentifiedTotal,
    unidentifiedGross,
    unidentifiedCount:unidentifiedRows.length,
    accountedTotal:methods.reduce((sum,m)=>sum+m.gross,0)+unidentifiedGross
  };
}

function renderPaymentConsolidado(sales, title="Consolidado por medio de pago") {
  const d = getPaymentConsolidado(sales);
  return `
  <div class="card payment-consolidado-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
      <div>
        <div class="section-title" style="margin-bottom:3px;">${title}</div>
        <div style="font-size:11px;color:var(--gray);">Incluye ventas normales e históricas del filtro seleccionado</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:10px;color:var(--gray);font-weight:700;text-transform:uppercase;letter-spacing:.7px;">Total ingresado</div>
        <div style="font-size:24px;font-weight:900;color:var(--purple);">${fmt(d.grossTotal)}</div>
        <div style="font-size:11px;color:var(--gray);">${d.count} transacciones</div>
      </div>
    </div>

    <div class="payment-summary-grid">
      ${d.groups.map(g=>`
        <div class="payment-summary-box">
          <div class="ps-label">${g.icon} ${g.label}</div>
          <div class="ps-value">${fmt(g.gross)}</div>
          <div class="ps-meta">${g.count} tx · ${g.grossPct.toFixed(1)}% del total ingresado</div>
          ${g.id==="bendo"&&g.total>0?`
            <div class="ps-meta">Comisión estimada: -${fmt(g.commission)}</div>
            <div class="ps-meta"><strong>Neto banco esperado: ${fmt(g.net)}</strong></div>
          `:""}
        </div>
      `).join("")}
    </div>

}

const SALES_CATEGORY_META = [
  { id:"deo", label:"Desodorantes" },
  { id:"tonico", label:"Tónicos" },
  { id:"aceite", label:"Óleos" },
  { id:"balm", label:"Bálsamos" },

];

// Descompone rutinas a SKU reales. En dólares distribuye el valor cobrado
// proporcionalmente al PVP de sus componentes para conservar exactamente el total.
function getSalesComposition(sales) {
  const productMap = {};
  const categoryMap = Object.fromEntries(SALES_CATEGORY_META.map(c=>[c.id,{...c,usd:0,units:0}]));

  (sales||[]).filter(s=>!s.obsequio && Number(s.total||0)>0).forEach(sale=>{
    const items = sale.items||[];
    const grossItems = items.reduce((sum,item)=>{
      const line = Number(item.subtotal);
      return sum + (Number.isFinite(line) ? line : Number(item.price||0)*Number(item.qty||0));
    },0);
    const saleFactor = grossItems>0 ? saleNet(sale)/grossItems : 1;

    items.forEach(item=>{
      const lineGrossRaw = Number(item.subtotal);
      const lineGross = Number.isFinite(lineGrossRaw) ? lineGrossRaw : Number(item.price||0)*Number(item.qty||0);
      const lineUsd = lineGross * saleFactor;

      const addComponent = (productId, qty, usd) => {
        const p = CATALOG.find(c=>c.id===productId);
        const name = p ? `${p.name} ${p.sub}` : (item.name||productId||"Producto");
        const cat = p?.cat || "otros";
        if(!productMap[productId]) productMap[productId] = { id:productId, name, usd:0, units:0, cat };
        productMap[productId].usd += Number(usd||0);
        productMap[productId].units += Number(qty||0);
        if(categoryMap[cat]) {
          categoryMap[cat].usd += Number(usd||0);
          categoryMap[cat].units += Number(qty||0);
        }
      };

      if(item.isRutina && Array.isArray(item.rutinaItems) && item.rutinaItems.length) {
        const components = item.rutinaItems.map(ri=>{
          const qty = Number(ri.q||0) * Number(item.qty||0);
          const weight = Math.max(0, getPrice(ri.id) * qty);
          return { id:ri.id, qty, weight };
        });
        const totalWeight = components.reduce((s,c)=>s+c.weight,0);
        components.forEach(c=>{
          const allocated = totalWeight>0 ? lineUsd*(c.weight/totalWeight) : lineUsd/components.length;
          addComponent(c.id, c.qty, allocated);
        });
      } else {
        addComponent(item.id, Number(item.qty||0), lineUsd);
      }
    });
  });

  return {
    productsByUsd: Object.values(productMap).filter(r=>r.usd>0).sort((a,b)=>b.usd-a.usd),
    productsByUnits: Object.values(productMap).filter(r=>r.units>0).sort((a,b)=>b.units-a.units),
    categories: SALES_CATEGORY_META.map(c=>categoryMap[c.id]).filter(r=>r.usd>0),
  };
}

}

  const override = state.prices ? state.prices[productId] : undefined;
  if (typeof override === "number") return override;

}

// ─── HELPERS GENERICOS DE PERIODO ──────────────────────────────
const DAY_LETTERS = ["D","L","M","W","J","V","S"];

function dateToIsoLocal(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function formatDayMonth(date) {
  return `${String(date.getDate()).padStart(2,"0")}/${String(date.getMonth()+1).padStart(2,"0")}`;
}

function getMonday(date) {
  const d = new Date(date);
  d.setHours(12,0,0,0);
  const offset = (d.getDay()+6)%7;
  d.setDate(d.getDate()-offset);
  return d;
}

function getCalendarWeekLabel(date) {
  const monday = getMonday(date);
  const sunday = new Date(monday);
  sunday.setDate(sunday.getDate()+6);
  return `Semana ${formatDayMonth(monday)}–${formatDayMonth(sunday)}`;
}

// period: "hoy" | "semana" | "mes" | "mesEspecifico" | "rango" | "todo"
// Retorna {from,to} ISO inclusive. Semana siempre es lunes a domingo calendario.
function getPeriodRange(period, mesAno, rangoDesde, rangoHasta) {
  const todayIso = today();
  const d = new Date(Date.now()-5*60*60*1000);

  if (period === "hoy") return { from: todayIso, to: todayIso };

  if (period === "semana") {
    const monday = getMonday(d);
    const sunday = new Date(monday); sunday.setDate(sunday.getDate()+6);
    return { from: dateToIsoLocal(monday), to: dateToIsoLocal(sunday) };
  }

  if (period === "mes") {
    const d2 = new Date(d.getFullYear(), d.getMonth(), 1);
    return { from: d2.toISOString().slice(0,10), to: todayIso };
  }

  if (period === "mesEspecifico") {
    const my = mesAno || todayIso.slice(0,7); // "YYYY-MM"
    const [y,m] = my.split("-").map(Number);
    const from = `${my}-01`;
    const lastDay = new Date(y, m, 0).getDate();
    const to = `${my}-${String(lastDay).padStart(2,"0")}`;
    return { from, to };
  }

  if (period === "rango") {
    const from = rangoDesde || todayIso;
    const to = rangoHasta || todayIso;
    return from <= to ? { from, to } : { from: to, to: from };
  }

  if (period === "todo") return { from: "0000-01-01", to: "9999-12-31" };

  // fallback
  return { from: todayIso, to: todayIso };
}

// Genera el desglose por semana calendario (lunes-domingo).
function getWeeklyBreakdown(salesForStand, from, to) {
  const start = new Date(from+"T12:00:00");
  const end = new Date(to+"T12:00:00");
  const firstMonday = getMonday(start);
  const weeks = [];
  let cursor = new Date(firstMonday);

  while (cursor <= end) {
    const wStart = new Date(cursor);
    const wEnd = new Date(cursor); wEnd.setDate(wEnd.getDate()+6);
    const fromIso = dateToIsoLocal(wStart);
    const toIso = dateToIsoLocal(wEnd);
    const total = salesForStand
      .filter(s=>s.fecha>=fromIso && s.fecha<=toIso && s.fecha>=from && s.fecha<=to)
      .reduce((sum,v)=>sum+saleNet(v),0);
    weeks.push({
      label:["SEM",`${formatDayMonth(wStart)}–${formatDayMonth(wEnd)}`],
      total,
      weekStart:fromIso,
      weekEnd:toIso,
      weekLabel:getCalendarWeekLabel(wStart)
    });
    cursor.setDate(cursor.getDate()+7);
  }
  return weeks;
}

// Una barra por día. En periodos muy extensos se resume por semana calendario.
function getDailyBreakdown(salesForStand, from, to, aggregateAfterDays=120) {
  const start = new Date(from+"T12:00:00");
  const end = new Date(to+"T12:00:00");
  const totalDays = Math.round((end-start)/86400000)+1;

  if (totalDays > aggregateAfterDays) return getWeeklyBreakdown(salesForStand, from, to);

  const totalsByDate = {};
  salesForStand.forEach(s=>{
    if(s.fecha>=from && s.fecha<=to) totalsByDate[s.fecha]=(totalsByDate[s.fecha]||0)+saleNet(s);
  });

  const days = [];
  let cursor = new Date(start);
  while (cursor <= end) {
    const iso = dateToIsoLocal(cursor);
    days.push({
      label:[DAY_LETTERS[cursor.getDay()],formatDayMonth(cursor)],
      total:totalsByDate[iso]||0,
      iso,
      dayLetter:DAY_LETTERS[cursor.getDay()],
      isWeekStart:cursor.getDay()===1,
      weekLabel:getCalendarWeekLabel(cursor)
    });
    cursor.setDate(cursor.getDate()+1);
  }
  return days;
}

function getTrendChartMeta(points) {
  const daily = points.some(p=>!!p.iso);
  if(!daily) return { mode:points.some(p=>p.weekStart)?"weekly":"summary", weekStarts:[], weekLabels:[] };

  const weekStarts = [];
  const weekLabels = [];
  const weekTotals = [];
  points.forEach((p,index)=>{
    if(index===0 || p.isWeekStart) {
      weekStarts.push(index);
      weekLabels.push(p.weekLabel||"Semana");
      weekTotals.push(0);
    }
    weekTotals[weekTotals.length-1] += Number(p.total||0);
  });
  return { mode:"daily", weekStarts, weekLabels, weekTotals };
}

function getTrendChartMinWidth(points) {
  const meta = getTrendChartMeta(points);
  if(meta.mode==="daily") return Math.max(320, points.length*46);
  if(meta.mode==="weekly") return Math.max(320, points.length*88);
  return Math.max(360, points.length*160);
}


// ─── INICIO: HELPERS DE FILTRO ────────────────────────────────
// Retorna {from,to} ISO inclusive segun los filtros de Inicio
function getInicioDateRange() {
  return getPeriodRange(state.inicioPeriod, state.inicioMesAno, state.inicioRangoDesde, state.inicioRangoHasta);
}

// Filtra ventas segun el filtro de periodo + punto de venta de Inicio
function getInicioFilteredSales() {
  const { from, to } = getInicioDateRange();
  return state.sales.filter(s =>
    s.fecha >= from && s.fecha <= to &&
    (state.inicioStand === "all" || s.stand === state.inicioStand)
  );
}

// Construye datos para la grafica de barras de Inicio segun la combinacion de filtros:
// - Si inicioStand === "all": una barra por punto de venta (Quicentro, San Francisco, Mercadito, Oficina), total del periodo
// - Si inicioStand = especifico: evolucion temporal dentro del periodo
//     hoy -> 1 barra (total del dia)
//     semana -> 7 barras (una por dia)
//     mes / mesEspecifico -> barras diarias con separadores de semana calendario
//     rango -> dias si <=31, semanas si es mas largo
function getInicioTrend() {
  const { from, to } = getInicioDateRange();

  if (state.inicioStand === "all") {
    // Comparacion entre puntos de venta
    return PUNTOS_VENTA.map(st=>{
      const total = salesNetTotal(state.sales.filter(s=>s.fecha>=from && s.fecha<=to && s.stand===st.id));
      return { label: st.name.split(" "), total };
    });
  }

  const salesForStand = state.sales.filter(s=>s.stand===state.inicioStand);

  if (state.inicioPeriod === "hoy") {
    const total = salesNetTotal(salesForStand.filter(s=>s.fecha===from));
    const label = new Date(from+"T12:00:00").toLocaleDateString("es-EC",{day:"2-digit",month:"2-digit"});
    return [{ label, total }];
  }

  if (state.inicioPeriod === "semana") {
    return getDailyBreakdown(salesForStand, from, to);
  }

  if (state.inicioPeriod === "mes" || state.inicioPeriod === "mesEspecifico") {
    return getDailyBreakdown(salesForStand, from, to);
  }

  if (state.inicioPeriod === "todo") {
    const dates = salesForStand.map(s=>s.fecha).filter(Boolean).sort();
    if(!dates.length) return [];
    return getDailyBreakdown(salesForStand, dates[0], dates[dates.length-1]);
  }

  // rango
  return getDailyBreakdown(salesForStand, from, to);
}


// ─── FINANZAS: HELPERS ────────────────────────────────────────
// Retorna {from, to} (ISO yyyy-mm-dd inclusive) segun el periodo seleccionado
function getFinDateRange() {
  const todayIso = today();
  const d = new Date(Date.now()-5*60*60*1000);
  if (state.finPeriod === "today") return { from: todayIso, to: todayIso };
  if (state.finPeriod === "week") {
    const monday = getMonday(d);
    const sunday = new Date(monday); sunday.setDate(sunday.getDate()+6);
    return { from: dateToIsoLocal(monday), to: dateToIsoLocal(sunday) };
  }
  if (state.finPeriod === "month") {
    const d2 = new Date(d.getFullYear(), d.getMonth(), 1);
    return { from: dateToIsoLocal(d2), to: todayIso };
  }
  if (state.finPeriod === "monthSpecific") {
    const [year, month] = (state.finMesAno||todayIso.slice(0,7)).split("-").map(Number);
    if (year && month) {
      const first = new Date(year, month-1, 1);
      const last = new Date(year, month, 0);
      return { from: dateToIsoLocal(first), to: dateToIsoLocal(last) };
    }
  }
  // "all"
  return { from: "0000-01-01", to: "9999-12-31" };
}

function inFinRange(fecha) {
  const { from, to } = getFinDateRange();
  return fecha >= from && fecha <= to;
}

function iterateIsoDates(from, to) {
  const dates = [];
  const start = new Date(from+"T12:00:00");
  const end = new Date(to+"T12:00:00");
  let cursor = new Date(start);
  while (cursor <= end) {
    dates.push(dateToIsoLocal(cursor));
    cursor.setDate(cursor.getDate()+1);
  }
  return dates;
}

function getQuicentroMonthlyRentBase(dateIso) {
  if (dateIso >= "2026-07-01") return 800;
  if (dateIso >= "2026-06-01") return 1100;
  return 1100;
}

function clampAutoCostRange(from, to) {
  const min = "2026-06-01";
  const max = today();
  const safeFrom = from < min ? min : from;
  const safeTo = to > max ? max : to;
  if (safeFrom > safeTo) return null;
  return { from:safeFrom, to:safeTo };
}

function getAutomaticRentForRange(from, to, store) {
  if (store !== "all" && store !== "quicentro") return 0;
  const safeFrom = from < "2026-06-01" ? "2026-06-01" : from;
  if (safeFrom > to) return 0;
  return iterateIsoDates(safeFrom,to).reduce((sum,iso)=>{
    const [y,m] = iso.split("-").map(Number);
    const daysInMonth = new Date(y, m, 0).getDate();
    return sum + (getQuicentroMonthlyRentBase(iso) / daysInMonth);
  },0);
}

function getManualRentForRange(gastos, store) {
  return (gastos||[]).filter(g=>{
    if (g.cat !== "arriendo") return false;
    if (store === "quicentro") return false;
    if (store === "all") return g.stand !== "quicentro";
    return true;
  }).reduce((sum,g)=>sum+Number(g.monto||0),0);
}

function getManualBankCommissionExpenses(gastos) {
  return (gastos||[]).filter(g=>{
    if (g.cat !== "comisiones") return false;
    return !String(g.nota||"").startsWith("Comisión ");
  }).reduce((sum,g)=>sum+Number(g.monto||0),0);
}

function getSellerPayForRange(sales, from, to, store) {
  const safe = clampAutoCostRange(from,to);
  if (!safe) return { base:0, variable:0, total:0 };
  const dates = iterateIsoDates(safe.from,safe.to);
  const stores = store === "all" ? PUNTOS_VENTA.map(s=>s.id) : [store];
  let base = 0;
  let variable = 0;
  stores.forEach(standId=>{
    dates.forEach(iso=>{
      const dayNet = salesNetTotal(sales.filter(s=>s.fecha===iso && s.stand===standId));
      if (standId === "quicentro") base += 15;
      variable += Math.max(dayNet - 100, 0) * 0.10;
    });
  });
  return { base, variable, total:base+variable };
}

function getAutomaticTransportForRange(from, to, store) {
  const safe = clampAutoCostRange(from,to);
  if (!safe) return 0;
  const days = iterateIsoDates(safe.from,safe.to).length;
  const storeCount = store === "all" ? PUNTOS_VENTA.length : 1;
  return days * storeCount * 8;
}

// COGS de una venta: suma de (cantidad * costo unitario) de cada item, expandiendo rutinas
function ventaCOGS(sale) {
  if (sale.obsequio) return 0;
  let cogs = 0;
  (sale.items||[]).forEach(item=>{
    if (item.isRutina && item.rutinaItems) {
      item.rutinaItems.forEach(ri=>{ cogs += (getCost(ri.id)||0) * (ri.q||0) * (item.qty||0); });
    } else {
      cogs += (getCost(item.id)||0) * (item.qty||0);
    }
  });
  return cogs;
}

  })();
  const periodLabels = { today:"Hoy", week:`Semana calendario · ${fmtDate(from)} – ${fmtDate(to)}`, month:`Mes acumulado · ${fmtDate(from)} – ${fmtDate(to)}`, monthSpecific:finMesLabel, all:"Todo el histórico" };

  const filteredSales = state.sales.filter(s=>inFinRange(s.fecha) && (state.finStore==="all" || s.stand===state.finStore));

  const ventasTotal = salesGrossTotal(filteredSales);
  const ventasTax = getTaxBreakdown(ventasTotal);

  const cogs = filteredSales.reduce((s,v)=>s+ventaCOGS(v),0);

  const autoRent = getAutomaticRentForRange(from, to, state.finStore);
  const sellerPay = getSellerPayForRange(filteredSales, from, to, state.finStore);
  const paymentInfo = getPaymentConsolidado(filteredSales);
  const debitCommission = filteredSales.filter(s=>s.pago==="td").reduce((sum,s)=>sum+saleGross(s)*getComisionRate("td"),0);
  const creditCommission = filteredSales.filter(s=>s.pago==="tc").reduce((sum,s)=>sum+saleGross(s)*getComisionRate("tc"),0);
  const manualBankCommission = getManualBankCommissionExpenses(filteredGastos);
  const bankCommission = debitCommission + creditCommission + manualBankCommission;
  const manualPersonal = filteredGastos.filter(g=>g.cat==="personal").reduce((s,g)=>s+Number(g.monto||0),0);
  const grossBeforeDiscount = filteredSales.filter(s=>!s.obsequio).reduce((sum,s)=>sum+getTaxBreakdown(Number(s.subtotal||s.total||0)).sinIva,0);
  const discounts = filteredSales.filter(s=>!s.obsequio).reduce((sum,s)=>sum+getTaxBreakdown(Number(s.descuentoAmt||0)).sinIva,0);
  const margenBruto = ventas - cogs;
  const margenPct = ventas>0 ? (margenBruto/ventas*100) : 0;
  const gastosByCat = GASTO_CATS.map(c=>{
    let total = filteredGastos.filter(g=>g.cat===c.id).reduce((s,g)=>s+Number(g.monto),0);
    if (c.id === "arriendo") total = autoRent + getManualRentForRange(filteredGastos, state.finStore);
    if (c.id === "personal") total += sellerPay.total;
    if (c.id === "comisiones") total = bankCommission;
    return {...c,total};
  });
  const totalGastos = gastosByCat.reduce((s,c)=>s+c.total,0);
  const utilidadOperativa = margenBruto - totalGastos;
  const utilidadPct = ventas>0 ? (utilidadOperativa/ventas*100) : 0;

  return `
  <div class="card card-purple" style="padding:16px;margin-bottom:12px;">
    <div style="font-size:11px;color:var(--lavender);font-weight:700;text-transform:uppercase;letter-spacing:1px;">Finanzas · Estado de Resultados</div>
    <div style="font-size:12px;color:var(--lavender);margin-top:4px;">Información privada — Gerardo y Rosita</div>
  </div>

  <div class="period-filter" style="flex-wrap:wrap;">
    ${[["today","Hoy"],["week","7 días"],["month","Mes actual"],["monthSpecific","📅 Mes"],["all","Todo"]].map(([k,l])=>`<button class="period-btn ${state.finPeriod===k?"active":""}" data-fin-period="${k}">${l}</button>`).join("")}
  </div>
  ${state.finPeriod==="monthSpecific"?`<div class="card" style="margin-bottom:12px;padding:10px;">
    <input type="month" class="dispatch-input" id="fin-mes" value="${state.finMesAno}" max="${today().slice(0,7)}">
  </div>`:""}

  <div class="store-selector">
    ${[{id:"all",name:"Todos"},...PUNTOS_VENTA].map(s=>`<button class="store-btn ${state.finStore===s.id?"active":""}" data-fin-store="${s.id}">${s.name}</button>`).join("")}
  </div>

  <div class="filter-bar">
    <button class="filter-btn ${state.finTab==="pyg"?"active":""}" data-fin-tab="pyg">📊 P&amp;G</button>
    <button class="filter-btn ${state.finTab==="sku"?"active":""}" data-fin-tab="sku">🏷️ Margen por SKU</button>
    <button class="filter-btn ${state.finTab==="gastos"?"active":""}" data-fin-tab="gastos">💸 Gastos</button>
    <button class="filter-btn ${state.finTab==="caja"?"active":""}" data-fin-tab="caja">💼 Caja</button>
    <button class="filter-btn ${state.finTab==="historico"?"active":""}" data-fin-tab="historico">📜 Histórico</button>
  </div>

  ${state.finTab==="pyg" ? renderPYG({ventas,grossBeforeDiscount,discounts,bankCommission,debitCommission,creditCommission,manualBankCommission,sellerBase:sellerPay.base,sellerVariable:sellerPay.variable,manualPersonal,cogs,margenBruto,margenPct,gastosByCat,totalGastos,utilidadOperativa,utilidadPct,periodLabel:periodLabels[state.finPeriod]}) : ""}
  ${state.finTab==="sku" ? renderMargenSKU(filteredSales) : ""}
  ${state.finTab==="gastos" ? renderGastosForm(filteredGastos) : ""}

function renderMargenSKU(filteredSales) {
  const skuRows = {};
  const rutinas = {};
  const productLabel = (id, fallback) => {
    const p = CATALOG.find(c=>c.id===id);
    if (p) return `${p.ref || p.id} · ${p.name} ${p.sub}`;
    return fallback || id || "SKU";
  };

  filteredSales.filter(sale=>!sale.obsequio).forEach(sale=>{
    const saleItems = sale.items||[];
    // Distribuye descuentos proporcionalmente entre los SKU para que la suma
    // de Margen por SKU coincida exactamente con el ingreso neto de la venta.
    const grossItemsTotal = saleItems.reduce((sum,item)=>sum+Number(item.subtotal||0),0);
    const netSaleTotal = saleNet(sale);
    const netFactor = grossItemsTotal>0 ? netSaleTotal/grossItemsTotal : 0;

    saleItems.forEach(item=>{
      if (item.isRutina && item.rutinaItems) {
        const rutinaId = item.ref || item.rutinaId || item.name;
        const rutinaInfo = RUTINAS.find(r=>r.id===rutinaId);
        const key = rutinaId || item.name;
        if(!rutinas[key]) {
          rutinas[key] = {
            id:key,
            name:rutinaInfo ? `${rutinaInfo.id} · ${rutinaInfo.name}` : item.name,
            qty:0,
            ventas:0,
            cogs:0,
            components:{}
          };
        }
        rutinas[key].qty += Number(item.qty||0);
        rutinas[key].ventas += Number(item.subtotal||0) * netFactor;
        item.rutinaItems.forEach(ri=>{
          const units = Number(ri.q||0) * Number(item.qty||0);
          const componentCost = (getCost(ri.id)||0) * units;
          rutinas[key].cogs += componentCost;
          if(!rutinas[key].components[ri.id]) {
            rutinas[key].components[ri.id] = { id:ri.id, name:productLabel(ri.id), qty:0, cogs:0 };
          }
          rutinas[key].components[ri.id].qty += units;
          rutinas[key].components[ri.id].cogs += componentCost;
        });
      } else {
        const key = item.id || item.name;
        if(!skuRows[key]) skuRows[key] = { id:key, name:productLabel(item.id, item.name), qty:0, ventas:0, cogs:0 };
        skuRows[key].qty += Number(item.qty||0);
        skuRows[key].ventas += Number(item.subtotal||0) * netFactor;
        skuRows[key].cogs += (getCost(item.id)||0) * Number(item.qty||0);
      }
    });
  });

  let individuales = Object.values(skuRows).sort((a,b)=>b.ventas-a.ventas);
  let rutinasRows = Object.values(rutinas).sort((a,b)=>b.ventas-a.ventas);

  // Control contable: la columna Ventas debe coincidir exactamente con el ingreso neto
  // usado en Ventas y P&G para el mismo filtro. Corrige residuos de redondeo o datos
  // históricos cuyo subtotal por ítem no coincida perfectamente con el total cobrado.
  const ingresoNetoEsperado = filteredSales
    .filter(sale=>!sale.obsequio)
    .reduce((sum,sale)=>sum+saleNet(sale),0);
  const ingresoSkuCalculado = individuales.reduce((sum,r)=>sum+Number(r.ventas||0),0) +
    rutinasRows.reduce((sum,r)=>sum+Number(r.ventas||0),0);
  const diferenciaVentas = ingresoNetoEsperado - ingresoSkuCalculado;
  if (Math.abs(diferenciaVentas) > 0.000001) {
    if (individuales.length) individuales[0].ventas += diferenciaVentas;
    else if (rutinasRows.length) rutinasRows[0].ventas += diferenciaVentas;
  }

  const calculateRow = r => {
    const ventasSinIva = Number(r.ventas||0);
    const iva = ventasSinIva * IVA_RATE;
    const totalCobrado = ventasSinIva + iva;
    const margen = ventasSinIva - Number(r.cogs||0);
    return {
      ...r,
      ventasSinIva,
      iva,
      totalCobrado,
      margen,
      margenPct:ventasSinIva>0?(margen/ventasSinIva*100):0
    };
  };
  individuales = individuales.map(calculateRow).sort((a,b)=>b.ventas-a.ventas);
  rutinasRows = rutinasRows.map(r=>{
    const calculated = calculateRow(r);
    calculated.components = Object.values(r.components||{}).sort((a,b)=>b.qty-a.qty);
    return calculated;
  }).sort((a,b)=>b.ventas-a.ventas);

  const sumRows = rows => {
    const ventasSinIva = rows.reduce((s,r)=>s+Number(r.ventasSinIva||0),0);
    const iva = rows.reduce((s,r)=>s+Number(r.iva||0),0);
    const totalCobrado = rows.reduce((s,r)=>s+Number(r.totalCobrado||0),0);
    const cogs = rows.reduce((s,r)=>s+Number(r.cogs||0),0);
    const margen = ventasSinIva - cogs;
    return {
      qty: rows.reduce((s,r)=>s+Number(r.qty||0),0),
      ventasSinIva,
      iva,
      totalCobrado,
      cogs,
      margen,
      margenPct: ventasSinIva>0 ? (margen/ventasSinIva*100) : 0
    };
  };
  const subtotalSku = sumRows(individuales);
  const subtotalRutinas = sumRows(rutinasRows);
  const skuRutinaRows = {};
  rutinasRows.forEach(r=>{
    (r.components||[]).forEach(c=>{
      if(!skuRutinaRows[c.id]) skuRutinaRows[c.id] = { id:c.id, name:c.name, qty:0, cogs:0 };
      skuRutinaRows[c.id].qty += Number(c.qty||0);
      skuRutinaRows[c.id].cogs += Number(c.cogs||0);
    });
  });
  const subtotalSkuRutinas = {
    qty: Object.values(skuRutinaRows).reduce((s,r)=>s+Number(r.qty||0),0),
    ventasSinIva: 0,
    iva: 0,
    totalCobrado: 0,
    cogs: Object.values(skuRutinaRows).reduce((s,r)=>s+Number(r.cogs||0),0),
    margen: 0,
    margenPct: 0
  };

  const totalVentas = ingresoNetoEsperado;
  const totalIva = totalVentas * IVA_RATE;
  const totalCobrado = totalVentas + totalIva;
  const totalCogs = subtotalSku.cogs + subtotalSkuRutinas.cogs;
  const totalMargen = totalVentas-totalCogs;
  const granTotal = {
    qty: subtotalSku.qty + subtotalSkuRutinas.qty,
    ventasSinIva: totalVentas,
    iva: totalIva,
    totalCobrado,
    cogs: totalCogs,
    margen: totalMargen,
    margenPct: totalVentas>0?(totalMargen/totalVentas*100):0
  };

  if(individuales.length===0 && rutinasRows.length===0) return `<div style="text-align:center;padding:32px;color:var(--gray);font-size:14px;">Sin ventas en este período</div>`;

  const moneyCell = value => `<td style="text-align:right;padding:7px 6px;font-weight:800;color:var(--purple);">${fmt(value)}</td>`;
  const mutedMoneyCell = value => `<td style="text-align:right;padding:7px 6px;color:var(--gray);">${fmt(value)}</td>`;
  const marginCell = value => `<td style="text-align:right;padding:7px 6px;font-weight:900;color:${value>=0?"var(--lime-dark)":"var(--red)"};">${fmt(value)}</td>`;
  const pctCell = value => `<td style="text-align:right;padding:7px 6px;font-weight:800;color:${value>=0?"var(--purple)":"var(--red)"};">${value.toFixed(0)}%</td>`;
  const dataRow = (r, icon="") => `<tr style="border-bottom:1px solid var(--lavender-light);">
    <td style="padding:7px 6px;font-weight:800;color:var(--purple);">${icon}${r.name}</td>
    <td style="text-align:center;padding:7px 6px;font-weight:800;color:var(--gray);">${r.qty}</td>
    ${moneyCell(r.ventasSinIva)}
    ${mutedMoneyCell(r.iva)}
    ${moneyCell(r.totalCobrado)}
    ${mutedMoneyCell(r.cogs)}
    ${marginCell(r.margen)}
    ${pctCell(r.margenPct)}
  </tr>`;
  const subtotalRow = (label, total, kind="subtotal") => {
    const isGrand = kind === "grand";
    const bg = isGrand ? "var(--purple)" : "var(--lavender-light)";
    const fg = isGrand ? "var(--white)" : "var(--purple)";
    const valueFg = isGrand ? "var(--lime)" : "var(--purple)";
    return `<tr style="background:${bg};border-top:2px solid var(--purple);">
      <td style="padding:9px 6px;font-weight:900;color:${fg};">${label}</td>
      <td style="text-align:center;padding:9px 6px;font-weight:900;color:${fg};">${total.qty}</td>
      <td style="text-align:right;padding:9px 6px;font-weight:900;color:${valueFg};">${fmt(total.ventasSinIva)}</td>
      <td style="text-align:right;padding:9px 6px;font-weight:900;color:${fg};">${fmt(total.iva)}</td>
      <td style="text-align:right;padding:9px 6px;font-weight:900;color:${valueFg};">${fmt(total.totalCobrado)}</td>
      <td style="text-align:right;padding:9px 6px;font-weight:900;color:${fg};">${fmt(total.cogs)}</td>
      <td style="text-align:right;padding:9px 6px;font-weight:900;color:${isGrand ? (total.margen>=0?"var(--lime)":"#FCA5A5") : (total.margen>=0?"var(--lime-dark)":"var(--red)")};">${fmt(total.margen)}</td>
      <td style="text-align:right;padding:9px 6px;font-weight:900;color:${fg};">${total.margenPct.toFixed(0)}%</td>
    </tr>`;
  };
  const sectionRow = label => `<tr><td colspan="8" style="padding:10px 8px;background:var(--purple);color:var(--white);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;">${label}</td></tr>`;
  const movedSkuSubtotalRow = total => `<tr style="background:#FBFAFF;border-top:2px solid var(--lavender);">
      <td style="padding:9px 6px;font-weight:900;color:var(--purple);">Subtotal SKU rotados dentro de rutinas</td>
      <td style="text-align:center;padding:9px 6px;font-weight:900;color:var(--purple);">${total.qty}</td>
      <td style="text-align:right;padding:9px 6px;color:var(--gray);">-</td>
      <td style="text-align:right;padding:9px 6px;color:var(--gray);">-</td>
      <td style="text-align:right;padding:9px 6px;color:var(--gray);">-</td>
      <td style="text-align:right;padding:9px 6px;font-weight:900;color:var(--purple);">${fmt(total.cogs)}</td>
      <td style="text-align:right;padding:9px 6px;color:var(--gray);">-</td>
      <td style="text-align:right;padding:9px 6px;color:var(--gray);">-</td>
    </tr>`;
  const componentRow = c => `<tr style="border-bottom:1px solid var(--lavender-light);background:#FBFAFF;">
    <td style="padding:6px 6px 6px 24px;color:var(--gray);font-weight:700;">SKU incluido: ${c.name}</td>
    <td style="text-align:center;padding:6px;color:var(--purple);font-weight:800;">${c.qty}</td>
    <td style="text-align:right;padding:6px;color:var(--gray);">-</td>
    <td style="text-align:right;padding:6px;color:var(--gray);">-</td>
    <td style="text-align:right;padding:6px;color:var(--gray);">-</td>
    <td style="text-align:right;padding:6px;color:var(--gray);">${fmt(c.cogs)}</td>
    <td style="text-align:right;padding:6px;color:var(--gray);">-</td>
    <td style="text-align:right;padding:6px;color:var(--gray);">-</td>
  </tr>`;

  return `
  <div class="card">
    <div class="section-title">Margen por SKU/Rutina</div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:820px;">
        <thead>
          <tr style="border-bottom:2px solid var(--lavender);">
            <th style="text-align:left;padding:6px 4px;color:var(--gray);font-weight:700;">Producto</th>
            <th style="text-align:center;padding:6px 4px;color:var(--gray);font-weight:700;">Uds</th>
            <th style="text-align:right;padding:6px 4px;color:var(--gray);font-weight:700;">Sin IVA</th>
            <th style="text-align:right;padding:6px 4px;color:var(--gray);font-weight:700;">IVA</th>
            <th style="text-align:right;padding:6px 4px;color:var(--gray);font-weight:700;">Total</th>
            <th style="text-align:right;padding:6px 4px;color:var(--gray);font-weight:700;">Costo</th>
            <th style="text-align:right;padding:6px 4px;color:var(--purple);font-weight:800;">Margen</th>
            <th style="text-align:right;padding:6px 4px;color:var(--purple);font-weight:800;">%</th>
          </tr>
        </thead>
        <tbody>
          ${individuales.length ? `${sectionRow("SKU individuales sin rutina")}${individuales.map(r=>dataRow(r)).join("")}${subtotalRow("Subtotal SKU individuales", subtotalSku)}` : ""}
          ${rutinasRows.length ? `${sectionRow("Rutinas")}${rutinasRows.map(r=>`${dataRow(r, "⭐ ")}${r.components.map(componentRow).join("")}`).join("")}${subtotalRow("Subtotal rutinas vendidas", subtotalRutinas)}${movedSkuSubtotalRow(subtotalSkuRutinas)}` : ""}
        </tbody>
        <tfoot>
          ${subtotalRow("Gran total SKU individuales + SKU rotados", granTotal, "grand")}
        </tfoot>
      </table>
    </div>
  </div>`;
}

              <select class="dispatch-select" id="eg-edit-cat">

              <input type="number" class="dispatch-input" id="eg-edit-monto" min="0" step="0.01" value="${state.egEditMonto}">

                <button class="btn-ghost" style="flex:1;" id="eg-edit-cancel">Cancelar</button>
              </div>
              <button class="btn-ghost" style="color:var(--red);border-color:var(--red);" id="eg-edit-delete" data-id="${g.id}" ${state.egEditSaving?"disabled":""}>🗑️ Eliminar gasto</button>

          <div style="display:flex;justify-content:space-between;">
            <div>
              <div style="font-size:11px;color:var(--gray);">${fmtDate(g.fecha)} · ${PUNTOS_VENTA.find(s=>s.id===g.stand)?.name||g.stand}</div>

// ─── HISTORICO DE VENTAS (carga manual y por archivo) ──────────
function renderHistorico() {
  const visible = CATALOG.filter(p=>state.histCatFilter==="all"||p.cat===state.histCatFilter);
  const subtotal = state.histCart.reduce((s,i)=>{
    const effectivePrice = state.histCustomPrices[i.id] !== undefined ? state.histCustomPrices[i.id] : i.price;
    return s + effectivePrice * i.qty;
  },0);
  const discAmt = subtotal*state.histDiscount/100;
  const total = subtotal - discAmt;

  return `
  <div class="card card-lavender" style="margin-bottom:12px;">
    <div class="section-title">📜 Cargar ventas históricas</div>
    <div style="font-size:12px;color:var(--gray);line-height:1.5;">
      Registra ventas anteriores al sistema. Afectan ventas, costo de ventas, P&amp;G, margen por SKU, caja y ranking de productos —
      <strong>no descuentan inventario</strong> (ese stock ya salió antes). Se guardan en la fecha que elijas.
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn ${!state.histBulkMode?"active":""}" data-hist-mode="manual">✍️ Manual</button>
    <button class="filter-btn ${state.histBulkMode?"active":""}" data-hist-mode="archivo">📄 Archivo CSV</button>
  </div>

  ${state.histBulkMode ? renderHistoricoArchivo() : renderHistoricoManual(visible, subtotal, discAmt, total)}
  `;
}

// Calcula totales esperados de un dia para un punto de venta
function getCajaEsperado(standId, fecha) {
  const ventasDia = state.sales.filter(s=>s.fecha===fecha && s.stand===standId);
  const gastosDia = (state.gastos||[]).filter(g=>g.fecha===fecha && g.stand===standId);

  const efectivoVentas = ventasDia.filter(s=>{const pt=PAYMENTS.find(p=>p.id===s.pago);return pt&&pt.group==="efectivo";}).reduce((s,v)=>s+Number(v.total),0);
  const transferVentas = ventasDia.filter(s=>{const pt=PAYMENTS.find(p=>p.id===s.pago);return pt&&pt.group==="transferencia";}).reduce((s,v)=>s+Number(v.total),0);

  // Bendo: ventas brutas con tarjeta (debito/credito), y neto = bruto - comision
  const bendoVentas = ventasDia.filter(s=>{const pt=PAYMENTS.find(p=>p.id===s.pago);return pt&&pt.group==="bendo";});
  const bendoBruto = bendoVentas.reduce((s,v)=>s+Number(v.total),0);
  const bendoComision = bendoVentas.reduce((s,v)=>s+Number(v.total)*getComisionRate(v.pago),0);
  const bendoNeto = bendoBruto - bendoComision;

  const gastosEfectivo = gastosDia.filter(g=>g.cat!=="comisiones").reduce((s,g)=>s+Number(g.monto),0); // se asume gastos operativos pagados en efectivo (excluye comisiones bancarias, que son descuentos automaticos en Bendo)

  return {
    efectivoVentas, transferVentas, bendoBruto, bendoComision, bendoNeto,
    gastosEfectivo,
    totalVentas: efectivoVentas+transferVentas+bendoBruto,
    txCount: ventasDia.length
  };
}

async function getCollectionRows(collectionName) {
  const snap = await db.collection(collectionName).get();
  return snap.docs.map(doc=>({ _docId: doc.id, ...(doc.data()||{}) }));
}

function sheetFromObjects(rows, headers) {
  const data = [headers.map(h=>h.label)];
  rows.forEach(row=>{
    data.push(headers.map(h=>{
      const value = typeof h.value === "function" ? h.value(row) : row[h.key];
      if (Array.isArray(value)) return value.join("; ");
      if (value && typeof value === "object") return JSON.stringify(value);
      return value ?? "";
    }));
  });
  return XLSX.utils.aoa_to_sheet(data);
}

async function exportToExcel() {
  try {
    showToast("Preparando backup completo...");

    const [ventas, inventarios, kardexRows, gastosRows, cierresRows, despachosRows, materiasRows, costosDoc, preciosDoc] = await Promise.all([
      getCollectionRows("ventas"),

      getCollectionRows("cierres_caja"),
      getCollectionRows("despachos"),
      getCollectionRows("materias_primas"),
      db.collection("config").doc("costos").get(),
      db.collection("config").doc("precios").get(),
    ]);

    const costos = costosDoc.exists ? (costosDoc.data()||{}) : {};
    const precios = preciosDoc.exists ? (preciosDoc.data()||{}) : {};
    const wb = XLSX.utils.book_new();

    const metaData = [
      ["Campo","Valor"],
      ["Generado", new Date().toLocaleString("es-EC")],
      ["Usuario", state.user?.email||""],

      ["Nota", "Backup completo consultado directamente desde Firebase"],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(metaData), "Resumen");

    // Hoja 1: Ventas
    const ventasData = [
      ["ID","Fecha","Hora","Stand","Productos","Subtotal","IVA","Total","Pago","Descuento%","Obsequio","Histórica","Nota","Por","Editado por","Editado en"],
      ...ventas.sort((a,b)=>String(a.timestamp||"").localeCompare(String(b.timestamp||""))).map(v=>{
        const hora = v.timestamp ? new Date(v.timestamp).toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"}) : "";
        const subtotalSinIva = (v.total||0)/1.15;
        const iva = subtotalSinIva*0.15;
        return [
          v.id, v.fecha, hora,
          PUNTOS_VENTA.find(s=>s.id===v.stand)?.name||v.stand||"",
          (v.items||[]).map(i=>`${i.name} x${i.qty} @${fmt(i.price)}`).join("; "),
          Number(subtotalSinIva.toFixed(2)),
          Number(iva.toFixed(2)),
          v.total||0,
          PAYMENTS.find(p=>p.id===v.pago)?.label||v.pago||"",
          v.descuento||0,
          v.obsequio ? "Sí" : "No",
          v.historica ? "Sí" : "No",
          v.nota||"",
          v.vendedor||v.registradoPor||"",
          v.editadoPor||"",
          v.editadoEn||""
        ];
      })
    ];
    const wsVentas = XLSX.utils.aoa_to_sheet(ventasData);
    XLSX.utils.book_append_sheet(wb, wsVentas, "Ventas");

    // Hoja 2: Inventario
    const invMap = {};
    inventarios.forEach(inv=>{ invMap[inv._docId] = inv; });
    const invData = [["SKU","Nombre","Sub",...PUNTOS_VENTA.map(s=>s.name),"Bodega","Precio PVP","Costo"]];
    CATALOG.forEach(p=>{
      invData.push([
        p.ref, p.name, p.sub,
        ...PUNTOS_VENTA.map(s=>invMap[s.id]?.[p.id]||0),
        invMap["bodega"]?.[p.id]||0,
        precios[p.id] ?? p.price,
        costos[p.id] ?? ""
      ]);
    });
    const wsInv = XLSX.utils.aoa_to_sheet(invData);
    XLSX.utils.book_append_sheet(wb, wsInv, "Inventario");

    // Hoja 3: Kardex
    const kardexData = [["ID","Doc ID","Fecha","Hora","Tipo","Producto","Cantidad","Stock Anterior","Stock Nuevo","Stand","Destino","Lote","Nota","Por"]];
    kardexRows.sort((a,b)=>String(a.timestamp||"").localeCompare(String(b.timestamp||""))).forEach(m=>{
      const hora = m.timestamp ? new Date(m.timestamp).toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"}) : "";
      const p = CATALOG.find(c=>c.id===m.product);
      kardexData.push([
        m.id, m._docId, m.fecha, hora,
        m.type?.toUpperCase()||"",
        p ? `${p.name} ${p.sub}` : m.product,
        m.qty, m.stockAnterior||"", m.stockNuevo||"",
        m.standId||"", m.to||"",
        m.lote||"", m.obs||"", m.registradoPor||""
      ]);
    });
    const wsKardex = XLSX.utils.aoa_to_sheet(kardexData);
    XLSX.utils.book_append_sheet(wb, wsKardex, "Kardex");

    XLSX.utils.book_append_sheet(wb, sheetFromObjects(gastosRows.sort((a,b)=>String(a.timestamp||"").localeCompare(String(b.timestamp||""))), [
      {label:"ID", key:"id"}, {label:"Doc ID", key:"_docId"}, {label:"Fecha", key:"fecha"}, {label:"Timestamp", key:"timestamp"},
      {label:"Stand", key:"stand"}, {label:"Categoría", key:"cat"}, {label:"Monto", key:"monto"}, {label:"Nota", key:"nota"},
      {label:"Registrado por", key:"registradoPor"}, {label:"Editado por", key:"editadoPor"}, {label:"Editado en", key:"editadoEn"}
    ]), "Gastos");

    XLSX.utils.book_append_sheet(wb, sheetFromObjects(cierresRows.sort((a,b)=>String(a.fecha||"").localeCompare(String(b.fecha||""))), [
      {label:"ID", key:"id"}, {label:"Doc ID", key:"_docId"}, {label:"Stand", key:"stand"}, {label:"Fecha", key:"fecha"},
      {label:"Efectivo inicial", key:"efectivoInicial"}, {label:"Efectivo final", key:"efectivoFinal"},
      {label:"Bendo banco", key:"bendoBanco"}, {label:"Transfer banco", key:"transferBanco"},
      {label:"Nota", key:"nota"}, {label:"Cerrado por", key:"cerradoPor"}, {label:"Cerrado en", key:"cerradoEn"}
    ]), "Cierres Caja");

    XLSX.utils.book_append_sheet(wb, sheetFromObjects(despachosRows.sort((a,b)=>String(a.timestamp||"").localeCompare(String(b.timestamp||""))), [
      {label:"Doc ID", key:"_docId"}, {label:"Fecha", key:"fecha"}, {label:"Timestamp", key:"timestamp"}, {label:"Producto", key:"product"},
      {label:"Producto nombre", key:"productName"}, {label:"Cantidad", key:"qty"}, {label:"Desde", key:"from"}, {label:"Hacia", key:"to"}
    ]), "Despachos");

    XLSX.utils.book_append_sheet(wb, sheetFromObjects(materiasRows.sort((a,b)=>String(a.nombre||"").localeCompare(String(b.nombre||""))), [
      {label:"ID", key:"id"}, {label:"Doc ID", key:"_docId"}, {label:"Nombre", key:"nombre"}, {label:"Categoría", key:"categoria"},
      {label:"Unidad", key:"unidad"}, {label:"Stock", key:"stock"}, {label:"Stock mínimo", key:"minimo"},
      {label:"Costo unitario", key:"costoUnitario"}, {label:"Valor stock", value:m=>Number(m.stock||0)*Number(m.costoUnitario||0)},
      {label:"Nota", key:"nota"}, {label:"Actualizado por", key:"actualizadoPor"}, {label:"Actualizado en", key:"actualizadoEn"}
    ]), "Materiales");

    const preciosCostosData = [["SKU","Nombre","Sub","Precio actual","Costo actual"]];
    CATALOG.forEach(p=>preciosCostosData.push([p.ref,p.name,p.sub,precios[p.id] ?? p.price,costos[p.id] ?? ""]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(preciosCostosData), "Precios Costos");

    const fecha = today().replace(/-/g,"");
    const hora = new Date().toTimeString().slice(0,5).replace(":","");
    XLSX.writeFile(wb, `WORTHY_POS_Backup_COMPLETO_${fecha}_${hora}.xlsx`);
    showToast("✅ Backup completo descargado");
  } catch(e) {
    showToast("⚠️ Error al exportar: "+e.message,"err");
  }
}

function render() {
  document.body.classList.toggle("modal-open", !!state.ajusteModal);
  const app = document.getElementById("app");
  if (state.loading) { app.innerHTML = renderLoading(); return; }
  if (!state.user) { app.innerHTML = renderLogin(); bindLogin(); return; }
  if (state.userInfo.role === "asesor" && !state.selectedStand) {
    app.innerHTML = renderStandSelector();
    bindStandSelector();
    return;
  }
  if (state.userInfo.role === "full" && state.tab === "pos" && !state.selectedStand) {
    app.innerHTML = renderStandSelector();
    bindStandSelector();
    return;
  }
  if (state.userInfo.role === "bodega" && state.tab === "pos" && !state.selectedStand) {
    app.innerHTML = renderStandSelector();
    bindStandSelector();
    return;
  }
  app.innerHTML = renderApp();
  bindApp();
}

      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn">Ingresar</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>`;
}

function bindLogin() {
  const btn = document.getElementById("login-btn");
  const doLogin = async () => {
    const email = document.getElementById("login-email").value.trim();
    const pwd = document.getElementById("login-pwd").value;
    const err = document.getElementById("login-error");
    if (!email||!pwd) { err.textContent="Ingresa correo y contraseña"; return; }
    btn.disabled = true; btn.textContent = "Ingresando...";
    try {
      await auth.signInWithEmailAndPassword(email, pwd);
    } catch(e) {
      err.textContent = "Correo o contraseña incorrectos";
      btn.disabled = false; btn.textContent = "Ingresar";
    }
  };
  btn.addEventListener("click", doLogin);
  document.getElementById("login-pwd").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
}
